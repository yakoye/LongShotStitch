<!doctype html>
<html lang="zh-CN">
<head>
  <!-- POWERSTORM_REQUIREMENTS.md: follow project development constraints for every release. -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LongShotStitch v1.11 - 长图拼接裁剪工具</title>
  <style>
    :root{
      --bg:#f3f5f8;
      --panel:#ffffff;
      --panel-2:#f8fafc;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#d9dee7;
      --accent:#ffcc33;
      --accent-strong:#f6b700;
      --blue:#2f80ed;
      --danger:#ef4444;
      --shadow:0 10px 30px rgba(15,23,42,.10);
      --radius:14px;
      --topbar:54px;
      --sidebar:328px;
      --mobilebar:74px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);overflow:hidden}
    button,input,select{font:inherit}
    button{border:0;background:none;color:inherit;cursor:pointer}
    button:disabled{opacity:.45;cursor:not-allowed}
    .app{height:100vh;display:grid;grid-template-rows:var(--topbar) 1fr;grid-template-columns:var(--sidebar) 1fr;background:var(--bg)}
    .topbar{grid-column:1/3;display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(16px);z-index:5}
    .brand{display:flex;align-items:center;gap:10px;font-weight:760;margin-right:8px;white-space:nowrap}
    .brand-mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#ffe58a,#ffc12a);display:grid;place-items:center;box-shadow:0 5px 14px rgba(246,183,0,.25)}
    .brand small{display:block;color:var(--muted);font-weight:500;font-size:11px;margin-top:-2px}
    .toolbar-group{display:flex;align-items:center;gap:6px;padding:0 8px;border-left:1px solid var(--line)}
    .tool-btn,.file-label{height:36px;padding:0 11px;border:1px solid var(--line);border-radius:10px;background:var(--panel);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .tool-btn:hover,.file-label:hover{border-color:#b9c2d1;background:#fbfdff}
    .primary{background:#111827;color:#fff;border-color:#111827}
    .primary:hover{background:#030712}
    .blue{background:var(--blue);color:#fff;border-color:var(--blue)}
    .danger{color:var(--danger)}
    .spacer{flex:1}
    #fileInput,#projectInput{display:none}
    .sidebar{grid-row:2;grid-column:1;min-width:0;display:grid;grid-template-rows:auto 1fr;border-right:1px solid var(--line);background:var(--panel);z-index:3}
    .mode-panel{padding:12px;border-bottom:1px solid var(--line);background:#fff}
    .mode-title{font-size:12px;color:var(--muted);margin:0 0 8px 2px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .mode-btn{height:54px;border:1px solid var(--line);border-radius:13px;background:var(--panel-2);display:flex;align-items:center;gap:10px;padding:0 10px;text-align:left}
    .mode-btn:hover{border-color:#b8c1cf;background:#fff}
    .mode-btn.active{border-color:var(--accent-strong);background:#fff8d5;box-shadow:0 0 0 3px rgba(255,204,51,.18)}
    .mode-icon{width:26px;height:26px;display:grid;place-items:center;font-weight:800;font-size:18px;color:#111827}
    .mode-label{font-size:13px;font-weight:720;line-height:1.15}
    .mode-label span{display:block;color:var(--muted);font-size:11px;font-weight:500;margin-top:2px}
    .props{min-height:0;overflow:auto;padding:12px;background:linear-gradient(#fff,#f8fafc)}
    .prop-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(15,23,42,.03)}
    .tool-active-card{position:sticky;top:0;z-index:2;max-height:min(420px,calc(100vh - var(--topbar) - 116px));overflow:auto;box-shadow:0 12px 26px rgba(15,23,42,.10)}
    .prop-card h3{margin:0 0 10px;font-size:14px}
    .hint{font-size:12px;color:var(--muted);line-height:1.6;margin:0}
    .row{display:flex;gap:8px;align-items:center;margin:8px 0}
    .row label{font-size:12px;color:var(--muted);min-width:78px}
    .row input[type="number"], .row input[type="text"], .row select, .row input[type="color"]{height:34px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:0 8px;min-width:0;flex:1}
    .row input[type="color"]{padding:3px;max-width:58px}
    .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .mini-btn{height:34px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:12px;font-weight:650}
    .mini-btn:hover{background:#f9fafb;border-color:#b8c1cf}
    .mini-btn.active{background:#111827;color:#fff;border-color:#111827}
    .mini-btn.warn{color:var(--danger)}
    .tool-icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .tool-icon-btn{height:58px;border:1px solid var(--line);border-radius:12px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-weight:700}
    .tool-icon-btn .ti{font-size:24px;line-height:1}
    .tool-icon-btn.active{border-color:var(--accent-strong);background:#fff8d5;box-shadow:0 0 0 3px rgba(255,204,51,.18)}
    .tool-icon-btn .tt{font-size:11px;color:var(--muted)}
    .image-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow:auto}
    .image-item{border:1px solid var(--line);border-radius:11px;padding:8px;background:#fff;display:grid;grid-template-columns:44px 1fr auto;gap:8px;align-items:center}
    .image-item.selected{border-color:var(--accent-strong);box-shadow:0 0 0 3px rgba(255,204,51,.18)}
    .thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:#eef2f7;border:1px solid #e5e7eb}
    .image-name{font-size:12px;font-weight:720;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
    .image-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .tiny-actions{display:flex;gap:4px;flex-direction:column}
    .tiny-actions button{width:24px;height:20px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;font-size:12px}
    .stage-wrap{grid-row:2;grid-column:2;min-width:0;min-height:0;position:relative;overflow:hidden;background:#eef2f7}
    .stage{position:absolute;inset:0;touch-action:none;cursor:grab;background:
      radial-gradient(circle at 20px 20px,rgba(148,163,184,.28) 1px,transparent 1px) 0 0/24px 24px,
      linear-gradient(180deg,#f5f7fb,#eef2f7);}
    .stage.dragging{cursor:grabbing}
    canvas{position:absolute;left:0;top:0;width:100%;height:100%;display:block}
    .drop-hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(560px,82%);padding:28px;border:2px dashed #cbd5e1;border-radius:22px;background:rgba(255,255,255,.86);text-align:center;box-shadow:var(--shadow);pointer-events:auto;cursor:pointer}
    .drop-hint h2{margin:0 0 8px;font-size:23px}
    .drop-hint p{margin:6px 0;color:var(--muted);line-height:1.65}
    .drop-actions{display:flex;justify-content:center;gap:10px;margin:16px 0 10px}.drop-actions .mini-btn{min-width:112px;height:38px;background:#111827;color:#fff;border-color:#111827}.drop-actions .mini-btn+ .mini-btn{background:#fff;color:#111827;border-color:var(--line)}
    .statusbar{position:absolute;left:14px;bottom:12px;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:12px;box-shadow:0 6px 18px rgba(15,23,42,.08);backdrop-filter:blur(14px)}
    .mobile-title{display:none}
    .mobile-bottom{display:none}
    .toast{position:fixed;right:20px;bottom:20px;z-index:50;background:#111827;color:#fff;border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);font-size:13px;opacity:0;transform:translateY(10px);pointer-events:none;transition:.22s}
    .toast.show{opacity:1;transform:translateY(0)}
    .preview-badge{position:absolute;top:12px;right:12px;border-radius:999px;background:#111827;color:#fff;padding:7px 12px;font-size:12px;font-weight:700;display:none;z-index:4}
    .preview .preview-badge{display:block}
    .preview .stage{background:#e5e7eb}
    .divider-line{height:1px;background:var(--line);margin:10px 0}
    .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#f3f4f6;border:1px solid #e5e7eb;border-bottom-width:2px;border-radius:6px;padding:1px 5px;color:#374151}

    .floating-toolkit{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:12;display:none;align-items:center;gap:4px;padding:7px 8px;border:1px solid rgba(203,213,225,.86);border-radius:13px;background:rgba(255,255,255,.94);box-shadow:0 14px 34px rgba(15,23,42,.18);backdrop-filter:blur(18px);max-width:calc(100% - 28px);overflow-x:auto;overscroll-behavior:contain;pointer-events:auto}
    .floating-toolkit.show{display:flex}
    .tool-dock-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:#0f172a;background:transparent;border:1px solid transparent;flex:0 0 auto}
    .tool-dock-btn:hover{background:#f8fafc;border-color:#dbe2ea}
    .tool-dock-btn.active{background:#eff6ff;border-color:#3b82f6;color:#2563eb;box-shadow:0 0 0 2px rgba(59,130,246,.16)}
    .tool-dock-btn.danger.active{background:#fff1f2;border-color:#ef4444;color:#ef4444}
    .tool-dock-btn svg{width:20px;height:20px;display:block;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .tool-dock-sep{width:1px;height:22px;background:#e5e7eb;margin:0 2px;flex:0 0 auto}
    .tool-popover{position:absolute;z-index:13;display:none;min-width:250px;max-width:min(430px,calc(100% - 24px));max-height:min(360px,calc(100% - 30px));overflow:auto;padding:10px;border:1px solid rgba(203,213,225,.94);border-radius:14px;background:rgba(255,255,255,.98);box-shadow:0 20px 48px rgba(15,23,42,.23);backdrop-filter:blur(18px);pointer-events:auto}
    .tool-popover.show{display:block}
    .tool-popover.compact{min-width:210px}
    .pop-title{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:800;font-size:12px;color:#334155;margin:0 0 8px}
    .pop-row{display:flex;align-items:center;gap:8px;margin:8px 0;min-height:32px}
    .pop-row label{font-size:12px;color:#64748b;min-width:58px;white-space:nowrap}
    .pop-row input[type="number"],.pop-row input[type="text"],.pop-row select{height:32px;border:1px solid #d9dee7;border-radius:9px;background:#fff;padding:0 8px;min-width:0;flex:1}
    .pop-row input[type="color"]{width:34px;height:32px;border:1px solid #d9dee7;border-radius:9px;background:#fff;padding:3px;flex:0 0 auto}
    .pop-chip-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .pop-chip{height:30px;min-width:30px;padding:0 8px;border:1px solid #d9dee7;border-radius:9px;background:#fff;display:inline-grid;place-items:center;font-weight:750;color:#0f172a}
    .pop-chip:hover{background:#f8fafc;border-color:#b8c1cf}
    .pop-chip.active{background:#111827;color:#fff;border-color:#111827}
    .pop-chip svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .pop-icon-chip{width:32px;padding:0}
    .pop-actions{display:flex;gap:8px;margin-top:10px;border-top:1px solid #eef2f7;padding-top:10px}
    .pop-actions .mini-btn{flex:1}
    .tool-hint-card{font-size:12px;line-height:1.7;color:var(--muted)}
    .desktop-tools-slot{display:block}
    .tool-panel-card{padding:10px}
    .tool-panel-card .floating-toolkit{position:static;left:auto;right:auto;bottom:auto;transform:none;display:flex;flex-wrap:wrap;justify-content:flex-start;max-width:100%;overflow:visible;box-shadow:none;border:0;background:transparent;backdrop-filter:none;padding:0;margin:0 0 10px;gap:6px}
    .tool-panel-card .floating-toolkit:not(.show){display:none}
    .tool-panel-card .tool-dock-btn{width:34px;height:34px;background:#fff;border-color:#e5e7eb;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .tool-panel-card .tool-popover{position:static;display:block;min-width:0;max-width:none;max-height:none;overflow:visible;box-shadow:none;border-color:#e5e7eb;background:#fff;padding:10px;margin-top:8px;backdrop-filter:none}
    .tool-panel-card .tool-popover:not(.show){display:none}
    .pop-section{border:1px solid #eef2f7;border-radius:10px;margin:8px 0;background:#fff;overflow:hidden}
    .pop-section summary{cursor:pointer;list-style:none;padding:8px 10px;font-size:12px;font-weight:800;color:#334155;background:#f8fafc;display:flex;align-items:center;justify-content:space-between}
    .pop-section summary::-webkit-details-marker{display:none}
    .pop-section summary::after{content:'⌄';font-size:12px;color:#64748b;transition:.16s}
    .pop-section:not([open]) summary::after{transform:rotate(-90deg)}
    .pop-section-body{padding:8px 10px}
    .pop-compact{display:flex;flex-direction:column;gap:7px}
    .pop-inline{display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-height:30px}
    .pop-compact .pop-chip{height:28px;min-width:28px;padding:0 7px;border-radius:8px}
    .pop-compact .pop-chip svg{width:16px;height:16px}
    .color-strip,.density-strip,.size-control,.width-control{display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap}
    .color-swatch{width:24px;height:24px;padding:2px;border:1px solid #d9dee7;border-radius:7px;background:#fff;display:grid;place-items:center}
    .color-swatch span{width:16px;height:16px;border-radius:5px;border:1px solid rgba(15,23,42,.12);display:block}
    .color-swatch.active{border-color:#111827;box-shadow:0 0 0 2px rgba(17,24,39,.12)}
    .mini-color-input{width:26px!important;height:24px!important;border-radius:7px!important;padding:2px!important;flex:0 0 auto!important}
    .mini-number-input,.tiny-number,.width-number{height:26px!important;border:1px solid #d9dee7;border-radius:7px;background:#fff;padding:0 4px;font-size:12px;min-width:0}
    .tiny-number{width:48px!important;flex:0 0 auto!important;text-align:center}
    .width-number{width:42px!important;flex:0 0 auto!important;text-align:center}
    .compact-text-input{height:28px;border:1px solid #d9dee7;border-radius:8px;background:#fff;padding:0 7px;min-width:88px;max-width:100%;flex:1 1 110px;font-size:12px}
    .line-chip{height:26px;min-width:30px;padding:0 5px;border:1px solid #d9dee7;border-radius:8px;background:#fff;display:inline-grid;place-items:center}
    .line-chip.active{background:#111827;border-color:#111827}
    .line-chip.active .line-preview{background:#fff}
    .line-preview{display:block;background:#111827;border-radius:999px;max-height:18px}
    .compact-actions{margin-top:4px;padding-top:7px}
    .tool-panel-card .tool-popover{padding:8px;margin-top:6px}


    .mini-map{position:absolute;right:18px;top:14px;width:96px;display:none;z-index:11;padding:5px;border:1px solid rgba(203,213,225,.86);border-radius:12px;background:rgba(255,255,255,.9);box-shadow:0 12px 28px rgba(15,23,42,.16);backdrop-filter:blur(16px);pointer-events:auto;user-select:none}
    .mini-map.show{display:block}
    .mini-map canvas{position:static!important;width:100%;height:auto;display:block;border-radius:8px;background:#fff;border:1px solid #e5e7eb}
    .mini-viewport{position:absolute;border:2px solid #2f80ed;border-radius:6px;background:rgba(47,128,237,.12);box-shadow:0 0 0 1px rgba(255,255,255,.7) inset;pointer-events:none}
    .nav-scrollbar{position:absolute;z-index:12;display:none;pointer-events:auto;user-select:none}
    .nav-scrollbar.show{display:block}
    .nav-scrollbar.vertical{right:5px;top:12px;bottom:30px;width:8px}
    .nav-scrollbar.horizontal{left:14px;right:30px;bottom:7px;height:8px}
    .nav-track{position:absolute;inset:0;border-radius:999px;background:rgba(15,23,42,.08);box-shadow:0 0 0 1px rgba(255,255,255,.55) inset}
    .nav-thumb{position:absolute;border-radius:999px;background:rgba(15,23,42,.44);box-shadow:0 2px 8px rgba(15,23,42,.18)}
    .nav-thumb:hover,.nav-scrollbar.dragging .nav-thumb{background:rgba(47,128,237,.78)}
    .nav-scrollbar.vertical .nav-thumb{left:0;width:100%;min-height:28px}
    .nav-scrollbar.horizontal .nav-thumb{top:0;height:100%;min-width:28px}
    @media (max-width: 760px){
      .mini-map{right:10px;top:10px;width:72px;padding:4px;border-radius:10px}
      .nav-scrollbar.vertical{right:4px;top:8px;bottom:14px;width:7px}
      .nav-scrollbar.horizontal{left:8px;right:18px;bottom:6px;height:7px}
    }

    @media (max-width: 760px){
      .desktop-tools-slot{display:none}
      .floating-toolkit{bottom:calc(var(--mobilebar) + 10px);left:8px;right:8px;transform:none;justify-content:flex-start}
      .tool-popover{max-height:calc(100% - var(--topbar) - var(--mobilebar) - 28px)}
    }

    @media (max-width: 760px){
      :root{--topbar:56px}
      .app{display:block;height:100vh;overflow:hidden;background:#f3f5f8}
      .topbar{position:absolute;left:0;top:0;right:0;height:var(--topbar);padding:8px 10px;justify-content:space-between}
      .brand,.toolbar-group .text-label,.desktop-only,.toolbar-group:nth-of-type(2),.toolbar-group:nth-of-type(3){display:none!important}
      .toolbar-group{border-left:0;padding:0;gap:6px}
      .tool-btn,.file-label{height:38px;width:42px;padding:0;justify-content:center;border-radius:12px}
      .mobile-title{display:block;font-size:20px;font-weight:800;position:absolute;left:50%;transform:translateX(-50%)}
      .sidebar{display:none}
      .stage-wrap{position:absolute;left:0;right:0;top:var(--topbar);bottom:var(--mobilebar);grid-row:auto;grid-column:auto}
      .mobile-bottom{display:grid;position:absolute;left:0;right:0;bottom:0;height:var(--mobilebar);background:rgba(255,255,255,.94);border-top:1px solid var(--line);grid-template-columns:repeat(5,1fr);z-index:6;backdrop-filter:blur(14px);padding-bottom:env(safe-area-inset-bottom)}
      .mobile-mode{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#111827;font-weight:750;font-size:11px}
      .mobile-mode .mi{font-size:25px;line-height:1;color:#111827}
      .mobile-mode.active .mi,.mobile-mode.active{color:var(--blue)}
      .statusbar{left:8px;right:8px;bottom:8px;text-align:center;font-size:11px;padding:5px 8px}
      .drop-hint{padding:22px;width:88%}
      .drop-hint h2{font-size:19px}
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">✂</div>
      <div>LongShotStitch<small>长图拼裁工具 v1.11</small></div>
    </div>
    <div class="mobile-title">裁剪</div>

    <div class="toolbar-group">
      <label class="file-label" title="打开图片">
        <span>📁</span><span class="text-label">打开图片</span>
        <input id="fileInput" type="file" accept="image/*" multiple>
      </label>
      <button class="tool-btn" id="pasteBtn" title="粘贴剪贴板图片"><span>📋</span><span class="text-label">粘贴</span></button>
      <button class="tool-btn desktop-only" id="saveProjectBtn" title="保存工程 JSON"><span>💾</span><span>保存工程</span></button>
      <label class="file-label desktop-only" title="打开工程 JSON">
        <span>📂</span><span>打开工程</span>
        <input id="projectInput" type="file" accept="application/json,.json">
      </label>
    </div>

    <div class="toolbar-group desktop-only">
      <button class="tool-btn" id="verticalBtn" title="纵向拼接">↕ 纵向</button>
      <button class="tool-btn" id="horizontalBtn" title="横向拼接">↔ 横向</button>
    </div>

    <div class="toolbar-group desktop-only">
      <button class="tool-btn" id="undoBtn">↶ 撤销</button>
      <button class="tool-btn" id="redoBtn">↷ 重做</button>
      <button class="tool-btn danger" id="clearBtn">清空</button>
    </div>

    <div class="spacer"></div>

    <div class="toolbar-group">
      <button class="tool-btn" id="fitBtn" title="适合窗口"><span>⛶</span><span class="text-label">适合窗口</span></button>
      <button class="tool-btn" id="previewBtn" title="预览"><span>👁</span><span class="text-label">预览</span></button>
      <button class="tool-btn primary" id="exportBtn" title="导出 PNG"><span>⬆</span><span class="text-label">导出 PNG</span></button>
    </div>
  </header>

  <aside class="sidebar">
    <section class="mode-panel">
      <p class="mode-title">编辑模式</p>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="seam"><span class="mode-icon">☰</span><span class="mode-label">拼接线<span>调接缝/覆盖</span></span></button>
        <button class="mode-btn" data-mode="canvasCrop"><span class="mode-icon">▢</span><span class="mode-label">整体裁剪<span>裁最终长图</span></span></button>
        <button class="mode-btn" data-mode="imageCrop"><span class="mode-icon">▢¹</span><span class="mode-label">单图裁剪<span>每张图四边</span></span></button>
        <button class="mode-btn" data-mode="divider"><span class="mode-icon">≡</span><span class="mode-label">分割线<span>整体插入接缝</span></span></button>
        <button class="mode-btn" data-mode="tools"><span class="mode-icon">✎</span><span class="mode-label">工具<span>左侧工具栏</span></span></button>
      </div>
    </section>
    <section class="props" id="props"></section>
  </aside>

  <main class="stage-wrap" id="stageWrap">
    <div class="stage" id="stage">
      <canvas id="editorCanvas"></canvas>
      <div class="drop-hint" id="dropHint">
        <h2>拖入、打开或粘贴图片</h2>
        <p>支持长图拼接、整体裁剪、单图裁剪、接缝调整、整体插入分割线。</p>
        <div class="drop-actions">
          <button class="mini-btn" id="openImageEmpty" type="button">打开图片</button>
          <button class="mini-btn" id="openProjectEmpty" type="button">打开工程</button>
        </div>
        <p>也可以直接拖入图片 / 工程文件，或粘贴剪贴板图片。</p>
        <p>快捷键：<span class="kbd">1</span> 拼接线，<span class="kbd">2</span> 整体裁剪，<span class="kbd">3</span> 单图裁剪，<span class="kbd">4</span> 分隔线，方向键微调。</p>
      </div>
      <div class="preview-badge">预览模式</div>
      <div class="statusbar" id="statusbar">Ready</div>
      <div class="floating-toolkit" id="toolDock" aria-label="工具栏"></div>
      <div class="tool-popover" id="toolPopover"></div>

      <div class="mini-map" id="miniMap" title="点击跳转">
        <canvas id="miniMapCanvas"></canvas>
        <div class="mini-viewport" id="miniViewport"></div>
      </div>
      <div class="nav-scrollbar vertical" id="vScroll"><div class="nav-track"></div><div class="nav-thumb" id="vThumb"></div></div>
      <div class="nav-scrollbar horizontal" id="hScroll"><div class="nav-track"></div><div class="nav-thumb" id="hThumb"></div></div>
    </div>
  </main>

  <nav class="mobile-bottom">
    <button class="mobile-mode active" data-mode="seam"><span class="mi">☰</span><span>拼接</span></button>
    <button class="mobile-mode" data-mode="canvasCrop"><span class="mi">▢</span><span>整体</span></button>
    <button class="mobile-mode" data-mode="imageCrop"><span class="mi">▢¹</span><span>单图</span></button>
    <button class="mobile-mode" data-mode="divider"><span class="mi">≡</span><span>分割</span></button>
    <button class="mobile-mode" data-mode="tools"><span class="mi">✎</span><span>工具</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
(() => {
  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  const uid = (p='id') => p + '_' + Math.random().toString(36).slice(2, 9);

  const canvas = $('#editorCanvas');
  const ctx = canvas.getContext('2d');
  const stage = $('#stage');
  const stageWrap = $('#stageWrap');
  const props = $('#props');
  const dropHint = $('#dropHint');
  const statusbar = $('#statusbar');
  const toastEl = $('#toast');
  const app = $('#app');
  const toolDock = $('#toolDock');
  const toolPopover = $('#toolPopover');
  const miniMap = $('#miniMap');
  const miniMapCanvas = $('#miniMapCanvas');
  const miniViewport = $('#miniViewport');
  const vScroll = $('#vScroll');
  const vThumb = $('#vThumb');
  const hScroll = $('#hScroll');
  const hThumb = $('#hThumb');

  let state = {
    orientation: 'vertical',
    mode: 'seam',
    selected: null, // {type:'seam'|'image'|'canvasCrop'|'divider', id/index}
    images: [],
    seams: [],
    canvasCrop: { top: 0, right: 0, bottom: 0, left: 0 },
    zoom: 1,
    pan: { x: 0, y: 0 },
    preview: false,
    annotations: [],
    activeHandle: null,
    toolArmed: null,
    toolSettings: { group:'select', shapeKind:'box', shapeFill:false, color:'#ef4444', fillColor:'#fee2e2', lineWidth:4, opacity:1, penKind:'pen', penColor:'#ef4444', penWidth:4, highlightWidth:18, arrowKind:'arrow', textValue:'输入文字', textColor:'#111827', textSize:28, textBg:'transparent', textOutline:false, badgeNumber:1, badgeColor:'#2f80ed', badgeSize:34, mosaicKind:'mosaic', mosaicGrid:14, eraserSize:24, watermarkText:'水印', watermarkSize:34, watermarkColor:'#111827', watermarkOpacity:.22, watermarkRepeat:1 },
    splitDraft: null,
    splitDraftManual: false
  };

  let history = [];
  let future = [];
  let hitAreas = [];
  let layoutCache = null;
  let drag = null;
  let navDrag = null;
  let redrawPending = false;
  let resizeObserver = null;

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=>toastEl.classList.remove('show'), 2200);
  }

  function snapshot(){
    return JSON.stringify({
      orientation: state.orientation,
      mode: state.mode,
      selected: state.selected,
      images: state.images.map(im => ({
        id: im.id, name: im.name, dataUrl: im.dataUrl, width: im.width, height: im.height, crop: {...im.crop}
      })),
      seams: state.seams.map(s => ({...s, divider: s.divider ? {...s.divider} : null})),
      canvasCrop: {...state.canvasCrop},
      annotations: state.annotations.map(a => ({...a})),
      toolArmed: state.toolArmed,
      splitDraft: state.splitDraft ? {...state.splitDraft} : null,
      splitDraftManual: !!state.splitDraftManual
    });
  }

  function pushHistory(){
    history.push(snapshot());
    if(history.length > 80) history.shift();
    future = [];
    updateUndoRedo();
  }

  function updateUndoRedo(){
    $('#undoBtn').disabled = history.length === 0;
    $('#redoBtn').disabled = future.length === 0;
  }

  async function restoreFromSnapshot(str){
    const data = JSON.parse(str);
    state.orientation = data.orientation || 'vertical';
    state.mode = data.mode || 'seam';
    state.selected = data.selected || null;
    state.canvasCrop = data.canvasCrop || {top:0,right:0,bottom:0,left:0};
    state.seams = data.seams || [];
    state.annotations = data.annotations || [];
    state.toolArmed = data.toolArmed || null;
    state.splitDraft = data.splitDraft || null;
    state.splitDraftManual = !!data.splitDraftManual;
    state.activeHandle = null;
    const imgs = [];
    for(const raw of data.images || []){
      const img = await loadImage(raw.dataUrl);
      imgs.push({...raw, img, width: img.naturalWidth, height: img.naturalHeight, crop: raw.crop || {top:0,right:0,bottom:0,left:0}});
    }
    state.images = imgs;
    syncSeams(false);
    updateModeButtons();
    updateToolbarButtons();
    renderProps();
    fitToView(false);
    requestRender();
  }

  function undo(){
    if(!history.length) return;
    future.push(snapshot());
    const last = history.pop();
    restoreFromSnapshot(last);
    updateUndoRedo();
  }
  function redo(){
    if(!future.length) return;
    history.push(snapshot());
    const next = future.pop();
    restoreFromSnapshot(next);
    updateUndoRedo();
  }

  function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  async function addFiles(files){
    const list = Array.from(files).filter(f => f.type.startsWith('image/'));
    if(!list.length){ toast('没有找到图片文件'); return; }
    pushHistory();
    for(const file of list){
      const dataUrl = await fileToDataUrl(file);
      const img = await loadImage(dataUrl);
      state.images.push({
        id: uid('img'), name: file.name || 'clipboard.png', dataUrl, img,
        width: img.naturalWidth, height: img.naturalHeight,
        crop: { top: 0, right: 0, bottom: 0, left: 0 }
      });
    }
    syncSeams(true);
    if(!state.selected && state.images.length) state.selected = { type: 'image', index: 0 };
    fitToView(false);
    renderProps();
    requestRender();
    toast(`已添加 ${list.length} 张图片`);
  }

  async function addClipboardImages(){
    try{
      const items = await navigator.clipboard.read();
      const files = [];
      for(const item of items){
        for(const type of item.types){
          if(type.startsWith('image/')){
            const blob = await item.getType(type);
            files.push(new File([blob], 'clipboard.png', { type }));
          }
        }
      }
      if(files.length) await addFiles(files);
      else toast('剪贴板里没有图片。也可以直接 Ctrl+V 粘贴。');
    }catch(e){
      toast('浏览器未允许读取剪贴板，请试试 Ctrl+V');
    }
  }

  function syncSeams(createMissing=true){
    const n = state.images.length;
    const old = state.seams;
    const next = [];
    for(let i=0;i<Math.max(0,n-1);i++){
      const before = state.images[i].id, after = state.images[i+1].id;
      const found = old.find(s => s.beforeImageId === before && s.afterImageId === after) || old[i];
      next.push(found && found.beforeImageId === before && found.afterImageId === after ? found : {
        id: uid('seam'), beforeImageId: before, afterImageId: after,
        beforeCrop: 0, afterCrop: 0, locked: true,
        divider: null
      });
    }
    state.seams = next;
    if(state.selected?.type === 'seam' && state.selected.index >= state.seams.length) state.selected = null;
  }

  function getEffectiveCrop(i){
    const im = state.images[i];
    const c = {...im.crop};
    if(state.orientation === 'vertical'){
      if(i > 0) c.top += state.seams[i-1]?.afterCrop || 0;
      if(i < state.images.length-1) c.bottom += state.seams[i]?.beforeCrop || 0;
    } else {
      if(i > 0) c.left += state.seams[i-1]?.afterCrop || 0;
      if(i < state.images.length-1) c.right += state.seams[i]?.beforeCrop || 0;
    }
    c.top = clamp(c.top, 0, im.height-1);
    c.bottom = clamp(c.bottom, 0, im.height-c.top-1);
    c.left = clamp(c.left, 0, im.width-1);
    c.right = clamp(c.right, 0, im.width-c.left-1);
    return c;
  }

  function dividerSize(s){
    if(!s?.divider?.enabled) return 0;
    const d = s.divider;
    return (d.marginBefore || 0) + (d.thickness || 2) + (d.marginAfter || 0);
  }

  function computeLayout(ignoreCanvasCrop=false){
    const images = state.images;
    const orientation = state.orientation;
    if(!images.length){
      return { width: 1, height: 1, fullWidth:1, fullHeight:1, items: [], seams: [], dividers: [], imageBounds: [] };
    }

    const dims = images.map((im, i) => {
      const c = getEffectiveCrop(i);
      return {
        c,
        sw: Math.max(1, im.width - c.left - c.right),
        sh: Math.max(1, im.height - c.top - c.bottom)
      };
    });

    // v1.1/v1.2 单图裁剪规则：
    // - 纵向拼接时，左右裁剪会让当前图可见宽度变小；其它图按该统一宽度等比例缩小，不裁剪。
    // - 横向拼接时，上下裁剪会让当前图可见高度变小；其它图按该统一高度等比例缩小，不裁剪。
    const targetW = Math.max(1, Math.min(...dims.map(d => d.sw)));
    const targetH = Math.max(1, Math.min(...dims.map(d => d.sh)));

    let items = [], seamViews = [], divViews = [], imageBounds = [];
    let x = 0, y = 0;
    let fullWidth = 1, fullHeight = 1;

    if(orientation === 'vertical'){
      fullWidth = targetW;
      for(let i=0;i<images.length;i++){
        const d = dims[i];
        const scale = targetW / d.sw;
        const dw = targetW;
        const dh = Math.max(1, d.sh * scale);
        items.push({ type:'image', index:i, img:images[i], sx:d.c.left, sy:d.c.top, sw:d.sw, sh:d.sh, dx:0, dy:y, dw, dh, scale });
        imageBounds.push({ index:i, x:0, y, w:dw, h:dh, scaleX:scale, scaleY:scale, sw:d.sw, sh:d.sh });
        y += dh;
        if(i < images.length-1){
          const s = state.seams[i];
          seamViews.push({ index:i, seam:s, x:0, y, w:fullWidth, h:0 });
          const size = dividerSize(s);
          if(size){
            const dvr = s.divider;
            divViews.push({ index:i, x:0, y, w:fullWidth, h:size, divider:dvr });
            y += size;
          }
        }
      }
      fullHeight = y;
    } else {
      fullHeight = targetH;
      for(let i=0;i<images.length;i++){
        const d = dims[i];
        const scale = targetH / d.sh;
        const dw = Math.max(1, d.sw * scale);
        const dh = targetH;
        items.push({ type:'image', index:i, img:images[i], sx:d.c.left, sy:d.c.top, sw:d.sw, sh:d.sh, dx:x, dy:0, dw, dh, scale });
        imageBounds.push({ index:i, x, y:0, w:dw, h:dh, scaleX:scale, scaleY:scale, sw:d.sw, sh:d.sh });
        x += dw;
        if(i < images.length-1){
          const s = state.seams[i];
          seamViews.push({ index:i, seam:s, x, y:0, w:0, h:fullHeight });
          const size = dividerSize(s);
          if(size){
            const dvr = s.divider;
            divViews.push({ index:i, x, y:0, w:size, h:fullHeight, divider:dvr });
            x += size;
          }
        }
      }
      fullWidth = x;
    }

    const cc = state.canvasCrop;
    let crop = ignoreCanvasCrop ? {top:0,right:0,bottom:0,left:0} : {
      top: clamp(cc.top,0,fullHeight-1), left:clamp(cc.left,0,fullWidth-1),
      right: clamp(cc.right,0,fullWidth-1), bottom: clamp(cc.bottom,0,fullHeight-1)
    };
    crop.right = clamp(crop.right, 0, fullWidth - crop.left - 1);
    crop.bottom = clamp(crop.bottom, 0, fullHeight - crop.top - 1);
    return { width: fullWidth - crop.left - crop.right, height: fullHeight - crop.top - crop.bottom, fullWidth, fullHeight, crop, items, seams: seamViews, dividers: divViews, imageBounds };
  }

  function requestRender(){
    if(redrawPending) return;
    redrawPending = true;
    requestAnimationFrame(() => { redrawPending = false; render(); });
  }

  function setCanvasSize(){
    const dpr = window.devicePixelRatio || 1;
    const rect = stageWrap.getBoundingClientRect();
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function worldToScreen(x,y){ return { x: x*state.zoom + state.pan.x, y: y*state.zoom + state.pan.y }; }
  function screenToWorld(x,y){ return { x: (x-state.pan.x)/state.zoom, y: (y-state.pan.y)/state.zoom }; }

  function render(){
    setCanvasSize();
    const rect = stageWrap.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    hitAreas = [];
    layoutCache = computeLayout(state.preview ? false : true);
    dropHint.style.display = state.images.length ? 'none' : 'block';
    app.classList.toggle('preview', state.preview);
    if(!state.images.length){
      statusbar.textContent = 'Ready：拖入、打开或粘贴图片';
      updateNavigation(null);
      return;
    }

    ctx.save();
    ctx.translate(state.pan.x, state.pan.y);
    ctx.scale(state.zoom, state.zoom);
    drawComposition(ctx, layoutCache, false, !state.preview);
    if(!state.preview) drawOverlays(ctx, layoutCache);
    ctx.restore();

    const finalLayout = computeLayout(false);
    statusbar.textContent = `${state.orientation === 'vertical' ? '纵向' : '横向'} · ${state.images.length} 张图 · 输出 ${Math.round(finalLayout.width)}×${Math.round(finalLayout.height)} px · 缩放 ${Math.round(state.zoom*100)}%`;
    updateNavigation(layoutCache);
    if(state.activeHandle && !state.preview) requestRender();
  }


  function visibleWorldRect(){
    const rect = stageWrap.getBoundingClientRect();
    return {
      x: -state.pan.x / Math.max(0.0001, state.zoom),
      y: -state.pan.y / Math.max(0.0001, state.zoom),
      w: rect.width / Math.max(0.0001, state.zoom),
      h: rect.height / Math.max(0.0001, state.zoom),
      screenW: rect.width,
      screenH: rect.height
    };
  }

  function clampPanToLayout(layout){
    if(!layout) return;
    const rect = stageWrap.getBoundingClientRect();
    const minX = Math.min(0, rect.width - layout.fullWidth * state.zoom);
    const minY = Math.min(0, rect.height - layout.fullHeight * state.zoom);
    if(layout.fullWidth * state.zoom <= rect.width) state.pan.x = (rect.width - layout.fullWidth * state.zoom) / 2;
    else state.pan.x = clamp(state.pan.x, minX, 0);
    if(layout.fullHeight * state.zoom <= rect.height) state.pan.y = (rect.height - layout.fullHeight * state.zoom) / 2;
    else state.pan.y = clamp(state.pan.y, minY, 0);
  }

  function setViewportCenter(wx, wy){
    const rect = stageWrap.getBoundingClientRect();
    const layout = computeLayout(true);
    state.pan.x = rect.width / 2 - wx * state.zoom;
    state.pan.y = rect.height / 2 - wy * state.zoom;
    clampPanToLayout(layout);
    requestRender();
  }

  function setVerticalScrollRatio(ratio){
    const rect = stageWrap.getBoundingClientRect();
    const layout = computeLayout(true);
    const contentH = layout.fullHeight * state.zoom;
    if(contentH <= rect.height) return;
    const minY = rect.height - contentH;
    state.pan.y = minY * clamp(ratio, 0, 1);
    requestRender();
  }

  function setHorizontalScrollRatio(ratio){
    const rect = stageWrap.getBoundingClientRect();
    const layout = computeLayout(true);
    const contentW = layout.fullWidth * state.zoom;
    if(contentW <= rect.width) return;
    const minX = rect.width - contentW;
    state.pan.x = minX * clamp(ratio, 0, 1);
    requestRender();
  }

  function updateNavigation(layout){
    if(!layout || !state.images.length || state.preview){
      miniMap.classList.remove('show');
      vScroll.classList.remove('show');
      hScroll.classList.remove('show');
      return;
    }
    const rect = stageWrap.getBoundingClientRect();
    const contentW = layout.fullWidth * state.zoom;
    const contentH = layout.fullHeight * state.zoom;
    const showV = contentH > rect.height + 6;
    const showH = contentW > rect.width + 6;
    vScroll.classList.toggle('show', showV);
    hScroll.classList.toggle('show', showH);

    if(showV){
      const trackH = Math.max(1, vScroll.clientHeight || (rect.height - 42));
      const thumbH = clamp(trackH * rect.height / contentH, 28, trackH);
      const travel = Math.max(1, trackH - thumbH);
      const ratio = clamp(-state.pan.y / Math.max(1, contentH - rect.height), 0, 1);
      vThumb.style.height = thumbH + 'px';
      vThumb.style.top = (ratio * travel) + 'px';
    }
    if(showH){
      const trackW = Math.max(1, hScroll.clientWidth || (rect.width - 44));
      const thumbW = clamp(trackW * rect.width / contentW, 28, trackW);
      const travel = Math.max(1, trackW - thumbW);
      const ratio = clamp(-state.pan.x / Math.max(1, contentW - rect.width), 0, 1);
      hThumb.style.width = thumbW + 'px';
      hThumb.style.left = (ratio * travel) + 'px';
    }

    const showMap = showV && rect.width > 360 && rect.height > 260;
    miniMap.classList.toggle('show', showMap);
    if(!showMap) return;

    const maxW = window.matchMedia('(max-width: 760px)').matches ? 62 : 84;
    const maxH = Math.max(96, rect.height - 150);
    const mmW = maxW;
    const mmH = clamp(layout.fullHeight / Math.max(1, layout.fullWidth) * mmW, 96, maxH);
    const dpr = window.devicePixelRatio || 1;
    miniMapCanvas.style.width = mmW + 'px';
    miniMapCanvas.style.height = mmH + 'px';
    miniMapCanvas.width = Math.max(1, Math.floor(mmW * dpr));
    miniMapCanvas.height = Math.max(1, Math.floor(mmH * dpr));
    const mc = miniMapCanvas.getContext('2d');
    mc.setTransform(dpr,0,0,dpr,0,0);
    mc.clearRect(0,0,mmW,mmH);
    mc.save();
    mc.scale(mmW / Math.max(1, layout.fullWidth), mmH / Math.max(1, layout.fullHeight));
    drawComposition(mc, layout, true, true);
    mc.restore();

    const vw = visibleWorldRect();
    const sx = mmW / Math.max(1, layout.fullWidth);
    const sy = mmH / Math.max(1, layout.fullHeight);
    const fx = clamp(vw.x * sx, 0, mmW);
    const fy = clamp(vw.y * sy, 0, mmH);
    const fw = clamp(vw.w * sx, 8, mmW - fx);
    const fh = clamp(vw.h * sy, 14, mmH - fy);
    miniViewport.style.left = (5 + fx) + 'px';
    miniViewport.style.top = (5 + fy) + 'px';
    miniViewport.style.width = fw + 'px';
    miniViewport.style.height = fh + 'px';
  }

  function miniMapPointToWorld(e){
    const rect = miniMapCanvas.getBoundingClientRect();
    const layout = computeLayout(true);
    const x = clamp(e.clientX - rect.left, 0, rect.width);
    const y = clamp(e.clientY - rect.top, 0, rect.height);
    return { x: x / Math.max(1, rect.width) * layout.fullWidth, y: y / Math.max(1, rect.height) * layout.fullHeight };
  }


  function drawComposition(c, layout, exportMode=false, withUncroppedCanvas=false){
    const crop = withUncroppedCanvas ? {left:0,top:0} : layout.crop || {left:0,top:0};
    c.save();
    if(!withUncroppedCanvas){ c.translate(-crop.left, -crop.top); }
    c.fillStyle = '#fff';
    c.fillRect(0,0,layout.fullWidth,layout.fullHeight);
    for(const item of layout.items){
      try{
        c.drawImage(item.img.img, item.sx, item.sy, item.sw, item.sh, item.dx, item.dy, item.dw, item.dh);
      }catch(e){}
    }
    for(const dv of layout.dividers){
      const d = dv.divider;
      c.fillStyle = d.background || '#ffffff';
      c.fillRect(dv.x, dv.y, dv.w, dv.h);
      c.strokeStyle = d.color || '#111827';
      c.lineWidth = d.thickness || 2;
      if(d.style === 'dashed') c.setLineDash([10, 8]);
      else if(d.style === 'dotted') c.setLineDash([2, 7]);
      else c.setLineDash([]);
      c.beginPath();
      if(state.orientation === 'vertical'){
        const yy = dv.y + (d.marginBefore || 0) + (d.thickness || 2)/2;
        c.moveTo(dv.x, yy); c.lineTo(dv.x + dv.w, yy);
      } else {
        const xx = dv.x + (d.marginBefore || 0) + (d.thickness || 2)/2;
        c.moveTo(xx, dv.y); c.lineTo(xx, dv.y + dv.h);
      }
      c.stroke();
      c.setLineDash([]);
    }
    drawAnnotations(c, layout, exportMode);
    c.restore();
  }


  function viewportCenterWorld(){
    const rect = stageWrap.getBoundingClientRect();
    return screenToWorld(rect.width / 2, rect.height / 2);
  }

  function ensureSplitDraft(){
    const layout = computeLayout(true);
    if(!state.splitDraft){
      const center = viewportCenterWorld();
      state.splitDraft = { pos: state.orientation === 'vertical' ? Math.round(center.y) : Math.round(center.x) };
    }
    const max = state.orientation === 'vertical' ? layout.fullHeight : layout.fullWidth;
    state.splitDraft.pos = clamp(Math.round(state.splitDraft.pos || 0), 1, Math.max(1, max-1));
  }

  function syncSplitDraftToViewportCenter(){
    const layout = computeLayout(true);
    const center = viewportCenterWorld();
    const max = state.orientation === 'vertical' ? layout.fullHeight : layout.fullWidth;
    const raw = state.orientation === 'vertical' ? center.y : center.x;
    if(!state.splitDraft) state.splitDraft = {pos: 1};
    state.splitDraft.pos = clamp(Math.round(raw), 1, Math.max(1, max-1));
  }

  function drawDoubleChevron(c, x, y, dir, scale=1){
    // Small breathing double-chevron hint. It is visual only; no hit area is added here.
    const t = performance.now ? performance.now() : Date.now();
    const pulse = 0.72 + 0.28 * (0.5 + 0.5 * Math.sin(t / 360));
    const color = '#f6b700';
    const stroke = 3.2 / state.zoom * scale;
    const span = 8 / state.zoom * scale * (0.92 + 0.08 * pulse);
    const gap = 8 / state.zoom * scale;
    c.save();
    c.globalAlpha = pulse;
    c.strokeStyle = color;
    c.lineWidth = stroke;
    c.lineCap = 'round';
    c.lineJoin = 'round';
    const drawOne = (cx, cy) => {
      c.beginPath();
      if(dir === 'down'){ c.moveTo(cx-span, cy-span*0.55); c.lineTo(cx, cy+span*0.55); c.lineTo(cx+span, cy-span*0.55); }
      else if(dir === 'up'){ c.moveTo(cx-span, cy+span*0.55); c.lineTo(cx, cy-span*0.55); c.lineTo(cx+span, cy+span*0.55); }
      else if(dir === 'left'){ c.moveTo(cx+span*0.55, cy-span); c.lineTo(cx-span*0.55, cy); c.lineTo(cx+span*0.55, cy+span); }
      else if(dir === 'right'){ c.moveTo(cx-span*0.55, cy-span); c.lineTo(cx+span*0.55, cy); c.lineTo(cx-span*0.55, cy+span); }
      c.stroke();
    };
    if(dir === 'down' || dir === 'up'){ drawOne(x,y-gap/2); drawOne(x,y+gap/2); }
    else { drawOne(x-gap/2,y); drawOne(x+gap/2,y); }
    c.restore();
  }

  function drawSeamPill(c, x, y, vertical, area, active=false){
    drawPill(c, x, y, vertical ? '↕' : '↔', area, active);
  }


  function drawPill(c, x, y, text, area, active=false){
    // 控制按钮需要保持屏幕尺寸，不随图片缩放变得过小。
    const z = Math.max(0.03, state.zoom || 1);
    const padX = 16 / z, h = 38 / z;
    c.save();
    c.font = `700 ${20 / z}px ui-sans-serif, system-ui, sans-serif`;
    const w = Math.max(52 / z, c.measureText(text).width + padX*2);
    const rx = 16 / z;
    c.fillStyle = active ? '#ffbf00' : '#ffcc33';
    c.strokeStyle = '#f6b700';
    c.lineWidth = 1.5 / z;
    roundRect(c, x-w/2, y-h/2, w, h, rx);
    c.fill(); c.stroke();
    c.fillStyle = '#7a5200';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(text, x, y+1/z);
    c.restore();
    if(area) hitAreas.push({...area, x:x-w/2, y:y-h/2, w, h});
  }


  function drawArrowPill(c, x, y, dir, area, active=false){
    // 单图/整体裁剪的上下左右入口按钮：比普通 ✓ / + / 拼接按钮更小。
    // 双箭头提示不改尺寸，只缩小中间的单向箭头按钮。
    const symbol = {up:'↑', down:'↓', left:'←', right:'→'}[dir] || '•';
    const z = Math.max(0.03, state.zoom || 1);
    const padX = 10 / z, h = 32 / z;
    c.save();
    c.font = `700 ${18 / z}px ui-sans-serif, system-ui, sans-serif`;
    const w = Math.max(42 / z, c.measureText(symbol).width + padX*2);
    const rx = 13 / z;
    c.fillStyle = active ? '#ffbf00' : '#ffcc33';
    c.strokeStyle = '#f6b700';
    c.lineWidth = 1.35 / z;
    roundRect(c, x-w/2, y-h/2, w, h, rx);
    c.fill(); c.stroke();
    c.fillStyle = '#7a5200';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(symbol, x, y+0.5/z);
    c.restore();
    if(area) hitAreas.push({...area, x:x-w/2, y:y-h/2, w, h});

    const off = 34 / z;
    if(dir === 'up') drawDoubleChevron(c, x, y - off, 'up', .45);
    else if(dir === 'down') drawDoubleChevron(c, x, y + off, 'down', .45);
    else if(dir === 'left') drawDoubleChevron(c, x - off, y, 'left', .45);
    else if(dir === 'right') drawDoubleChevron(c, x + off, y, 'right', .45);
  }

  function drawActiveGuide(c, line, orientation, dragArea, arrowMode='both'){
    const verticalMove = orientation === 'vertical';
    c.save();
    c.strokeStyle = '#ffbf00';
    c.lineWidth = 2 / state.zoom;
    c.beginPath();
    if(verticalMove){ c.moveTo(line.x1, line.y); c.lineTo(line.x2, line.y); }
    else { c.moveTo(line.x, line.y1); c.lineTo(line.x, line.y2); }
    c.stroke();

    // Only the page/screenshot area is draggable. Double chevrons are hints only.
    if(dragArea){
      hitAreas.push({...dragArea, type:'activeDrag', cursor: verticalMove ? 'ns-resize' : 'ew-resize'});
    }

    if(verticalMove){
      const cx = (line.x1+line.x2)/2;
      if(arrowMode === 'both' || arrowMode === 'down') drawDoubleChevron(c, cx, line.y - 42 / state.zoom, 'down', .62);
      if(arrowMode === 'both' || arrowMode === 'up') drawDoubleChevron(c, cx, line.y + 42 / state.zoom, 'up', .62);
      drawPill(c, cx, line.y, '✓', {type:'activeDone', cursor:'pointer'}, true);
    } else {
      const cy = (line.y1+line.y2)/2;
      if(arrowMode === 'both' || arrowMode === 'left') drawDoubleChevron(c, line.x - 42 / state.zoom, cy, 'left', .62);
      if(arrowMode === 'both' || arrowMode === 'right') drawDoubleChevron(c, line.x + 42 / state.zoom, cy, 'right', .62);
      drawPill(c, line.x, cy, '✓', {type:'activeDone', cursor:'pointer'}, true);
    }
    c.restore();
  }

  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
  }

  function drawOverlays(c, layout){
    const mode = state.mode;
    c.save();
    c.lineWidth = 2 / state.zoom;
    if(mode === 'canvasCrop') drawCanvasCropOverlay(c, layout);
    if(mode === 'imageCrop') drawImageCropOverlay(c, layout);
    if(mode === 'seam') drawSeamOverlay(c, layout);
    if(mode === 'divider') {
      // 分割线模式分两种状态：
      // 1) 预定位：只显示唯一分割线 + 加号；
      // 2) 刚插入后的当前接缝编辑：只显示当前这一个接缝，不显示其它拼接线。
      if(state.activeHandle?.kind === 'seamCenter') drawSeamOverlay(c, layout);
      else drawDividerOverlay(c, layout);
    }
    if(mode === 'tools') drawToolsOverlay(c, layout);
    c.restore();
  }

  function drawSeamOverlay(c, layout){
    const vertical = state.orientation === 'vertical';
    const activeIndex = state.activeHandle?.kind === 'seamCenter' ? state.activeHandle.index : null;
    const seamList = activeIndex == null ? layout.seams : layout.seams.filter(sv => sv.index === activeIndex);
    for(const sv of seamList){
      const selected = state.selected?.type === 'seam' && state.selected.index === sv.index;
      const active = state.activeHandle?.kind === 'seamCenter' && state.activeHandle.index === sv.index;
      c.save();
      c.strokeStyle = active ? '#ffbf00' : (selected ? '#ffbf00' : 'rgba(246,183,0,.82)');
      c.lineWidth = (active || selected ? 3 : 2) / state.zoom;
      c.setLineDash(active || selected ? [] : [8,6]);
      c.beginPath();
      if(vertical){ c.moveTo(0, sv.y); c.lineTo(layout.fullWidth, sv.y); }
      else { c.moveTo(sv.x, 0); c.lineTo(sv.x, layout.fullHeight); }
      c.stroke();
      c.restore();
      if(active){
        // 当前接缝编辑时，用户面对的是一整张长图。
        // 拖动区域不能只限制在接缝相邻的两个内部 segment 上；
        // 接缝上方的整个页面区域都可以拖动来调上半部分，
        // 接缝下方的整个页面区域都可以拖动来调下半部分。
        if(vertical){
          hitAreas.push({type:'activeDragBefore', index:sv.index, x:0, y:0, w:layout.fullWidth, h:Math.max(0, sv.y), cursor:'ns-resize'});
          hitAreas.push({type:'activeDragAfter', index:sv.index, x:0, y:sv.y, w:layout.fullWidth, h:Math.max(0, layout.fullHeight - sv.y), cursor:'ns-resize'});
          drawActiveGuide(c, {x1:0,x2:layout.fullWidth,y:sv.y}, 'vertical', null, 'both');
        } else {
          hitAreas.push({type:'activeDragBefore', index:sv.index, x:0, y:0, w:Math.max(0, sv.x), h:layout.fullHeight, cursor:'ew-resize'});
          hitAreas.push({type:'activeDragAfter', index:sv.index, x:sv.x, y:0, w:Math.max(0, layout.fullWidth - sv.x), h:layout.fullHeight, cursor:'ew-resize'});
          drawActiveGuide(c, {x:sv.x,y1:0,y2:layout.fullHeight}, 'horizontal', null, 'both');
        }
      } else {
        if(vertical) drawSeamPill(c, layout.fullWidth/2, sv.y, true, {type:'seamCenter', index:sv.index, cursor:'pointer'}, true);
        else drawSeamPill(c, sv.x, layout.fullHeight/2, false, {type:'seamCenter', index:sv.index, cursor:'pointer'}, true);
      }
    }
  }

  function drawCanvasCropOverlay(c, layout){
    const cc = state.canvasCrop;
    const x = cc.left, y = cc.top;
    const w = Math.max(1, layout.fullWidth - cc.left - cc.right);
    const h = Math.max(1, layout.fullHeight - cc.top - cc.bottom);

    // 裁掉区域不可见：用画布背景直接盖掉，不做半透明显示。
    c.save();
    c.fillStyle = '#eef2f7';
    c.fillRect(0,0,layout.fullWidth, y);
    c.fillRect(0,y, x, h);
    c.fillRect(x+w,y, layout.fullWidth-(x+w), h);
    c.fillRect(0,y+h, layout.fullWidth, layout.fullHeight-(y+h));
    c.strokeStyle = '#ffbf00';
    c.lineWidth = 3 / state.zoom;
    c.strokeRect(x,y,w,h);
    c.restore();

    const midX = x + w/2, midY = y + h/2;
    const active = state.activeHandle?.kind === 'canvasCrop';
    if(active){
      const edge = state.activeHandle.edge;
      const area = {x, y, w, h};
      if(edge === 'top') drawActiveGuide(c, {x1:x,x2:x+w,y:y}, 'vertical', area, 'up');
      else if(edge === 'bottom') drawActiveGuide(c, {x1:x,x2:x+w,y:y+h}, 'vertical', area, 'down');
      else if(edge === 'left') drawActiveGuide(c, {x:x,y1:y,y2:y+h}, 'horizontal', area, 'left');
      else if(edge === 'right') drawActiveGuide(c, {x:x+w,y1:y,y2:y+h}, 'horizontal', area, 'right');
    } else {
      drawArrowPill(c, midX, y, 'up', {type:'canvasCrop', edge:'top', cursor:'pointer'}, true);
      drawArrowPill(c, midX, y+h, 'down', {type:'canvasCrop', edge:'bottom', cursor:'pointer'}, true);
      drawArrowPill(c, x, midY, 'left', {type:'canvasCrop', edge:'left', cursor:'pointer'}, true);
      drawArrowPill(c, x+w, midY, 'right', {type:'canvasCrop', edge:'right', cursor:'pointer'}, true);
    }
  }

  function drawImageCropOverlay(c, layout){
    const vertical = state.orientation === 'vertical';
    const seamActive = state.activeHandle?.kind === 'seamCenter' ? state.activeHandle : null;
    const activeHandle = state.activeHandle?.kind === 'imageCrop' ? state.activeHandle : null;

    if(seamActive){
      // 单图裁剪模式下，相邻两图交界处直接复用“拼接线”的完整能力。
      // 这里只显示当前正在编辑的这一条接缝，不显示其它单图箭头。
      drawSeamOverlay(c, layout);
      return;
    }

    if(activeHandle){
      // 单图裁剪编辑态：只显示当前图片的编辑态。
      // 其它图片只保留很淡的边界，不显示箭头、不添加 hit area，避免箭头叠加和误拦截。
      const activeBounds = layout.imageBounds.find(b => b.index === activeHandle.index);
      for(const b of layout.imageBounds){
        c.save();
        c.strokeStyle = b.index === activeHandle.index ? '#ffbf00' : 'rgba(246,183,0,.18)';
        c.lineWidth = (b.index === activeHandle.index ? 3 : 1.5) / state.zoom;
        c.strokeRect(b.x,b.y,b.w,b.h);
        c.restore();
      }
      if(activeBounds){
        const b = activeBounds;
        const edge = activeHandle.edge;
        // 当前图片整个可见区域都能拖动，不再只限制在线的某一侧。
        const area = {x:b.x, y:b.y, w:b.w, h:b.h};
        if(edge === 'top') drawActiveGuide(c, {x1:b.x,x2:b.x+b.w,y:b.y}, 'vertical', area, 'up');
        else if(edge === 'bottom') drawActiveGuide(c, {x1:b.x,x2:b.x+b.w,y:b.y+b.h}, 'vertical', area, 'down');
        else if(edge === 'left') drawActiveGuide(c, {x:b.x,y1:b.y,y2:b.y+b.h}, 'horizontal', area, 'left');
        else if(edge === 'right') drawActiveGuide(c, {x:b.x+b.w,y1:b.y,y2:b.y+b.h}, 'horizontal', area, 'right');
      }
      return;
    }

    for(const b of layout.imageBounds){
      const selected = state.selected?.type === 'image' && state.selected.index === b.index;
      c.save();
      c.strokeStyle = selected ? '#ffbf00' : 'rgba(246,183,0,.85)';
      c.lineWidth = (selected ? 3 : 2) / state.zoom;
      c.strokeRect(b.x,b.y,b.w,b.h);
      c.restore();

      // 单图裁剪默认态：每张图的“外边界”显示单向箭头。
      // 相邻两图交界处不再显示两个单向箭头，改为下方 seam 控件直接复用拼接线能力。
      const isFirst = b.index === 0;
      const isLast = b.index === state.images.length - 1;
      if(vertical){
        if(isFirst) drawArrowPill(c, b.x+b.w/2, b.y, 'up', {type:'imageCrop', index:b.index, edge:'top', cursor:'pointer'}, true);
        if(isLast) drawArrowPill(c, b.x+b.w/2, b.y+b.h, 'down', {type:'imageCrop', index:b.index, edge:'bottom', cursor:'pointer'}, true);
        drawArrowPill(c, b.x, b.y+b.h/2, 'left', {type:'imageCrop', index:b.index, edge:'left', cursor:'pointer'}, true);
        drawArrowPill(c, b.x+b.w, b.y+b.h/2, 'right', {type:'imageCrop', index:b.index, edge:'right', cursor:'pointer'}, true);
      } else {
        drawArrowPill(c, b.x+b.w/2, b.y, 'up', {type:'imageCrop', index:b.index, edge:'top', cursor:'pointer'}, true);
        drawArrowPill(c, b.x+b.w/2, b.y+b.h, 'down', {type:'imageCrop', index:b.index, edge:'bottom', cursor:'pointer'}, true);
        if(isFirst) drawArrowPill(c, b.x, b.y+b.h/2, 'left', {type:'imageCrop', index:b.index, edge:'left', cursor:'pointer'}, true);
        if(isLast) drawArrowPill(c, b.x+b.w, b.y+b.h/2, 'right', {type:'imageCrop', index:b.index, edge:'right', cursor:'pointer'}, true);
      }
    }

    // 两张图交界处直接使用拼接线控件：纵向是 上图底部/下图顶部，横向是 左图右侧/右图左侧。
    for(const sv of layout.seams){
      if(vertical) drawSeamPill(c, layout.fullWidth/2, sv.y, true, {type:'seamCenter', index:sv.index, cursor:'pointer'}, true);
      else drawSeamPill(c, sv.x, layout.fullHeight/2, false, {type:'seamCenter', index:sv.index, cursor:'pointer'}, true);
    }
  }

  function splitDraftIsVisible(layout, marginPx=0){
    if(!state.splitDraft) return false;
    const rect = stageWrap.getBoundingClientRect();
    const pos = Math.round(state.splitDraft.pos || 0);
    if(state.orientation === 'vertical'){
      const sy = pos * state.zoom + state.pan.y;
      return sy >= marginPx && sy <= rect.height - marginPx;
    }
    const sx = pos * state.zoom + state.pan.x;
    return sx >= marginPx && sx <= rect.width - marginPx;
  }

  function drawDividerOverlay(c, layout){
    ensureSplitDraft();
    // v1.4 分割线预定位态：
    // - 如果分割线还在当前可视范围内，保持不动，尊重用户刚刚调好的位置；
    // - 如果分割线已经离开当前可视范围，自动跳到屏幕中心，避免长图放大后还要回头找线。
    const canAutoFollow = !drag || drag.type === 'pan';
    if(canAutoFollow && !splitDraftIsVisible(layout)){
      syncSplitDraftToViewportCenter();
    }
    const vertical = state.orientation === 'vertical';
    const pos = state.splitDraft.pos;
    c.save();
    c.strokeStyle = 'rgba(246,183,0,.92)';
    c.lineWidth = 2.5 / state.zoom;
    c.beginPath();
    if(vertical){ c.moveTo(0,pos); c.lineTo(layout.fullWidth,pos); }
    else { c.moveTo(pos,0); c.lineTo(pos,layout.fullHeight); }
    c.stroke();
    c.restore();
    if(vertical){
      hitAreas.push({type:'splitDraftDrag', x:0, y:pos-10, w:layout.fullWidth, h:20, cursor:'ns-resize'});
      drawPill(c, layout.fullWidth/2, pos, '+', {type:'splitDraftCommit', cursor:'pointer'}, true);
    } else {
      hitAreas.push({type:'splitDraftDrag', x:pos-10, y:0, w:20, h:layout.fullHeight, cursor:'ew-resize'});
      drawPill(c, pos, layout.fullHeight/2, '+', {type:'splitDraftCommit', cursor:'pointer'}, true);
    }
  }


  const svgIcon = name => ({
    select:'<svg viewBox="0 0 24 24"><path d="M4 4l7 17 2-7 7-2z"/></svg>',
    shape:'<svg viewBox="0 0 24 24"><rect x="4" y="4" width="10" height="10" rx="1"/><circle cx="17" cy="17" r="4"/></svg>',
    pen:'<svg viewBox="0 0 24 24"><path d="M4 20l4-1 11-11-3-3L5 16z"/><path d="M13 6l3 3"/></svg>',
    arrow:'<svg viewBox="0 0 24 24"><path d="M5 19L19 5"/><path d="M10 5h9v9"/></svg>',
    text:'<svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M12 6v12"/><path d="M8 18h8"/></svg>',
    badge:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8"/><path d="M10 10l2-2 2 2"/></svg>',
    mosaic:'<svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg>',
    eraser:'<svg viewBox="0 0 24 24"><path d="M4 16l8-8 6 6-6 6H8z"/><path d="M12 20h8"/></svg>',
    watermark:'<svg viewBox="0 0 24 24"><path d="M4 16c3-8 13-8 16 0"/><path d="M7 16c2-4 8-4 10 0"/><path d="M9 9h6"/><path d="M12 6v6"/></svg>',
    line:'<svg viewBox="0 0 24 24"><path d="M5 19L19 5"/></svg>',
    doubleArrow:'<svg viewBox="0 0 24 24"><path d="M5 19L19 5"/><path d="M10 5h9v9"/><path d="M14 19H5v-9"/></svg>',
    circle:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>',
    rect:'<svg viewBox="0 0 24 24"><rect x="5" y="6" width="14" height="12" rx="1"/></svg>'
  }[name] || '•');

  function activeToolFromSettings(){
    const s = state.toolSettings;
    if(s.group === 'select') return 'select';
    if(s.group === 'shape') return s.shapeKind === 'circle' ? (s.shapeFill ? 'circleFill' : 'circle') : (s.shapeFill ? 'boxFill' : 'box');
    if(s.group === 'pen') return s.penKind === 'highlight' ? 'highlight' : 'pen';
    if(s.group === 'arrow') return s.arrowKind || 'arrow';
    if(s.group === 'text') return 'text';
    if(s.group === 'badge') return 'badge';
    if(s.group === 'mosaic') return s.mosaicKind === 'free' ? 'mosaicPen' : 'mosaic';
    if(s.group === 'eraser') return 'eraser';
    if(s.group === 'watermark') return 'watermark';
    return 'select';
  }

  function applyActiveTool(){
    state.toolArmed = activeToolFromSettings();
  }

  function findExistingWatermarkIndex(){
    return state.annotations.findIndex(a => a && a.type === 'watermark');
  }

  function selectAnnotationForEdit(index){
    if(index < 0 || index >= state.annotations.length) return false;
    state.selected = {type:'annotation', index};
    renderProps(); requestRender();
    return true;
  }

  function groupForAnnotationType(type){
    if(['box','boxFill','circle','circleFill','redact'].includes(type)) return 'shape';
    if(['pen','highlight'].includes(type)) return 'pen';
    if(['line','arrow','doubleArrow'].includes(type)) return 'arrow';
    if(type === 'text') return 'text';
    if(type === 'badge') return 'badge';
    if(['mosaic','mosaicPen'].includes(type)) return 'mosaic';
    if(type === 'watermark') return 'watermark';
    return 'select';
  }

  function setToolGroup(group){
    state.toolSettings.group = group;
    if(group === 'watermark'){
      const idx = findExistingWatermarkIndex();
      state.selected = idx >= 0 ? {type:'annotation', index:idx} : null;
    } else if(group !== 'select') {
      state.selected = null;
    }
    applyActiveTool();
    renderProps(); requestRender();
  }

  function isDesktopLayout(){ return window.matchMedia('(min-width: 761px)').matches; }

  function attachToolUi(){
    if(!toolDock || !toolPopover) return;
    const desktopSlot = $('#desktopToolDockSlot');
    const desktopPanel = $('#desktopToolPanel');
    if(isDesktopLayout() && state.mode === 'tools' && desktopSlot && desktopPanel){
      if(toolDock.parentElement !== desktopSlot) desktopSlot.appendChild(toolDock);
      if(toolPopover.parentElement !== desktopPanel) desktopPanel.appendChild(toolPopover);
    } else {
      if(toolDock.parentElement !== stage) stage.appendChild(toolDock);
      if(toolPopover.parentElement !== stage) stage.appendChild(toolPopover);
    }
  }

  function renderToolDock(){
    if(!toolDock || !toolPopover) return;
    attachToolUi();
    if(state.mode !== 'tools' || state.preview || !state.images.length){
      toolDock.classList.remove('show');
      toolPopover.classList.remove('show');
      return;
    }
    const groups = [
      ['select','select','选择 / 移动'],
      ['shape','shape','几何图形'],
      ['pen','pen','铅笔 / 荧光笔'],
      ['arrow','arrow','直线 / 箭头'],
      ['text','text','文字'],
      ['badge','badge','标号 1~10'],
      ['mosaic','mosaic','马赛克'],
      ['eraser','eraser','橡皮擦'],
      ['watermark','watermark','水印']
    ];
    const activeGroup = state.toolSettings.group || 'select';
    toolDock.innerHTML = groups.map(([g,icon,title],i) => `${i===7?'<span class="tool-dock-sep"></span>':''}<button class="tool-dock-btn ${activeGroup===g?'active':''} ${g==='eraser'?'danger':''}" data-tool-group="${g}" title="${title}" aria-label="${title}">${svgIcon(icon)}</button>`).join('');
    toolDock.classList.add('show');
    toolDock.querySelectorAll('[data-tool-group]').forEach(btn=>{
      btn.addEventListener('pointerdown', e=>e.stopPropagation());
      btn.addEventListener('click', e=>{ e.stopPropagation(); setToolGroup(btn.dataset.toolGroup); });
    });
    renderToolPopover();
  }

  function activeAnchorButton(){
    if(!toolDock) return null;
    const group = state.toolSettings.group || 'select';
    return toolDock.querySelector(`[data-tool-group="${group}"]`) || toolDock.querySelector('[data-tool-group="select"]');
  }

  function positionToolPopover(anchor){
    if(!toolPopover || !anchor) return;
    if(isDesktopLayout() && state.mode === 'tools'){
      toolPopover.style.left = '';
      toolPopover.style.top = '';
      toolPopover.style.visibility = '';
      return;
    }
    toolPopover.style.visibility = 'hidden';
    toolPopover.classList.add('show');
    const sw = stageWrap.clientWidth, sh = stageWrap.clientHeight;
    const pw = toolPopover.offsetWidth, ph = toolPopover.offsetHeight;
    const ar = anchor.getBoundingClientRect();
    const sr = stageWrap.getBoundingClientRect();
    const ax = ar.left - sr.left + ar.width/2;
    const ayTop = ar.top - sr.top;
    const ayBottom = ar.bottom - sr.top;
    let left = clamp(ax - pw/2, 8, Math.max(8, sw - pw - 8));
    let below = ayBottom + 8;
    let above = ayTop - ph - 8;
    let top = (below + ph <= sh - 8) ? below : Math.max(8, above);
    if(top + ph > sh - 8) top = Math.max(8, sh - ph - 8);
    toolPopover.style.left = `${left}px`;
    toolPopover.style.top = `${top}px`;
    toolPopover.style.visibility = '';
  }

  function renderToolPopover(){
    if(!toolPopover) return;
    if(state.mode !== 'tools' || state.preview || !state.images.length){ toolPopover.classList.remove('show'); return; }
    const a = state.selected?.type === 'annotation' ? state.annotations[state.selected.index] : null;
    const html = a ? annotationPopover(a) : groupPopover();
    if(!html){ toolPopover.innerHTML = ''; toolPopover.classList.remove('show'); return; }
    toolPopover.innerHTML = html;
    toolPopover.classList.toggle('compact', !a && ['select','eraser'].includes(state.toolSettings.group));
    toolPopover.onpointerdown = e => e.stopPropagation();
    bindToolPopoverEvents();
    toolPopover.classList.add('show');
    requestAnimationFrame(()=>positionToolPopover(activeAnchorButton()));
  }

  const TOOL_COLORS = ['#ef4444','#f97316','#facc15','#22c55e','#3b82f6','#111827','#ffffff'];
  const BG_COLORS = ['transparent','#ffffff','#111827','#ffeb3b','#fee2e2','#dbeafe'];

  function colorInput(key, value){ return `<input class="mini-color-input" type="color" data-tool-setting="${key}" value="${value || '#ef4444'}" title="自定义颜色">`; }
  function numberInput(key, value, min=1, max='', step=1){ return `<input class="mini-number-input" type="number" data-tool-setting="${key}" value="${value}" min="${min}" ${max!==''?`max="${max}"`:''} step="${step}" title="数字设定">`; }
  function chip(key, val, active, body, title=''){ return `<button class="pop-chip ${active?'active':''}" data-tool-setting="${key}" data-value="${val}" title="${title}" aria-label="${title}">${body}</button>`; }
  function boolChip(key, active, body, title=''){ return `<button class="pop-chip ${active?'active':''}" data-tool-setting="${key}" data-value="toggle" title="${title}" aria-label="${title}">${body}</button>`; }
  function compactPanel(body){ return `<div class="pop-compact">${body}</div>`; }
  function compactRow(body){ return `<div class="pop-inline">${body}</div>`; }
  function swatchButton(key, color, active=false, ann=false, title=''){
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    const label = title || (color === 'transparent' ? '透明' : color);
    const fill = color === 'transparent' ? 'linear-gradient(45deg,#fff 0 45%,#ef4444 45% 55%,#fff 55% 100%)' : color;
    return `<button class="color-swatch ${active?'active':''}" ${attr} data-value="${color}" title="${label}" aria-label="${label}"><span style="background:${fill}"></span></button>`;
  }
  function colorPalette(key, value, ann=false, colors=TOOL_COLORS){
    return `<span class="color-strip">${colors.map(c=>swatchButton(key,c,(value||'').toLowerCase()===c.toLowerCase(),ann)).join('')}${ann?'':colorInput(key,value)}</span>`;
  }
  function widthLine(w){ return `<span class="line-preview" style="height:${Math.max(1,Math.min(18,+w||1))}px;width:${18 + Math.min(26,(+w||1)*2)}px"></span>`; }
  function widthControl(key, value, min=1, max=80, ann=false, presets=null){
    const basePresets = presets || [1,2,4,8];
    const values = [...new Set(basePresets)].filter(v=>v>=min && v<=max);
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    const wheelAttr = ann ? `data-ann-width="${key}"` : `data-tool-width="${key}"`;
    const current = Math.round(+value || min);
    return `<span class="width-control" ${wheelAttr} data-min="${min}" data-max="${max}" title="滚轮调粗细">${values.map(v=>`<button class="line-chip ${current===v?'active':''}" ${attr} data-value="${v}" title="${v}">${widthLine(v)}</button>`).join('')}<input class="width-number" type="number" ${attr} value="${current}" min="${min}" max="${max}" step="1" title="数字设定"></span>`;
  }
  function opacityControl(key, value, ann=false){
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    const v = value == null ? 1 : value;
    return `<input class="tiny-number" type="number" ${attr} value="${v}" min="0.05" max="1" step="0.05" title="透明度">`;
  }
  function repeatControl(key, value, ann=false){
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    const current = Math.round(+value || 1);
    return `<span class="density-strip">${[1,4,9,16,25].map(v=>`<button class="pop-chip ${current===v?'active':''}" ${attr} data-value="${v}" title="${v}">${'·'.repeat(Math.min(5,Math.ceil(Math.sqrt(v))))}</button>`).join('')}<input class="tiny-number" type="number" ${attr} value="${current}" min="1" max="80" step="1" title="次数"></span>`;
  }
  function sizeButtons(key, value, min, max, ann=false){
    const attr = ann ? `data-ann-step="${key}"` : `data-tool-step="${key}"`;
    const inputAttr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    return `<span class="size-control"><button class="pop-chip" ${attr} data-delta="-2" data-min="${min}" data-max="${max}" title="缩小">A−</button><input class="tiny-number" type="number" ${inputAttr} value="${Math.round(+value||min)}" min="${min}" max="${max}" step="1" title="数字设定"><button class="pop-chip" ${attr} data-delta="2" data-min="${min}" data-max="${max}" title="放大">A+</button></span>`;
  }
  function textInput(key, value, ann=false, title='文字'){
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    return `<input class="compact-text-input" type="text" ${attr} value="${escapeHtml(value||'')}" title="${title}" placeholder="${title}">`;
  }
  function annChip(key, val, active, body, title=''){ return `<button class="pop-chip ${active?'active':''}" data-ann="${key}" data-value="${val}" title="${title}" aria-label="${title}">${body}</button>`; }

  function groupPopover(){
    const s = state.toolSettings, g = s.group || 'select';
    if(g === 'select') return '';
    if(g === 'shape') return compactPanel(
      compactRow(`${chip('shapeKind','box',s.shapeKind!=='circle',svgIcon('rect'),'矩形')}${chip('shapeKind','circle',s.shapeKind==='circle',svgIcon('circle'),'圆形')}${boolChip('shapeFill',!!s.shapeFill,'◩','填充 / 空心')}`)+
      compactRow(`${colorPalette('color',s.color)}${colorPalette('fillColor',s.fillColor,false,['#fee2e2','#ffedd5','#fef9c3','#dcfce7','#dbeafe','#ffffff'])}`)+
      compactRow(`${widthControl('lineWidth',s.lineWidth||4,1,64)}${opacityControl('opacity',s.opacity||1)}`)
    );
    if(g === 'pen'){
      const widthKey = s.penKind==='highlight' ? 'highlightWidth' : 'penWidth';
      const widthVal = s.penKind==='highlight' ? (s.highlightWidth||18) : (s.penWidth||4);
      return compactPanel(
        compactRow(`${chip('penKind','pen',s.penKind!=='highlight','✎','自由笔')}${chip('penKind','highlight',s.penKind==='highlight','▰','荧光笔')}${colorPalette('penColor',s.penColor || (s.penKind==='highlight'?'#facc15':'#ef4444'))}`)+
        compactRow(`${widthControl(widthKey,widthVal,1,96)}`)
      );
    }
    if(g === 'arrow') return compactPanel(
      compactRow(`${chip('arrowKind','line',s.arrowKind==='line',svgIcon('line'),'直线')}${chip('arrowKind','arrow',s.arrowKind!=='line'&&s.arrowKind!=='doubleArrow',svgIcon('arrow'),'单箭头')}${chip('arrowKind','doubleArrow',s.arrowKind==='doubleArrow',svgIcon('doubleArrow'),'双箭头')}${colorPalette('color',s.color)}`)+
      compactRow(`${widthControl('lineWidth',s.lineWidth||4,1,64)}`)
    );
    if(g === 'text') return compactPanel(
      compactRow(`${textInput('textValue',s.textValue||'输入文字',false,'文字')}`)+
      compactRow(`${sizeButtons('textSize',s.textSize||28,8,160)}${colorPalette('textColor',s.textColor||'#111827')}${boolChip('textOutline',!!s.textOutline,'Å','描边')}`)+
      compactRow(`${['transparent','#ffffff','#111827','#ffeb3b'].map(c=>swatchButton('textBg',c,(s.textBg||'transparent')===c,false,c==='transparent'?'透明背景':'背景')).join('')}`)
    );
    if(g === 'badge') return compactPanel(
      compactRow(`${Array.from({length:10},(_,i)=>chip('badgeNumber',i+1,(s.badgeNumber||1)===i+1,String(i+1),`标号 ${i+1}`)).join('')}`)+
      compactRow(`${colorPalette('badgeColor',s.badgeColor||'#2f80ed')}${sizeButtons('badgeSize',s.badgeSize||34,14,120)}`)
    );
    if(g === 'mosaic') return compactPanel(
      compactRow(`${chip('mosaicKind','mosaic',s.mosaicKind!=='free','▦','矩形马赛克')}${chip('mosaicKind','free',s.mosaicKind==='free','✎','自由马赛克')}${widthControl('mosaicGrid',s.mosaicGrid||14,4,80)}`)
    );
    if(g === 'eraser') return compactPanel(compactRow(`${widthControl('eraserSize',s.eraserSize||24,4,120,false,[4,8,16,32])}`));
    if(g === 'watermark') return compactPanel(
      compactRow(`${textInput('watermarkText',s.watermarkText||'水印',false,'水印')}`)+
      compactRow(`${sizeButtons('watermarkSize',s.watermarkSize||34,8,180)}${colorPalette('watermarkColor',s.watermarkColor||'#111827')}${opacityControl('watermarkOpacity',s.watermarkOpacity||.22)}${repeatControl('watermarkRepeat',s.watermarkRepeat||1)}`)
    );
    return '';
  }

  function annotationPopover(a){
    const shapeLike = ['box','boxFill','circle','circleFill','mosaic','redact','line','arrow','doubleArrow'].includes(a.type);
    const lineLike = ['box','boxFill','circle','circleFill','line','arrow','doubleArrow','pen','highlight'].includes(a.type);
    const textLike = ['text','watermark'].includes(a.type);
    const opacityLike = ['watermark','highlight','boxFill','circleFill','mosaic','mosaicPen'].includes(a.type);
    let html = '';
    html += compactRow(`<input class="tiny-number" type="number" data-ann="x" value="${Math.round(a.x||0)}" title="X"><input class="tiny-number" type="number" data-ann="y" value="${Math.round(a.y||0)}" title="Y">${shapeLike ? `<input class="tiny-number" type="number" data-ann="w" value="${Math.round(a.w||180)}" title="宽"><input class="tiny-number" type="number" data-ann="h" value="${Math.round(a.h||90)}" title="高">` : ''}`);
    if(['box','boxFill','circle','circleFill'].includes(a.type)){
      const isCircle = a.type.startsWith('circle');
      const isFill = a.type.endsWith('Fill');
      html += compactRow(`${annChip('type',isCircle?(isFill?'boxFill':'box'):(isFill?'box':'box'),!isCircle,svgIcon('rect'),'矩形')}${annChip('type',isCircle?(isFill?'circleFill':'circle'):(isFill?'circle':'circle'),isCircle,svgIcon('circle'),'圆形')}${annChip('type',isCircle?(isFill?'circle':'circleFill'):(isFill?'box':'boxFill'),isFill,'◩','填充 / 空心')}`);
    }
    if(['line','arrow','doubleArrow'].includes(a.type)) html += compactRow(`${annChip('type','line',a.type==='line',svgIcon('line'),'直线')}${annChip('type','arrow',a.type==='arrow',svgIcon('arrow'),'单箭头')}${annChip('type','doubleArrow',a.type==='doubleArrow',svgIcon('doubleArrow'),'双箭头')}`);
    if(textLike) html += compactRow(`${textInput('text',a.text||'',true,'文字')}${sizeButtons('fontSize',a.fontSize||28,8,180,true)}`);
    if(a.type === 'badge') html += compactRow(`${Array.from({length:10},(_,i)=>annChip('text',String(i+1),String(a.text||'1')===String(i+1),String(i+1),`标号 ${i+1}`)).join('')}${sizeButtons('fontSize',a.fontSize||34,14,120,true)}`);
    html += compactRow(`${colorPalette('color',a.color||'#ef4444',true)}${['boxFill','circleFill'].includes(a.type) ? colorPalette('fillColor',a.fillColor||'#fee2e2',true,['#fee2e2','#ffedd5','#fef9c3','#dcfce7','#dbeafe','#ffffff']) : ''}`);
    if(textLike) html += compactRow(`${annChip('outline','toggle',!!a.outline,'Å','描边')}${['transparent','#ffffff','#111827','#ffeb3b'].map(c=>swatchButton('bg',c,(a.bg||'transparent')===c,true,c==='transparent'?'透明背景':'背景')).join('')}`);
    if(lineLike) html += compactRow(`${widthControl('lineWidth',a.lineWidth || (a.type==='highlight'?18:4),1,96,true)}`);
    if(a.type==='mosaic' || a.type==='mosaicPen') html += compactRow(`${widthControl('gridSize',a.gridSize||14,4,80,true)}`);
    if(a.type==='watermark') html += compactRow(`${repeatControl('repeatCount',a.repeatCount||1,true)}`);
    if(opacityLike) html += compactRow(`${opacityControl('opacity',a.opacity == null ? 1 : a.opacity,true)}`);
    html += `<div class="pop-actions compact-actions"><button class="mini-btn warn" id="deleteAnnotationBtnFloat" title="删除">✕</button><button class="mini-btn" id="duplicateAnnotationBtnFloat" title="复制">⧉</button></div>`;
    return compactPanel(html);
  }
  function bindToolPopoverEvents(){
    if(!toolPopover) return;
    const numericToolKeys = ['lineWidth','penWidth','highlightWidth','textSize','badgeNumber','badgeSize','mosaicGrid','eraserSize','watermarkSize','watermarkRepeat'];
    const numericAnnKeys = ['x','y','w','h','fontSize','lineWidth','gridSize','repeatCount'];

    toolPopover.querySelectorAll('[data-tool-setting]').forEach(el=>{
      const ev = (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'number' || el.type === 'color')) ? 'input' : 'click';
      el.addEventListener(ev, e=>{
        const key = el.dataset.toolSetting;
        let val = el.dataset.value != null ? el.dataset.value : (el.type === 'checkbox' ? el.checked : el.value);
        if(val === 'toggle') val = !state.toolSettings[key];
        if(['shapeFill','textOutline'].includes(key)) val = !!val;
        if(numericToolKeys.includes(key)) val = Math.round(+val || 1);
        if(['opacity','watermarkOpacity'].includes(key)) val = clamp(parseFloat(val || '1'), .05, 1);
        state.toolSettings[key] = val;
        applyActiveTool();
        if(el.tagName === 'INPUT' && ['text','number','color'].includes(el.type)) requestRender();
        else { renderToolDock(); requestRender(); }
      });
    });

    toolPopover.querySelectorAll('[data-tool-width]').forEach(box=>{
      box.addEventListener('wheel', e=>{
        e.preventDefault();
        const key = box.dataset.toolWidth;
        const min = Math.round(+box.dataset.min || 1);
        const max = Math.round(+box.dataset.max || 120);
        const next = clamp(Math.round(+state.toolSettings[key] || min) + (e.deltaY < 0 ? 1 : -1), min, max);
        state.toolSettings[key] = next;
        applyActiveTool();
        renderToolDock(); requestRender();
      }, {passive:false});
    });

    toolPopover.querySelectorAll('[data-tool-step]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.preventDefault();
        const key = btn.dataset.toolStep;
        const min = Math.round(+btn.dataset.min || 1);
        const max = Math.round(+btn.dataset.max || 999);
        const delta = Math.round(+btn.dataset.delta || 0);
        state.toolSettings[key] = clamp(Math.round(+state.toolSettings[key] || min) + delta, min, max);
        applyActiveTool(); renderToolDock(); requestRender();
      });
    });

    toolPopover.querySelectorAll('[data-ann]').forEach(el=>{
      const ev = (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'number' || el.type === 'color')) ? 'input' : 'click';
      el.addEventListener(ev, ()=> updateAnnotationInput(el));
    });

    toolPopover.querySelectorAll('[data-ann-width]').forEach(box=>{
      box.addEventListener('wheel', e=>{
        e.preventDefault();
        const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
        if(idx < 0) return;
        const key = box.dataset.annWidth;
        const min = Math.round(+box.dataset.min || 1);
        const max = Math.round(+box.dataset.max || 120);
        const a = state.annotations[idx];
        pushHistory();
        a[key] = clamp(Math.round(+a[key] || min) + (e.deltaY < 0 ? 1 : -1), min, max);
        renderToolPopover(); requestRender();
      }, {passive:false});
    });
