<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LongShot Stitch & Trim - 长图拼裁工具</title>
  <style>
    :root{
      --bg:#f3f5f8;
      --panel:#ffffff;
      --panel-2:#f8fafc;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#d9dee7;
      --accent:#ffcc33;
      --accent-strong:#f6b700;
      --blue:#2f80ed;
      --danger:#ef4444;
      --shadow:0 10px 30px rgba(15,23,42,.10);
      --radius:14px;
      --topbar:54px;
      --sidebar:328px;
      --mobilebar:74px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);overflow:hidden}
    button,input,select{font:inherit}
    button{border:0;background:none;color:inherit;cursor:pointer}
    button:disabled{opacity:.45;cursor:not-allowed}
    .app{height:100vh;display:grid;grid-template-rows:var(--topbar) 1fr;grid-template-columns:var(--sidebar) 1fr;background:var(--bg)}
    .topbar{grid-column:1/3;display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(16px);z-index:5}
    .brand{display:flex;align-items:center;gap:10px;font-weight:760;margin-right:8px;white-space:nowrap}
    .brand-mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#ffe58a,#ffc12a);display:grid;place-items:center;box-shadow:0 5px 14px rgba(246,183,0,.25)}
    .brand small{display:block;color:var(--muted);font-weight:500;font-size:11px;margin-top:-2px}
    .toolbar-group{display:flex;align-items:center;gap:6px;padding:0 8px;border-left:1px solid var(--line)}
    .tool-btn,.file-label{height:36px;padding:0 11px;border:1px solid var(--line);border-radius:10px;background:var(--panel);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .tool-btn:hover,.file-label:hover{border-color:#b9c2d1;background:#fbfdff}
    .primary{background:#111827;color:#fff;border-color:#111827}
    .primary:hover{background:#030712}
    .blue{background:var(--blue);color:#fff;border-color:var(--blue)}
    .danger{color:var(--danger)}
    .spacer{flex:1}
    #fileInput,#projectInput{display:none}
    .sidebar{grid-row:2;grid-column:1;min-width:0;display:grid;grid-template-rows:auto 1fr;border-right:1px solid var(--line);background:var(--panel);z-index:3}
    .mode-panel{padding:12px;border-bottom:1px solid var(--line);background:#fff}
    .mode-title{font-size:12px;color:var(--muted);margin:0 0 8px 2px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
    .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .mode-btn{height:54px;border:1px solid var(--line);border-radius:13px;background:var(--panel-2);display:flex;align-items:center;gap:10px;padding:0 10px;text-align:left}
    .mode-btn:hover{border-color:#b8c1cf;background:#fff}
    .mode-btn.active{border-color:var(--accent-strong);background:#fff8d5;box-shadow:0 0 0 3px rgba(255,204,51,.18)}
    .mode-icon{width:26px;height:26px;display:grid;place-items:center;font-weight:800;font-size:18px;color:#111827}
    .mode-label{font-size:13px;font-weight:720;line-height:1.15}
    .mode-label span{display:block;color:var(--muted);font-size:11px;font-weight:500;margin-top:2px}
    .props{min-height:0;overflow:auto;padding:12px;background:linear-gradient(#fff,#f8fafc)}
    .prop-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(15,23,42,.03)}
    .prop-card h3{margin:0 0 10px;font-size:14px}
    .hint{font-size:12px;color:var(--muted);line-height:1.6;margin:0}
    .row{display:flex;gap:8px;align-items:center;margin:8px 0}
    .row label{font-size:12px;color:var(--muted);min-width:78px}
    .row input[type="number"], .row input[type="text"], .row select, .row input[type="color"]{height:34px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:0 8px;min-width:0;flex:1}
    .row input[type="color"]{padding:3px;max-width:58px}
    .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .mini-btn{height:34px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:12px;font-weight:650}
    .mini-btn:hover{background:#f9fafb;border-color:#b8c1cf}
    .mini-btn.active{background:#111827;color:#fff;border-color:#111827}
    .mini-btn.warn{color:var(--danger)}
    .image-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow:auto}
    .image-item{border:1px solid var(--line);border-radius:11px;padding:8px;background:#fff;display:grid;grid-template-columns:44px 1fr auto;gap:8px;align-items:center}
    .image-item.selected{border-color:var(--accent-strong);box-shadow:0 0 0 3px rgba(255,204,51,.18)}
    .thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:#eef2f7;border:1px solid #e5e7eb}
    .image-name{font-size:12px;font-weight:720;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
    .image-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .tiny-actions{display:flex;gap:4px;flex-direction:column}
    .tiny-actions button{width:24px;height:20px;border:1px solid var(--line);border-radius:6px;background:#f8fafc;font-size:12px}
    .stage-wrap{grid-row:2;grid-column:2;min-width:0;min-height:0;position:relative;overflow:hidden;background:#eef2f7}
    .stage{position:absolute;inset:0;touch-action:none;cursor:grab;background:
      radial-gradient(circle at 20px 20px,rgba(148,163,184,.28) 1px,transparent 1px) 0 0/24px 24px,
      linear-gradient(180deg,#f5f7fb,#eef2f7);}
    .stage.dragging{cursor:grabbing}
    canvas{position:absolute;left:0;top:0;width:100%;height:100%;display:block}
    .drop-hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(560px,82%);padding:28px;border:2px dashed #cbd5e1;border-radius:22px;background:rgba(255,255,255,.86);text-align:center;box-shadow:var(--shadow);pointer-events:none}
    .drop-hint h2{margin:0 0 8px;font-size:23px}
    .drop-hint p{margin:6px 0;color:var(--muted);line-height:1.65}
    .statusbar{position:absolute;left:14px;bottom:12px;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:12px;box-shadow:0 6px 18px rgba(15,23,42,.08);backdrop-filter:blur(14px)}
    .mobile-title{display:none}
    .mobile-bottom{display:none}
    .toast{position:fixed;right:20px;bottom:20px;z-index:50;background:#111827;color:#fff;border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);font-size:13px;opacity:0;transform:translateY(10px);pointer-events:none;transition:.22s}
    .toast.show{opacity:1;transform:translateY(0)}
    .preview-badge{position:absolute;top:12px;right:12px;border-radius:999px;background:#111827;color:#fff;padding:7px 12px;font-size:12px;font-weight:700;display:none;z-index:4}
    .preview .preview-badge{display:block}
    .preview .stage{background:#e5e7eb}
    .divider-line{height:1px;background:var(--line);margin:10px 0}
    .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#f3f4f6;border:1px solid #e5e7eb;border-bottom-width:2px;border-radius:6px;padding:1px 5px;color:#374151}

    @media (max-width: 760px){
      :root{--topbar:56px}
      .app{display:block;height:100vh;overflow:hidden;background:#f3f5f8}
      .topbar{position:absolute;left:0;top:0;right:0;height:var(--topbar);padding:8px 10px;justify-content:space-between}
      .brand,.toolbar-group .text-label,.desktop-only,.toolbar-group:nth-of-type(2),.toolbar-group:nth-of-type(3){display:none!important}
      .toolbar-group{border-left:0;padding:0;gap:6px}
      .tool-btn,.file-label{height:38px;width:42px;padding:0;justify-content:center;border-radius:12px}
      .mobile-title{display:block;font-size:20px;font-weight:800;position:absolute;left:50%;transform:translateX(-50%)}
      .sidebar{display:none}
      .stage-wrap{position:absolute;left:0;right:0;top:var(--topbar);bottom:var(--mobilebar);grid-row:auto;grid-column:auto}
      .mobile-bottom{display:grid;position:absolute;left:0;right:0;bottom:0;height:var(--mobilebar);background:rgba(255,255,255,.94);border-top:1px solid var(--line);grid-template-columns:repeat(5,1fr);z-index:6;backdrop-filter:blur(14px);padding-bottom:env(safe-area-inset-bottom)}
      .mobile-mode{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#111827;font-weight:750;font-size:11px}
      .mobile-mode .mi{font-size:25px;line-height:1;color:#111827}
      .mobile-mode.active .mi,.mobile-mode.active{color:var(--blue)}
      .statusbar{left:8px;right:8px;bottom:8px;text-align:center;font-size:11px;padding:5px 8px}
      .drop-hint{padding:22px;width:88%}
      .drop-hint h2{font-size:19px}
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">✂</div>
      <div>LongShot Stitch<small>长图拼裁工具</small></div>
    </div>
    <div class="mobile-title">裁剪</div>

    <div class="toolbar-group">
      <label class="file-label" title="打开图片">
        <span>📁</span><span class="text-label">打开图片</span>
        <input id="fileInput" type="file" accept="image/*" multiple>
      </label>
      <button class="tool-btn" id="pasteBtn" title="粘贴剪贴板图片"><span>📋</span><span class="text-label">粘贴</span></button>
      <button class="tool-btn desktop-only" id="saveProjectBtn" title="保存工程 JSON"><span>💾</span><span>保存工程</span></button>
      <label class="file-label desktop-only" title="打开工程 JSON">
        <span>📂</span><span>打开工程</span>
        <input id="projectInput" type="file" accept="application/json,.json">
      </label>
    </div>

    <div class="toolbar-group desktop-only">
      <button class="tool-btn" id="verticalBtn" title="纵向拼接">↕ 纵向</button>
      <button class="tool-btn" id="horizontalBtn" title="横向拼接">↔ 横向</button>
    </div>

    <div class="toolbar-group desktop-only">
      <button class="tool-btn" id="undoBtn">↶ 撤销</button>
      <button class="tool-btn" id="redoBtn">↷ 重做</button>
      <button class="tool-btn danger" id="clearBtn">清空</button>
    </div>

    <div class="spacer"></div>

    <div class="toolbar-group">
      <button class="tool-btn" id="fitBtn" title="适合窗口"><span>⛶</span><span class="text-label">适合窗口</span></button>
      <button class="tool-btn" id="previewBtn" title="预览"><span>👁</span><span class="text-label">预览</span></button>
      <button class="tool-btn primary" id="exportBtn" title="导出 PNG"><span>⬆</span><span class="text-label">导出 PNG</span></button>
    </div>
  </header>

  <aside class="sidebar">
    <section class="mode-panel">
      <p class="mode-title">编辑模式</p>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="seam"><span class="mode-icon">☰</span><span class="mode-label">拼接线<span>调接缝/覆盖</span></span></button>
        <button class="mode-btn" data-mode="canvasCrop"><span class="mode-icon">▢</span><span class="mode-label">整体裁剪<span>裁最终长图</span></span></button>
        <button class="mode-btn" data-mode="imageCrop"><span class="mode-icon">▢¹</span><span class="mode-label">单图裁剪<span>每张图四边</span></span></button>
        <button class="mode-btn" data-mode="divider"><span class="mode-icon">≡</span><span class="mode-label">分隔线<span>插入风格线</span></span></button>
        <button class="mode-btn" data-mode="tools"><span class="mode-icon">✎</span><span class="mode-label">工具<span>遮挡/文字待加</span></span></button>
      </div>
    </section>
    <section class="props" id="props"></section>
  </aside>

  <main class="stage-wrap" id="stageWrap">
    <div class="stage" id="stage">
      <canvas id="editorCanvas"></canvas>
      <div class="drop-hint" id="dropHint">
        <h2>拖入、打开或粘贴图片</h2>
        <p>支持多图纵向/横向拼接、拼接线微调、整体裁剪、单图四边裁剪、插入横向分隔线。</p>
        <p>快捷键：<span class="kbd">1</span> 拼接线，<span class="kbd">2</span> 整体裁剪，<span class="kbd">3</span> 单图裁剪，<span class="kbd">4</span> 分隔线，方向键微调。</p>
      </div>
      <div class="preview-badge">预览模式</div>
      <div class="statusbar" id="statusbar">Ready</div>
    </div>
  </main>

  <nav class="mobile-bottom">
    <button class="mobile-mode active" data-mode="seam"><span class="mi">☰</span><span>拼接</span></button>
    <button class="mobile-mode" data-mode="canvasCrop"><span class="mi">▢</span><span>整体</span></button>
    <button class="mobile-mode" data-mode="imageCrop"><span class="mi">▢¹</span><span>单图</span></button>
    <button class="mobile-mode" data-mode="divider"><span class="mi">≡</span><span>分隔</span></button>
    <button class="mobile-mode" data-mode="tools"><span class="mi">✎</span><span>工具</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
(() => {
  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  const uid = (p='id') => p + '_' + Math.random().toString(36).slice(2, 9);

  const canvas = $('#editorCanvas');
  const ctx = canvas.getContext('2d');
  const stage = $('#stage');
  const stageWrap = $('#stageWrap');
  const props = $('#props');
  const dropHint = $('#dropHint');
  const statusbar = $('#statusbar');
  const toastEl = $('#toast');
  const app = $('#app');

  let state = {
    orientation: 'vertical',
    mode: 'seam',
    selected: null, // {type:'seam'|'image'|'canvasCrop'|'divider', id/index}
    images: [],
    seams: [],
    canvasCrop: { top: 0, right: 0, bottom: 0, left: 0 },
    zoom: 1,
    pan: { x: 0, y: 0 },
    preview: false,
    annotations: []
  };

  let history = [];
  let future = [];
  let hitAreas = [];
  let layoutCache = null;
  let drag = null;
  let redrawPending = false;
  let resizeObserver = null;

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=>toastEl.classList.remove('show'), 2200);
  }

  function snapshot(){
    return JSON.stringify({
      orientation: state.orientation,
      mode: state.mode,
      selected: state.selected,
      images: state.images.map(im => ({
        id: im.id, name: im.name, dataUrl: im.dataUrl, width: im.width, height: im.height, crop: {...im.crop}
      })),
      seams: state.seams.map(s => ({...s, divider: s.divider ? {...s.divider} : null})),
      canvasCrop: {...state.canvasCrop},
      annotations: state.annotations.map(a => ({...a}))
    });
  }

  function pushHistory(){
    history.push(snapshot());
    if(history.length > 80) history.shift();
    future = [];
    updateUndoRedo();
  }

  function updateUndoRedo(){
    $('#undoBtn').disabled = history.length === 0;
    $('#redoBtn').disabled = future.length === 0;
  }

  async function restoreFromSnapshot(str){
    const data = JSON.parse(str);
    state.orientation = data.orientation || 'vertical';
    state.mode = data.mode || 'seam';
    state.selected = data.selected || null;
    state.canvasCrop = data.canvasCrop || {top:0,right:0,bottom:0,left:0};
    state.seams = data.seams || [];
    state.annotations = data.annotations || [];
    const imgs = [];
    for(const raw of data.images || []){
      const img = await loadImage(raw.dataUrl);
      imgs.push({...raw, img, width: img.naturalWidth, height: img.naturalHeight, crop: raw.crop || {top:0,right:0,bottom:0,left:0}});
    }
    state.images = imgs;
    syncSeams(false);
    updateModeButtons();
    updateToolbarButtons();
    renderProps();
    fitToView(false);
    requestRender();
  }

  function undo(){
    if(!history.length) return;
    future.push(snapshot());
    const last = history.pop();
    restoreFromSnapshot(last);
    updateUndoRedo();
  }
  function redo(){
    if(!future.length) return;
    history.push(snapshot());
    const next = future.pop();
    restoreFromSnapshot(next);
    updateUndoRedo();
  }

  function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  async function addFiles(files){
    const list = Array.from(files).filter(f => f.type.startsWith('image/'));
    if(!list.length){ toast('没有找到图片文件'); return; }
    pushHistory();
    for(const file of list){
      const dataUrl = await fileToDataUrl(file);
      const img = await loadImage(dataUrl);
      state.images.push({
        id: uid('img'), name: file.name || 'clipboard.png', dataUrl, img,
        width: img.naturalWidth, height: img.naturalHeight,
        crop: { top: 0, right: 0, bottom: 0, left: 0 }
      });
    }
    syncSeams(true);
    if(!state.selected && state.images.length) state.selected = { type: 'image', index: 0 };
    fitToView(false);
    renderProps();
    requestRender();
    toast(`已添加 ${list.length} 张图片`);
  }

  async function addClipboardImages(){
    try{
      const items = await navigator.clipboard.read();
      const files = [];
      for(const item of items){
        for(const type of item.types){
          if(type.startsWith('image/')){
            const blob = await item.getType(type);
            files.push(new File([blob], 'clipboard.png', { type }));
          }
        }
      }
      if(files.length) await addFiles(files);
      else toast('剪贴板里没有图片。也可以直接 Ctrl+V 粘贴。');
    }catch(e){
      toast('浏览器未允许读取剪贴板，请试试 Ctrl+V');
    }
  }

  function syncSeams(createMissing=true){
    const n = state.images.length;
    const old = state.seams;
    const next = [];
    for(let i=0;i<Math.max(0,n-1);i++){
      const before = state.images[i].id, after = state.images[i+1].id;
      const found = old.find(s => s.beforeImageId === before && s.afterImageId === after) || old[i];
      next.push(found && found.beforeImageId === before && found.afterImageId === after ? found : {
        id: uid('seam'), beforeImageId: before, afterImageId: after,
        beforeCrop: 0, afterCrop: 0, locked: true,
        divider: null
      });
    }
    state.seams = next;
    if(state.selected?.type === 'seam' && state.selected.index >= state.seams.length) state.selected = null;
  }

  function getEffectiveCrop(i){
    const im = state.images[i];
    const c = {...im.crop};
    if(state.orientation === 'vertical'){
      if(i > 0) c.top += state.seams[i-1]?.afterCrop || 0;
      if(i < state.images.length-1) c.bottom += state.seams[i]?.beforeCrop || 0;
    } else {
      if(i > 0) c.left += state.seams[i-1]?.afterCrop || 0;
      if(i < state.images.length-1) c.right += state.seams[i]?.beforeCrop || 0;
    }
    c.top = clamp(c.top, 0, im.height-1);
    c.bottom = clamp(c.bottom, 0, im.height-c.top-1);
    c.left = clamp(c.left, 0, im.width-1);
    c.right = clamp(c.right, 0, im.width-c.left-1);
    return c;
  }

  function dividerSize(s){
    if(!s?.divider?.enabled) return 0;
    const d = s.divider;
    return (d.marginBefore || 0) + (d.thickness || 2) + (d.marginAfter || 0);
  }

  function computeLayout(ignoreCanvasCrop=false){
    const images = state.images;
    const orientation = state.orientation;
    if(!images.length){
      return { width: 1, height: 1, fullWidth:1, fullHeight:1, items: [], seams: [], dividers: [], imageBounds: [] };
    }
    const dims = images.map((im, i) => {
      const c = getEffectiveCrop(i);
      return { c, sw: Math.max(1, im.width - c.left - c.right), sh: Math.max(1, im.height - c.top - c.bottom) };
    });
    const maxW = Math.max(...dims.map(d => d.sw));
    const maxH = Math.max(...dims.map(d => d.sh));
    let items = [], seamViews = [], divViews = [], imageBounds = [];
    let x = 0, y = 0;
    if(orientation === 'vertical'){
      for(let i=0;i<images.length;i++){
        const d = dims[i];
        const dx = Math.round((maxW - d.sw)/2);
        items.push({ type:'image', index:i, img:images[i], sx:d.c.left, sy:d.c.top, sw:d.sw, sh:d.sh, dx, dy:y, dw:d.sw, dh:d.sh });
        imageBounds.push({ index:i, x:dx, y, w:d.sw, h:d.sh });
        y += d.sh;
        if(i < images.length-1){
          const s = state.seams[i];
          seamViews.push({ index:i, seam:s, x:0, y, w:maxW, h:0 });
          const size = dividerSize(s);
          if(size){
            const dvr = s.divider;
            divViews.push({ index:i, x:0, y, w:maxW, h:size, divider:dvr });
            y += size;
          }
        }
      }
      var fullWidth = maxW, fullHeight = y;
    } else {
      for(let i=0;i<images.length;i++){
        const d = dims[i];
        const dy = Math.round((maxH - d.sh)/2);
        items.push({ type:'image', index:i, img:images[i], sx:d.c.left, sy:d.c.top, sw:d.sw, sh:d.sh, dx:x, dy, dw:d.sw, dh:d.sh });
        imageBounds.push({ index:i, x, y:dy, w:d.sw, h:d.sh });
        x += d.sw;
        if(i < images.length-1){
          const s = state.seams[i];
          seamViews.push({ index:i, seam:s, x, y:0, w:0, h:maxH });
          const size = dividerSize(s);
          if(size){
            const dvr = s.divider;
            divViews.push({ index:i, x, y:0, w:size, h:maxH, divider:dvr });
            x += size;
          }
        }
      }
      var fullWidth = x, fullHeight = maxH;
    }
    const cc = state.canvasCrop;
    let crop = ignoreCanvasCrop ? {top:0,right:0,bottom:0,left:0} : {
      top: clamp(cc.top,0,fullHeight-1), left:clamp(cc.left,0,fullWidth-1),
      right: clamp(cc.right,0,fullWidth-1), bottom: clamp(cc.bottom,0,fullHeight-1)
    };
    crop.right = clamp(crop.right, 0, fullWidth - crop.left - 1);
    crop.bottom = clamp(crop.bottom, 0, fullHeight - crop.top - 1);
    return { width: fullWidth - crop.left - crop.right, height: fullHeight - crop.top - crop.bottom, fullWidth, fullHeight, crop, items, seams: seamViews, dividers: divViews, imageBounds };
  }

  function requestRender(){
    if(redrawPending) return;
    redrawPending = true;
    requestAnimationFrame(() => { redrawPending = false; render(); });
  }

  function setCanvasSize(){
    const dpr = window.devicePixelRatio || 1;
    const rect = stageWrap.getBoundingClientRect();
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function worldToScreen(x,y){ return { x: x*state.zoom + state.pan.x, y: y*state.zoom + state.pan.y }; }
  function screenToWorld(x,y){ return { x: (x-state.pan.x)/state.zoom, y: (y-state.pan.y)/state.zoom }; }

  function render(){
    setCanvasSize();
    const rect = stageWrap.getBoundingClientRect();
    ctx.clearRect(0,0,rect.width,rect.height);
    hitAreas = [];
    layoutCache = computeLayout(state.preview ? false : true);
    dropHint.style.display = state.images.length ? 'none' : 'block';
    app.classList.toggle('preview', state.preview);
    if(!state.images.length){
      statusbar.textContent = 'Ready：拖入、打开或粘贴图片';
      return;
    }

    ctx.save();
    ctx.translate(state.pan.x, state.pan.y);
    ctx.scale(state.zoom, state.zoom);
    drawComposition(ctx, layoutCache, false, !state.preview);
    if(!state.preview) drawOverlays(ctx, layoutCache);
    ctx.restore();

    const finalLayout = computeLayout(false);
    statusbar.textContent = `${state.orientation === 'vertical' ? '纵向' : '横向'} · ${state.images.length} 张图 · 输出 ${Math.round(finalLayout.width)}×${Math.round(finalLayout.height)} px · 缩放 ${Math.round(state.zoom*100)}%`;
  }

  function drawComposition(c, layout, exportMode=false, withUncroppedCanvas=false){
    const crop = withUncroppedCanvas ? {left:0,top:0} : layout.crop || {left:0,top:0};
    c.save();
    if(!withUncroppedCanvas){ c.translate(-crop.left, -crop.top); }
    c.fillStyle = '#fff';
    c.fillRect(0,0,layout.fullWidth,layout.fullHeight);
    for(const item of layout.items){
      try{
        c.drawImage(item.img.img, item.sx, item.sy, item.sw, item.sh, item.dx, item.dy, item.dw, item.dh);
      }catch(e){}
    }
    for(const dv of layout.dividers){
      const d = dv.divider;
      c.fillStyle = d.background || '#ffffff';
      c.fillRect(dv.x, dv.y, dv.w, dv.h);
      c.strokeStyle = d.color || '#111827';
      c.lineWidth = d.thickness || 2;
      if(d.style === 'dashed') c.setLineDash([10, 8]);
      else if(d.style === 'dotted') c.setLineDash([2, 7]);
      else c.setLineDash([]);
      c.beginPath();
      if(state.orientation === 'vertical'){
        const yy = dv.y + (d.marginBefore || 0) + (d.thickness || 2)/2;
        c.moveTo(dv.x, yy); c.lineTo(dv.x + dv.w, yy);
      } else {
        const xx = dv.x + (d.marginBefore || 0) + (d.thickness || 2)/2;
        c.moveTo(xx, dv.y); c.lineTo(xx, dv.y + dv.h);
      }
      c.stroke();
      c.setLineDash([]);
    }
    drawAnnotations(c, layout, exportMode);
    c.restore();
  }

  function drawPill(c, x, y, text, area, active=false){
    const padX = 16, h = 38;
    c.save();
    c.font = '700 20px ui-sans-serif, system-ui, sans-serif';
    const w = Math.max(52, c.measureText(text).width + padX*2);
    const rx = 16;
    c.fillStyle = active ? '#ffbf00' : '#ffcc33';
    c.strokeStyle = '#f6b700';
    c.lineWidth = 1.5;
    roundRect(c, x-w/2, y-h/2, w, h, rx);
    c.fill(); c.stroke();
    c.fillStyle = '#7a5200';
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(text, x, y+1);
    c.restore();
    if(area) hitAreas.push({...area, x:x-w/2, y:y-h/2, w, h});
  }

  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
  }

  function drawOverlays(c, layout){
    const mode = state.mode;
    c.save();
    c.lineWidth = 2 / state.zoom;
    if(mode === 'canvasCrop') drawCanvasCropOverlay(c, layout);
    if(mode === 'imageCrop') drawImageCropOverlay(c, layout);
    if(mode === 'seam') drawSeamOverlay(c, layout);
    if(mode === 'divider') drawDividerOverlay(c, layout);
    if(mode === 'tools') drawToolsOverlay(c, layout);
    c.restore();
  }

  function drawSeamOverlay(c, layout){
    const vertical = state.orientation === 'vertical';
    for(const sv of layout.seams){
      const selected = state.selected?.type === 'seam' && state.selected.index === sv.index;
      const unlocked = !state.seams[sv.index]?.locked;
      c.save();
      c.strokeStyle = selected ? '#ffbf00' : 'rgba(246,183,0,.82)';
      c.lineWidth = selected ? 3 : 2;
      c.setLineDash(selected ? [] : [8,6]);
      c.beginPath();
      if(vertical){ c.moveTo(0, sv.y); c.lineTo(layout.fullWidth, sv.y); }
      else { c.moveTo(sv.x, 0); c.lineTo(sv.x, layout.fullHeight); }
      c.stroke();
      c.setLineDash([]);
      c.restore();
      hitAreas.push(vertical ? {type:'seamSelect', index:sv.index, x:0, y:sv.y-12, w:layout.fullWidth, h:24} : {type:'seamSelect', index:sv.index, x:sv.x-12, y:0, w:24, h:layout.fullHeight});
      if(selected){
        if(vertical){
          drawPill(c, layout.fullWidth/2, sv.y, unlocked ? '↕' : '🔒', {type:'seamCenter', index:sv.index, cursor:'ns-resize'}, unlocked);
          drawPill(c, layout.fullWidth/2, sv.y-52, '↑', {type:'seamBefore', index:sv.index, cursor:'ns-resize'}, unlocked);
          drawPill(c, layout.fullWidth/2, sv.y+52, '↓', {type:'seamAfter', index:sv.index, cursor:'ns-resize'}, unlocked);
        } else {
          drawPill(c, sv.x, layout.fullHeight/2, unlocked ? '↔' : '🔒', {type:'seamCenter', index:sv.index, cursor:'ew-resize'}, unlocked);
          drawPill(c, sv.x-52, layout.fullHeight/2, '←', {type:'seamBefore', index:sv.index, cursor:'ew-resize'}, unlocked);
          drawPill(c, sv.x+52, layout.fullHeight/2, '→', {type:'seamAfter', index:sv.index, cursor:'ew-resize'}, unlocked);
        }
      }
    }
  }

  function drawCanvasCropOverlay(c, layout){
    const cc = state.canvasCrop;
    const x = cc.left, y = cc.top, w = layout.fullWidth - cc.left - cc.right, h = layout.fullHeight - cc.top - cc.bottom;
    c.save();
    c.fillStyle = 'rgba(17,24,39,.38)';
    c.fillRect(0,0,layout.fullWidth, y);
    c.fillRect(0,y, x, h);
    c.fillRect(x+w,y, layout.fullWidth-(x+w), h);
    c.fillRect(0,y+h, layout.fullWidth, layout.fullHeight-(y+h));
    c.strokeStyle = '#ffbf00'; c.lineWidth = 3; c.setLineDash([]);
    c.strokeRect(x,y,w,h);
    c.restore();
    const midX = x + w/2, midY = y + h/2;
    drawPill(c, midX, y, '↑', {type:'canvasCrop', edge:'top', x:x, y:y-24, w, h:48, cursor:'ns-resize'}, true);
    drawPill(c, midX, y+h, '↓', {type:'canvasCrop', edge:'bottom', x:x, y:y+h-24, w, h:48, cursor:'ns-resize'}, true);
    drawPill(c, x, midY, '←', {type:'canvasCrop', edge:'left', x:x-24, y:y, w:48, h, cursor:'ew-resize'}, true);
    drawPill(c, x+w, midY, '→', {type:'canvasCrop', edge:'right', x:x+w-24, y:y, w:48, h, cursor:'ew-resize'}, true);
  }

  function drawImageCropOverlay(c, layout){
    for(const b of layout.imageBounds){
      const selected = state.selected?.type === 'image' && state.selected.index === b.index;
      c.save();
      c.strokeStyle = selected ? '#ffbf00' : 'rgba(246,183,0,.85)';
      c.lineWidth = selected ? 3 : 2;
      c.strokeRect(b.x,b.y,b.w,b.h);
      c.restore();
      hitAreas.push({type:'imageSelect', index:b.index, x:b.x, y:b.y, w:b.w, h:b.h});
      const active = selected;
      if(selected){
        drawPill(c, b.x+b.w/2, b.y, '↑', {type:'imageCrop', index:b.index, edge:'top', x:b.x, y:b.y-26, w:b.w, h:52, cursor:'ns-resize'}, active);
        drawPill(c, b.x+b.w/2, b.y+b.h, '↓', {type:'imageCrop', index:b.index, edge:'bottom', x:b.x, y:b.y+b.h-26, w:b.w, h:52, cursor:'ns-resize'}, active);
        drawPill(c, b.x, b.y+b.h/2, '←', {type:'imageCrop', index:b.index, edge:'left', x:b.x-26, y:b.y, w:52, h:b.h, cursor:'ew-resize'}, active);
        drawPill(c, b.x+b.w, b.y+b.h/2, '→', {type:'imageCrop', index:b.index, edge:'right', x:b.x+b.w-26, y:b.y, w:52, h:b.h, cursor:'ew-resize'}, active);
      }
    }
  }

  function drawDividerOverlay(c, layout){
    const vertical = state.orientation === 'vertical';
    for(const b of layout.imageBounds){
      c.save();
      c.strokeStyle = 'rgba(246,183,0,.45)';
      c.lineWidth = 1.5;
      c.setLineDash([6,5]);
      c.strokeRect(b.x,b.y,b.w,b.h);
      c.restore();
      hitAreas.push({type:'splitImageAt', index:b.index, x:b.x, y:b.y, w:b.w, h:b.h, cursor: vertical ? 'row-resize' : 'col-resize'});
      if(b.w > 80 && b.h > 80){
        drawPill(c, b.x + b.w/2, b.y + b.h/2, '+', {type:'splitImageMid', index:b.index, cursor:'pointer'}, true);
      }
    }
    for(const sv of layout.seams){
      const selected = state.selected?.type === 'divider' && state.selected.index === sv.index;
      c.save();
      c.strokeStyle = selected ? '#ffbf00' : 'rgba(246,183,0,.92)';
      c.lineWidth = selected ? 3 : 2;
      c.beginPath();
      if(vertical){ c.moveTo(0, sv.y); c.lineTo(layout.fullWidth, sv.y); }
      else { c.moveTo(sv.x, 0); c.lineTo(sv.x, layout.fullHeight); }
      c.stroke();
      c.restore();
      hitAreas.push(vertical ? {type:'dividerSelect', index:sv.index, x:0, y:sv.y-20, w:layout.fullWidth, h:40} : {type:'dividerSelect', index:sv.index, x:sv.x-20, y:0, w:40, h:layout.fullHeight});
      if(vertical) drawPill(c, layout.fullWidth/2, sv.y, state.seams[sv.index]?.divider?.enabled ? '−' : '+', {type:'dividerToggle', index:sv.index, cursor:'pointer'}, true);
      else drawPill(c, sv.x, layout.fullHeight/2, state.seams[sv.index]?.divider?.enabled ? '−' : '+', {type:'dividerToggle', index:sv.index, cursor:'pointer'}, true);
    }
  }

  function drawToolsOverlay(c, layout){
    for(let i=0;i<state.annotations.length;i++){
      const a = state.annotations[i];
      const b = annotationBounds(a);
      hitAreas.push({type:'annotationSelect', index:i, x:b.x, y:b.y, w:b.w, h:b.h, cursor:'move'});
      const selected = state.selected?.type === 'annotation' && state.selected.index === i;
      if(selected){
        c.save();
        c.strokeStyle = '#2f80ed';
        c.lineWidth = 2/state.zoom;
        c.setLineDash([8/state.zoom, 6/state.zoom]);
        c.strokeRect(b.x, b.y, b.w, b.h);
        c.setLineDash([]);
        const hs = 14 / state.zoom;
        c.fillStyle = '#2f80ed';
        c.fillRect(b.x+b.w-hs/2, b.y+b.h-hs/2, hs, hs);
        hitAreas.push({type:'annotationResize', index:i, x:b.x+b.w-hs, y:b.y+b.h-hs, w:hs*2, h:hs*2, cursor:'nwse-resize'});
        c.restore();
      }
    }
  }


  function drawAnnotations(c, layout, exportMode=false){
    for(const a of state.annotations){
      c.save();
      c.translate(a.x || 0, a.y || 0);
      if(a.type === 'text'){
        c.font = `700 ${a.fontSize || 28}px ui-sans-serif, system-ui, sans-serif`;
        c.textAlign = 'left'; c.textBaseline = 'top';
        if(a.bg && a.bg !== 'transparent'){
          const temp = document.createElement('canvas').getContext('2d');
          temp.font = c.font;
          const m = temp.measureText(a.text || 'Text');
          const hh = (a.fontSize || 28) + 12;
          c.fillStyle = a.bg;
          c.fillRect(-8,-6,m.width+16,hh);
        }
        c.fillStyle = a.color || '#111827';
        (String(a.text || 'Text').split('\n')).forEach((line,i)=> c.fillText(line,0,i*((a.fontSize||28)+6)));
      } else if(a.type === 'redact'){
        c.fillStyle = a.color || '#111827';
        c.fillRect(0,0,a.w || 180,a.h || 64);
      } else if(a.type === 'box'){
        c.strokeStyle = a.color || '#ef4444';
        c.lineWidth = a.lineWidth || 3;
        c.strokeRect(0,0,a.w || 180,a.h || 90);
      } else if(a.type === 'arrow'){
        const w = a.w || 180, h = a.h || 90;
        c.strokeStyle = a.color || '#ef4444';
        c.fillStyle = a.color || '#ef4444';
        c.lineWidth = a.lineWidth || 4;
        c.beginPath(); c.moveTo(0,0); c.lineTo(w,h); c.stroke();
        const ang = Math.atan2(h,w), len = 18;
        c.beginPath(); c.moveTo(w,h); c.lineTo(w-len*Math.cos(ang-Math.PI/6), h-len*Math.sin(ang-Math.PI/6)); c.lineTo(w-len*Math.cos(ang+Math.PI/6), h-len*Math.sin(ang+Math.PI/6)); c.closePath(); c.fill();
      }
      c.restore();
    }
  }

  function annotationBounds(a){
    if(a.type === 'text'){
      const temp = document.createElement('canvas').getContext('2d');
      temp.font = `700 ${a.fontSize || 28}px ui-sans-serif, system-ui, sans-serif`;
      const lines = String(a.text || 'Text').split('\n');
      const width = Math.max(...lines.map(line => temp.measureText(line).width), 40) + ((a.bg && a.bg !== 'transparent') ? 16 : 0);
      const height = Math.max(24, lines.length * ((a.fontSize || 28)+6));
      return {x:a.x||0, y:a.y||0, w:width, h:height};
    }
    return {x:a.x||0, y:a.y||0, w:Math.max(24,a.w||180), h:Math.max(24,a.h||90)};
  }

  function addAnnotation(type){
    if(!state.images.length) return;
    pushHistory();
    const layout = computeLayout(true);
    const base = { id: uid('ann'), type, x: Math.max(20, layout.fullWidth/2 - 80), y: Math.max(20, layout.fullHeight/2 - 40), w: 180, h: 90, color: '#ef4444', bg: 'transparent', lineWidth: 4, fontSize: 28, text: '文本' };
    if(type === 'redact') Object.assign(base, {color:'#111827', bg:'#111827', w:220, h:72});
    if(type === 'box') Object.assign(base, {color:'#ef4444', w:220, h:110});
    if(type === 'arrow') Object.assign(base, {color:'#ef4444', w:200, h:80});
    if(type === 'text') Object.assign(base, {color:'#111827', bg:'transparent', text:'双击文字或左侧修改'});
    state.annotations.push(base);
    state.selected = {type:'annotation', index: state.annotations.length - 1};
    renderProps(); requestRender();
  }

  function deleteSelectedAnnotation(){
    const idx = state.selected?.type === 'annotation' ? state.selected.index : -1;
    if(idx < 0) return;
    pushHistory();
    state.annotations.splice(idx,1);
    state.selected = state.annotations.length ? {type:'annotation', index: clamp(idx, 0, state.annotations.length-1)} : null;
    renderProps(); requestRender();
  }

  function normalizeProjectCrops(){
    const effective = state.images.map((im,i) => getEffectiveCrop(i));
    state.images.forEach((im,i) => { im.crop = {...effective[i]}; });
    state.seams.forEach(s => { s.beforeCrop = 0; s.afterCrop = 0; });
  }

  function splitImageAt(index, localPos=null){
    const original = state.images[index];
    if(!original) return;
    pushHistory();
    normalizeProjectCrops();
    const im = state.images[index];
    const visible = state.orientation === 'vertical' ? (im.height - im.crop.top - im.crop.bottom) : (im.width - im.crop.left - im.crop.right);
    const pos = clamp(Math.round(localPos == null ? visible/2 : localPos), 1, Math.max(1, visible - 1));
    const a = {...im, id: uid('img'), name: im.name + ' A', crop: {...im.crop}};
    const b = {...im, id: uid('img'), name: im.name + ' B', crop: {...im.crop}};
    if(state.orientation === 'vertical'){
      const sourceSplit = im.crop.top + pos;
      a.crop.bottom = im.height - sourceSplit;
      b.crop.top = sourceSplit;
    } else {
      const sourceSplit = im.crop.left + pos;
      a.crop.right = im.width - sourceSplit;
      b.crop.left = sourceSplit;
    }
    state.images.splice(index,1,a,b);
    syncSeams(true);
    if(state.seams[index]) state.seams[index].locked = false;
    state.selected = {type:'seam', index};
    state.mode = 'seam';
    updateModeButtons(); renderProps(); fitToView(false); requestRender();
    toast('已插入分割线，并把当前图片分成两段');
  }

  function fitToView(animate=true){
    const rect = stageWrap.getBoundingClientRect();
    const layout = computeLayout(true);
    const pad = 64;
    if(!state.images.length){ state.zoom = 1; state.pan = {x:0,y:0}; requestRender(); return; }
    const z = Math.min((rect.width-pad)/layout.fullWidth, (rect.height-pad)/layout.fullHeight);
    state.zoom = clamp(isFinite(z) ? z : 1, 0.03, 3);
    state.pan.x = (rect.width - layout.fullWidth*state.zoom)/2;
    state.pan.y = (rect.height - layout.fullHeight*state.zoom)/2;
    requestRender();
  }

  function hitTest(wx, wy){
    for(let i=hitAreas.length-1;i>=0;i--){
      const h = hitAreas[i];
      if(wx >= h.x && wx <= h.x+h.w && wy >= h.y && wy <= h.y+h.h) return h;
    }
    return null;
  }

  function onPointerDown(e){
    if(e.button !== undefined && e.button !== 0) return;
    stage.setPointerCapture?.(e.pointerId);
    const p = getPointer(e);
    const w = screenToWorld(p.x,p.y);
    const h = hitTest(w.x,w.y);
    if(h && !state.preview){
      handleHitDown(h, w, e);
    } else {
      drag = { type:'pan', startX:p.x, startY:p.y, pan:{...state.pan} };
      stage.classList.add('dragging');
    }
  }

  function handleHitDown(h, w, e){
    const selectedBefore = JSON.stringify(state.selected);
    if(h.type === 'seamSelect'){
      state.selected = {type:'seam', index:h.index};
      renderProps(); requestRender();
      if(JSON.stringify(state.selected) !== selectedBefore) return;
    }
    if(h.type === 'imageSelect'){
      state.selected = {type:'image', index:h.index};
      renderProps(); requestRender();
      return;
    }
    if(h.type === 'splitImageMid'){
      splitImageAt(h.index, null);
      return;
    }
    if(h.type === 'splitImageAt'){
      const layout = computeLayout(true);
      const b = layout.imageBounds.find(v => v.index === h.index);
      const local = state.orientation === 'vertical' ? (w.y - b.y) : (w.x - b.x);
      splitImageAt(h.index, local);
      return;
    }
    if(h.type === 'annotationSelect'){
      state.selected = {type:'annotation', index:h.index};
      renderProps(); requestRender();
      const a = state.annotations[h.index];
      drag = {type:'annotationMove', index:h.index, start:w, ann:{...a}};
      return;
    }
    if(h.type === 'annotationResize'){
      state.selected = {type:'annotation', index:h.index};
      renderProps(); requestRender();
      const a = state.annotations[h.index];
      drag = {type:'annotationResize', index:h.index, start:w, ann:{...a}};
      return;
    }
    if(h.type === 'dividerSelect'){
      state.selected = {type:'divider', index:h.index};
      renderProps(); requestRender();
      return;
    }
    if(h.type === 'dividerToggle'){
      pushHistory();
      const s = state.seams[h.index];
      s.divider = s.divider?.enabled ? null : {enabled:true, style:'solid', thickness:2, color:'#111827', background:'#ffffff', marginBefore:8, marginAfter:8};
      state.selected = {type:'divider', index:h.index};
      renderProps(); requestRender();
      return;
    }
    if(h.type === 'canvasCrop'){
      pushHistory(); state.selected = {type:'canvasCrop'}; renderProps();
      drag = { type:'canvasCrop', edge:h.edge, start:w, startCrop:{...state.canvasCrop} };
      return;
    }
    if(h.type === 'imageCrop'){
      pushHistory(); state.selected = {type:'image', index:h.index}; renderProps();
      drag = { type:'imageCrop', index:h.index, edge:h.edge, start:w, startCrop:{...state.images[h.index].crop} };
      return;
    }
    if(['seamBefore','seamAfter','seamCenter'].includes(h.type)){
      const s = state.seams[h.index];
      state.selected = {type:'seam', index:h.index};
      if(s.locked){ renderProps(); requestRender(); toast('拼接线已锁定，先点“编辑/解锁”'); return; }
      pushHistory(); renderProps();
      drag = { type:h.type, index:h.index, start:w, before:s.beforeCrop, after:s.afterCrop };
      return;
    }
  }

  function onPointerMove(e){
    const p = getPointer(e);
    const w = screenToWorld(p.x,p.y);
    if(!drag){
      const h = hitTest(w.x,w.y);
      stage.style.cursor = h?.cursor || 'grab';
      return;
    }
    if(drag.type === 'pan'){
      state.pan.x = drag.pan.x + (p.x - drag.startX);
      state.pan.y = drag.pan.y + (p.y - drag.startY);
      requestRender(); return;
    }
    if(drag.type === 'canvasCrop'){
      const dx = Math.round(w.x - drag.start.x), dy = Math.round(w.y - drag.start.y);
      const layout = computeLayout(true);
      const c = {...drag.startCrop};
      if(drag.edge === 'top') c.top = clamp(c.top + dy, 0, layout.fullHeight - c.bottom - 1);
      if(drag.edge === 'bottom') c.bottom = clamp(c.bottom - dy, 0, layout.fullHeight - c.top - 1);
      if(drag.edge === 'left') c.left = clamp(c.left + dx, 0, layout.fullWidth - c.right - 1);
      if(drag.edge === 'right') c.right = clamp(c.right - dx, 0, layout.fullWidth - c.left - 1);
      state.canvasCrop = c; renderProps(); requestRender(); return;
    }
    if(drag.type === 'imageCrop'){
      const im = state.images[drag.index];
      const dx = Math.round(w.x - drag.start.x), dy = Math.round(w.y - drag.start.y);
      const c = {...drag.startCrop};
      if(drag.edge === 'top') c.top = clamp(c.top + dy, 0, im.height - c.bottom - 1);
      if(drag.edge === 'bottom') c.bottom = clamp(c.bottom - dy, 0, im.height - c.top - 1);
      if(drag.edge === 'left') c.left = clamp(c.left + dx, 0, im.width - c.right - 1);
      if(drag.edge === 'right') c.right = clamp(c.right - dx, 0, im.width - c.left - 1);
      im.crop = c; renderProps(); requestRender(); return;
    }
    if(drag.type === 'annotationMove'){
      const a = state.annotations[drag.index];
      a.x = Math.round(drag.ann.x + (w.x - drag.start.x));
      a.y = Math.round(drag.ann.y + (w.y - drag.start.y));
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'annotationResize'){
      const a = state.annotations[drag.index];
      a.w = Math.max(24, Math.round((drag.ann.w || 180) + (w.x - drag.start.x)));
      a.h = Math.max(24, Math.round((drag.ann.h || 90) + (w.y - drag.start.y)));
      if(a.type === 'text'){ a.fontSize = Math.max(12, Math.round((drag.ann.fontSize || 28) + (w.y - drag.start.y)/4)); }
      renderProps(); requestRender(); return;
    }
    if(['seamBefore','seamAfter','seamCenter'].includes(drag.type)){
      const s = state.seams[drag.index];
      const vertical = state.orientation === 'vertical';
      const d = vertical ? Math.round(w.y - drag.start.y) : Math.round(w.x - drag.start.x);
      const a = state.images[drag.index];
      const b = state.images[drag.index+1];
      const maxBefore = vertical ? a.height - a.crop.top - a.crop.bottom - 1 : a.width - a.crop.left - a.crop.right - 1;
      const maxAfter = vertical ? b.height - b.crop.top - b.crop.bottom - 1 : b.width - b.crop.left - b.crop.right - 1;
      if(drag.type === 'seamBefore') s.beforeCrop = clamp(drag.before - d, 0, maxBefore);
      if(drag.type === 'seamAfter') s.afterCrop = clamp(drag.after + d, 0, maxAfter);
      if(drag.type === 'seamCenter'){
        s.beforeCrop = clamp(drag.before - d, 0, maxBefore);
        s.afterCrop = clamp(drag.after + d, 0, maxAfter);
      }
      renderProps(); requestRender(); return;
    }
  }

  function onPointerUp(e){
    drag = null;
    stage.classList.remove('dragging');
  }

  function getPointer(e){
    const r = stageWrap.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  function onWheel(e){
    if(!state.images.length) return;
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      const rect = stageWrap.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const before = screenToWorld(mx,my);
      const factor = e.deltaY < 0 ? 1.08 : 0.92;
      state.zoom = clamp(state.zoom * factor, 0.03, 8);
      state.pan.x = mx - before.x * state.zoom;
      state.pan.y = my - before.y * state.zoom;
      requestRender();
    } else {
      state.pan.x -= e.deltaX;
      state.pan.y -= e.deltaY;
      requestRender();
    }
  }

  function renderProps(){
    updateToolbarButtons();
    if(!state.images.length){
      props.innerHTML = `
        <div class="prop-card"><h3>开始</h3><p class="hint">点击“打开图片”、拖入图片，或直接 Ctrl+V 粘贴截图。导入多张图片后会自动生成拼接线。</p></div>
        <div class="prop-card"><h3>模式说明</h3><p class="hint"><b>拼接线</b>：调两张图接缝；<br><b>整体裁剪</b>：裁最终拼图；<br><b>单图裁剪</b>：每张原图四边单独裁；<br><b>分隔线</b>：在接缝处加横线。</p></div>`;
      return;
    }
    const mode = state.mode;
    let html = '';
    html += imageListCard();
    if(mode === 'seam') html += seamProps();
    if(mode === 'canvasCrop') html += canvasCropProps();
    if(mode === 'imageCrop') html += imageCropProps();
    if(mode === 'divider') html += dividerProps();
    if(mode === 'tools') html += toolsProps();
    props.innerHTML = html;
    bindPropEvents();
  }

  function imageListCard(){
    return `<div class="prop-card"><h3>图片列表</h3><div class="image-list">${state.images.map((im,i)=>`
      <div class="image-item ${state.selected?.type==='image'&&state.selected.index===i?'selected':''}" data-select-image="${i}">
        <img class="thumb" src="${im.dataUrl}" alt="">
        <div><div class="image-name">${escapeHtml(im.name)}</div><div class="image-meta">${im.width}×${im.height}px</div></div>
        <div class="tiny-actions">
          <button title="上移" data-move-up="${i}">↑</button>
          <button title="下移" data-move-down="${i}">↓</button>
          <button title="删除" data-remove-image="${i}">×</button>
        </div>
      </div>`).join('')}</div></div>`;
  }

  function seamProps(){
    const idx = state.selected?.type==='seam' ? state.selected.index : 0;
    const s = state.seams[idx];
    if(!s) return `<div class="prop-card"><h3>拼接线</h3><p class="hint">至少导入两张图片才会出现拼接线。</p></div>`;
    return `<div class="prop-card"><h3>拼接线 ${idx+1}</h3>
      <p class="hint">默认锁定，点击“编辑/解锁”后，黄色箭头才能拖动。双击拼接线或点“自动识别”可尝试找重叠。所有调节本质上都是裁掉上/下图的一部分，不是移动分割线本身。</p>
      <div class="mini-grid">
        <button class="mini-btn ${!s.locked?'active':''}" id="toggleSeamLock">${s.locked?'编辑 / 解锁':'完成 / 锁定'}</button>
        <button class="mini-btn" id="autoSeamBtn">自动识别</button>
      </div>
      <div class="row"><label>${state.orientation==='vertical'?'上图底部':'左图右侧'}</label><input type="number" data-num="seam.beforeCrop" value="${s.beforeCrop}" min="0"></div>
      <div class="row"><label>${state.orientation==='vertical'?'下图顶部':'右图左侧'}</label><input type="number" data-num="seam.afterCrop" value="${s.afterCrop}" min="0"></div>
      <div class="mini-grid">
        <button class="mini-btn" data-select-prev-seam>上一条</button>
        <button class="mini-btn" data-select-next-seam>下一条</button>
        <button class="mini-btn" id="resetSeamBtn">重置</button>
        <button class="mini-btn warn" id="deleteSeamBtn">删除裁剪值</button>
      </div>
    </div>
    <div class="prop-card"><h3>快捷键</h3><p class="hint"><span class="kbd">↑↓←→</span> 微调 1px；<br><span class="kbd">Shift</span> + 方向键微调 10px；<br><span class="kbd">Delete</span> 重置当前拼接线裁剪值。</p></div>`;
  }

  function canvasCropProps(){
    const c = state.canvasCrop;
    return `<div class="prop-card"><h3>整体裁剪</h3><p class="hint">裁的是最终拼好的整张图，不影响每张原图自己的裁剪值。</p>
      ${cropInputs('canvas', c)}
      <div class="mini-grid">
        <button class="mini-btn" id="resetCanvasCrop">重置</button>
        <button class="mini-btn" id="autoWhiteCanvas">一键去白边</button>
      </div>
    </div>`;
  }

  function imageCropProps(){
    let idx = state.selected?.type==='image' ? state.selected.index : 0;
    idx = clamp(idx, 0, state.images.length-1);
    const im = state.images[idx];
    return `<div class="prop-card"><h3>单图裁剪：${idx+1}</h3><p class="hint">这里裁的是每张原始图片自己的上、下、左、右边界，不是移动图片。</p>
      ${cropInputs('image', im.crop)}
      <div class="mini-grid">
        <button class="mini-btn" id="resetImageCrop">重置当前</button>
        <button class="mini-btn" id="copyCropNext">复制到下一张</button>
        <button class="mini-btn" id="applyCropAll">应用到全部</button>
        <button class="mini-btn" id="autoWhiteImage">当前去白边</button>
      </div>
    </div>`;
  }

  function dividerProps(){
    const imageHint = `<div class="prop-card"><h3>插入分割线 / 拆分图片</h3><p class="hint">现在支持单张长图直接插入分割线。你可以在画布中切到“分隔线”模式后，直接点击图片希望拆开的地方；也可以用下面按钮按当前图片中点拆开。拆开后会自动生成一条拼接线，便于去掉重复页眉页脚。</p>
      <div class="mini-grid"><button class="mini-btn" id="splitCurrentImage">拆分当前图片</button><button class="mini-btn" id="splitCurrentImageMiddle">按中点拆分</button></div></div>`;
    if(!state.seams.length) return imageHint;
    const idx = state.selected?.type==='divider' ? state.selected.index : 0;
    const s = state.seams[idx];
    const d = s?.divider || {enabled:false, style:'solid', thickness:2, color:'#111827', background:'#ffffff', marginBefore:8, marginAfter:8};
    return imageHint + `<div class="prop-card"><h3>分隔线 ${idx+1}</h3><p class="hint">现有拼接接缝上可以加装饰性分隔线。黄色 + / − 只负责插入或删除分隔线；真正的接缝调整仍然通过拼接线模式去裁掉上图/下图内容。</p>
      <div class="mini-grid"><button class="mini-btn ${d.enabled?'active':''}" id="toggleDivider">${d.enabled?'删除分隔线':'插入分隔线'}</button><button class="mini-btn" data-select-next-seam>下一条</button></div>
      <div class="row"><label>样式</label><select data-divider="style"><option value="solid" ${d.style==='solid'?'selected':''}>实线</option><option value="dashed" ${d.style==='dashed'?'selected':''}>虚线</option><option value="dotted" ${d.style==='dotted'?'selected':''}>点线</option></select></div>
      <div class="row"><label>粗细</label><input type="number" min="1" max="80" data-divider="thickness" value="${d.thickness}"></div>
      <div class="row"><label>颜色</label><input type="color" data-divider="color" value="${d.color}"></div>
      <div class="row"><label>上/左留白</label><input type="number" min="0" max="500" data-divider="marginBefore" value="${d.marginBefore}"></div>
      <div class="row"><label>下/右留白</label><input type="number" min="0" max="500" data-divider="marginAfter" value="${d.marginAfter}"></div>
    </div>`;
  }

  function toolsProps(){
    const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
    const a = idx >= 0 ? state.annotations[idx] : null;
    return `<div class="prop-card"><h3>工具模式</h3><p class="hint">已经实现基础工具：文字、遮挡块、矩形框、箭头。添加后可在画布中拖动对象，拖右下角蓝色小方块缩放；文字可在左侧直接修改内容。</p>
      <div class="mini-grid"><button class="mini-btn" id="addTextTool">添加文字</button><button class="mini-btn" id="addRedactTool">添加遮挡</button><button class="mini-btn" id="addBoxTool">添加矩形框</button><button class="mini-btn" id="addArrowTool">添加箭头</button></div>
    </div>` + (a ? `<div class="prop-card"><h3>当前对象：${a.type}</h3>
      <div class="row"><label>X</label><input type="number" data-ann="x" value="${Math.round(a.x||0)}"></div>
      <div class="row"><label>Y</label><input type="number" data-ann="y" value="${Math.round(a.y||0)}"></div>
      ${a.type!=='text' ? `<div class="row"><label>宽度</label><input type="number" data-ann="w" value="${Math.round(a.w||180)}"></div><div class="row"><label>高度</label><input type="number" data-ann="h" value="${Math.round(a.h||90)}"></div>` : `<div class="row"><label>字号</label><input type="number" data-ann="fontSize" value="${Math.round(a.fontSize||28)}"></div><div class="row"><label>文字</label><input type="text" data-ann="text" value="${escapeHtml(a.text||'')}" ></div>`}
      <div class="row"><label>颜色</label><input type="color" data-ann="color" value="${a.color||'#111827'}"></div>
      ${a.type==='text' ? `<div class="row"><label>背景</label><select data-ann="bg"><option value="transparent" ${(a.bg||'transparent')==='transparent'?'selected':''}>透明</option><option value="#ffffff" ${a.bg==='#ffffff'?'selected':''}>白底</option><option value="#111827" ${a.bg==='#111827'?'selected':''}>黑底</option><option value="#ffeb3b" ${a.bg==='#ffeb3b'?'selected':''}>黄底</option></select></div>` : ''}
      ${(a.type==='box' || a.type==='arrow') ? `<div class="row"><label>线宽</label><input type="number" data-ann="lineWidth" value="${Math.round(a.lineWidth||4)}"></div>` : ''}
      <div class="mini-grid"><button class="mini-btn warn" id="deleteAnnotationBtn">删除当前对象</button></div>
    </div>` : `<div class="prop-card"><h3>当前对象</h3><p class="hint">还没有选中工具对象。请点击上面的“添加”按钮，或在画布中选中已存在的对象。</p></div>`);
  }

  function cropInputs(prefix, c){
    return `<div class="row"><label>顶部</label><input type="number" min="0" data-crop="${prefix}.top" value="${c.top}"></div>
      <div class="row"><label>底部</label><input type="number" min="0" data-crop="${prefix}.bottom" value="${c.bottom}"></div>
      <div class="row"><label>左侧</label><input type="number" min="0" data-crop="${prefix}.left" value="${c.left}"></div>
      <div class="row"><label>右侧</label><input type="number" min="0" data-crop="${prefix}.right" value="${c.right}"></div>`;
  }

  function bindPropEvents(){
    $$('[data-select-image]', props).forEach(el => el.addEventListener('click', e=>{
      if(e.target.closest('button')) return;
      state.selected = {type:'image', index:+el.dataset.selectImage};
      if(state.mode !== 'divider') state.mode = 'imageCrop';
      updateModeButtons(); renderProps(); requestRender();
    }));
    $$('[data-move-up]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); moveImage(+btn.dataset.moveUp, -1); }));
    $$('[data-move-down]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); moveImage(+btn.dataset.moveDown, 1); }));
    $$('[data-remove-image]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); removeImage(+btn.dataset.removeImage); }));

    $$('[data-crop]', props).forEach(inp => inp.addEventListener('change', () => {
      pushHistory();
      const [obj, edge] = inp.dataset.crop.split('.');
      const v = Math.max(0, Math.round(+inp.value || 0));
      if(obj === 'canvas') state.canvasCrop[edge] = v;
      if(obj === 'image'){
        const idx = state.selected?.type==='image' ? state.selected.index : 0;
        state.images[idx].crop[edge] = v;
      }
      renderProps(); requestRender();
    }));

    $$('[data-num]', props).forEach(inp => inp.addEventListener('change', () => {
      pushHistory();
      const idx = state.selected?.type==='seam' ? state.selected.index : 0;
      const s = state.seams[idx]; if(!s) return;
      const prop = inp.dataset.num.split('.')[1];
      s[prop] = Math.max(0, Math.round(+inp.value || 0));
      renderProps(); requestRender();
    }));

    $('#toggleSeamLock')?.addEventListener('click', () => {
      const idx = state.selected?.type==='seam' ? state.selected.index : 0;
      if(!state.seams[idx]) return;
      state.seams[idx].locked = !state.seams[idx].locked;
      renderProps(); requestRender();
    });
    $('#autoSeamBtn')?.addEventListener('click', () => autoCurrentSeam());
    $('#resetSeamBtn')?.addEventListener('click', () => { const idx = selectedSeamIndex(); if(idx<0)return; pushHistory(); state.seams[idx].beforeCrop=0; state.seams[idx].afterCrop=0; renderProps(); requestRender(); });
    $('#deleteSeamBtn')?.addEventListener('click', () => { const idx = selectedSeamIndex(); if(idx<0)return; pushHistory(); state.seams[idx].beforeCrop=0; state.seams[idx].afterCrop=0; state.seams[idx].divider=null; renderProps(); requestRender(); });

    $$('[data-select-prev-seam]', props).forEach(btn => btn.addEventListener('click', () => selectSeamByDelta(-1)));
    $$('[data-select-next-seam]', props).forEach(btn => btn.addEventListener('click', () => selectSeamByDelta(1)));

    $('#resetCanvasCrop')?.addEventListener('click', () => { pushHistory(); state.canvasCrop={top:0,right:0,bottom:0,left:0}; renderProps(); requestRender(); });
    $('#autoWhiteCanvas')?.addEventListener('click', () => { autoWhiteCanvas(); });
    $('#resetImageCrop')?.addEventListener('click', () => { const idx = selectedImageIndex(); pushHistory(); state.images[idx].crop={top:0,right:0,bottom:0,left:0}; renderProps(); requestRender(); });
    $('#copyCropNext')?.addEventListener('click', () => { const idx=selectedImageIndex(); if(!state.images[idx+1])return; pushHistory(); state.images[idx+1].crop={...state.images[idx].crop}; renderProps(); requestRender(); });
    $('#applyCropAll')?.addEventListener('click', () => { const idx=selectedImageIndex(); pushHistory(); const c={...state.images[idx].crop}; state.images.forEach(im=>im.crop={...c}); renderProps(); requestRender(); });
    $('#autoWhiteImage')?.addEventListener('click', () => { autoWhiteImage(selectedImageIndex()); });

    $('#toggleDivider')?.addEventListener('click', () => toggleDivider(selectedDividerIndex()));
    $$('[data-divider]', props).forEach(inp => inp.addEventListener('change', () => {
      const idx = selectedDividerIndex(); if(idx<0)return;
      pushHistory(); ensureDivider(idx);
      const d = state.seams[idx].divider;
      const key = inp.dataset.divider;
      d[key] = inp.type === 'number' ? Math.max(0, Math.round(+inp.value || 0)) : inp.value;
      renderProps(); requestRender();
    }));

    $('#splitCurrentImage')?.addEventListener('click', () => { const idx = state.selected?.type==='image' ? state.selected.index : 0; splitImageAt(clamp(idx,0,state.images.length-1), null); });
    $('#splitCurrentImageMiddle')?.addEventListener('click', () => { const idx = state.selected?.type==='image' ? state.selected.index : 0; splitImageAt(clamp(idx,0,state.images.length-1), null); });

    $('#addTextTool')?.addEventListener('click', () => addAnnotation('text'));
    $('#addRedactTool')?.addEventListener('click', () => addAnnotation('redact'));
    $('#addBoxTool')?.addEventListener('click', () => addAnnotation('box'));
    $('#addArrowTool')?.addEventListener('click', () => addAnnotation('arrow'));
    $('#deleteAnnotationBtn')?.addEventListener('click', () => deleteSelectedAnnotation());
    $$('[data-ann]', props).forEach(inp => inp.addEventListener(inp.type==='text' ? 'input' : 'change', () => {
      const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
      if(idx < 0) return;
      pushHistory();
      const a = state.annotations[idx];
      const key = inp.dataset.ann;
      if(inp.type === 'number') a[key] = Math.round(+inp.value || 0); else a[key] = inp.value;
      renderProps(); requestRender();
    }));
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function selectedImageIndex(){ return clamp(state.selected?.type==='image' ? state.selected.index : 0, 0, state.images.length-1); }
  function selectedSeamIndex(){ return state.selected?.type==='seam' ? state.selected.index : (state.seams.length?0:-1); }
  function selectedDividerIndex(){ return state.selected?.type==='divider' ? state.selected.index : (state.seams.length?0:-1); }

  function selectSeamByDelta(d){
    if(!state.seams.length) return;
    const cur = state.selected?.type==='seam' || state.selected?.type==='divider' ? state.selected.index : 0;
    const next = clamp(cur + d, 0, state.seams.length-1);
    state.selected = {type: state.mode==='divider' ? 'divider' : 'seam', index: next};
    renderProps(); requestRender();
  }

  function moveImage(i, d){
    const j = i+d;
    if(j<0 || j>=state.images.length) return;
    pushHistory();
    [state.images[i], state.images[j]] = [state.images[j], state.images[i]];
    syncSeams(true);
    state.selected = {type:'image', index:j};
    renderProps(); fitToView(false); requestRender();
  }

  function removeImage(i){
    pushHistory();
    state.images.splice(i,1);
    syncSeams(true);
    state.selected = state.images.length ? {type:'image', index:clamp(i,0,state.images.length-1)} : null;
    renderProps(); fitToView(false); requestRender();
  }

  function toggleDivider(idx){
    if(idx<0) return;
    pushHistory();
    const s = state.seams[idx];
    if(s.divider?.enabled) s.divider = null;
    else ensureDivider(idx);
    state.selected = {type:'divider', index:idx};
    renderProps(); requestRender();
  }
  function ensureDivider(idx){
    if(!state.seams[idx].divider) state.seams[idx].divider = {enabled:true, style:'solid', thickness:2, color:'#111827', background:'#ffffff', marginBefore:8, marginAfter:8};
  }

  function updateModeButtons(){
    $$('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
    $$('.mobile-mode').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
  }

  function updateToolbarButtons(){
    $('#verticalBtn')?.classList.toggle('active', state.orientation === 'vertical');
    $('#horizontalBtn')?.classList.toggle('active', state.orientation === 'horizontal');
    $('#previewBtn')?.classList.toggle('blue', state.preview);
    updateUndoRedo();
  }

  function setMode(m){
    state.mode = m;
    state.preview = false;
    if(m === 'canvasCrop') state.selected = {type:'canvasCrop'};
    if(m === 'seam' && state.seams.length && state.selected?.type !== 'seam') state.selected = {type:'seam', index:0};
    if(m === 'imageCrop' && state.images.length && state.selected?.type !== 'image') state.selected = {type:'image', index:0};
    if(m === 'divider'){
      if(state.seams.length) state.selected = state.selected?.type==='divider' ? state.selected : {type:'divider', index:0};
      else if(state.images.length) state.selected = {type:'image', index: clamp(state.selected?.index || 0, 0, state.images.length-1)};
    }
    updateModeButtons(); renderProps(); requestRender();
  }

  async function exportPng(){
    if(!state.images.length){ toast('请先导入图片'); return; }
    const layout = computeLayout(false);
    const maxSide = 32760;
    if(layout.width > maxSide || layout.height > maxSide){
      toast('输出尺寸过大，建议先裁剪或分批导出');
      return;
    }
    const out = document.createElement('canvas');
    out.width = Math.max(1, Math.round(layout.width));
    out.height = Math.max(1, Math.round(layout.height));
    const oc = out.getContext('2d');
    oc.fillStyle = '#fff'; oc.fillRect(0,0,out.width,out.height);
    const full = computeLayout(true);
    oc.save();
    oc.translate(-state.canvasCrop.left, -state.canvasCrop.top);
    drawComposition(oc, full, true, true);
    oc.restore();
    const a = document.createElement('a');
    a.download = `longshot_${new Date().toISOString().replace(/[:.]/g,'-')}.png`;
    a.href = out.toDataURL('image/png');
    a.click();
    toast('PNG 已导出');
  }

  function saveProject(){
    if(!state.images.length){ toast('没有可保存的工程'); return; }
    const blob = new Blob([snapshot()], {type:'application/json'});
    const a = document.createElement('a');
    a.download = `longshot_project_${new Date().toISOString().slice(0,10)}.json`;
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }

  async function openProject(file){
    const txt = await file.text();
    pushHistory();
    await restoreFromSnapshot(txt);
    toast('工程已打开');
  }

  function autoCurrentSeam(){
    const idx = selectedSeamIndex();
    if(idx < 0) return;
    pushHistory();
    const best = findOverlap(idx);
    const s = state.seams[idx];
    if(best){
      // Use detected overlap by cropping the top/left of the second image.
      if(state.orientation === 'vertical') s.afterCrop = best.overlap;
      else s.afterCrop = best.overlap;
      toast(`已尝试自动识别重叠：${best.overlap}px`);
    } else toast('没有找到明显重叠，保持原样');
    renderProps(); requestRender();
  }

  function findOverlap(idx){
    // lightweight pixel sampling: compare bottom/right strip of before image and top/left strip of after image
    const a = state.images[idx], b = state.images[idx+1];
    if(!a || !b) return null;
    const vertical = state.orientation === 'vertical';
    const maxOverlap = Math.min(vertical ? a.height : a.width, vertical ? b.height : b.width, 600);
    const minOverlap = 40;
    const step = 8;
    const sample = 64;
    const ca = document.createElement('canvas'), cb = document.createElement('canvas');
    const ac = ca.getContext('2d', {willReadFrequently:true}), bc = cb.getContext('2d', {willReadFrequently:true});
    if(vertical){ ca.width = cb.width = sample; ca.height = cb.height = maxOverlap; }
    else { ca.width = cb.width = maxOverlap; ca.height = cb.height = sample; }
    try{
      if(vertical){
        ac.drawImage(a.img, 0, a.height-maxOverlap, a.width, maxOverlap, 0, 0, sample, maxOverlap);
        bc.drawImage(b.img, 0, 0, b.width, maxOverlap, 0, 0, sample, maxOverlap);
      } else {
        ac.drawImage(a.img, a.width-maxOverlap, 0, maxOverlap, a.height, 0, 0, maxOverlap, sample);
        bc.drawImage(b.img, 0, 0, maxOverlap, b.height, 0, 0, maxOverlap, sample);
      }
      const ia = ac.getImageData(0,0,ca.width,ca.height).data;
      const ib = bc.getImageData(0,0,cb.width,cb.height).data;
      let best = {score: Infinity, overlap: 0};
      for(let ov=minOverlap; ov<=maxOverlap; ov+=step){
        let score=0, count=0;
        if(vertical){
          const startA = maxOverlap - ov;
          for(let y=0;y<ov;y+=4){ for(let x=0;x<sample;x+=4){
            const pa = ((startA+y)*sample+x)*4, pb=(y*sample+x)*4;
            score += Math.abs(ia[pa]-ib[pb]) + Math.abs(ia[pa+1]-ib[pb+1]) + Math.abs(ia[pa+2]-ib[pb+2]); count++;
          }}
        } else {
          const startA = maxOverlap - ov;
          for(let x=0;x<ov;x+=4){ for(let y=0;y<sample;y+=4){
            const pa = (y*maxOverlap+startA+x)*4, pb=(y*maxOverlap+x)*4;
            score += Math.abs(ia[pa]-ib[pb]) + Math.abs(ia[pa+1]-ib[pb+1]) + Math.abs(ia[pa+2]-ib[pb+2]); count++;
          }}
        }
        score /= Math.max(1,count);
        if(score < best.score) best = {score, overlap: ov};
      }
      return best.score < 38 ? best : null;
    }catch(e){ return null; }
  }

  function autoWhiteImage(idx){
    const im = state.images[idx]; if(!im) return;
    pushHistory();
    const c = detectWhiteBorder(im.img);
    im.crop = c;
    renderProps(); requestRender(); toast('已尝试去除当前图片白边');
  }

  function autoWhiteCanvas(){
    if(!state.images.length) return;
    pushHistory();
    const layout = computeLayout(true);
    const out = document.createElement('canvas'); out.width = layout.fullWidth; out.height = layout.fullHeight;
    const oc = out.getContext('2d'); drawComposition(oc, layout, true, true);
    state.canvasCrop = detectWhiteBorder(out);
    renderProps(); requestRender(); toast('已尝试去除整体白边');
  }

  function detectWhiteBorder(imgOrCanvas){
    const maxSample = 1200;
    const scale = Math.min(1, maxSample / Math.max(imgOrCanvas.width || imgOrCanvas.naturalWidth, imgOrCanvas.height || imgOrCanvas.naturalHeight));
    const w = Math.max(1, Math.round((imgOrCanvas.width || imgOrCanvas.naturalWidth) * scale));
    const h = Math.max(1, Math.round((imgOrCanvas.height || imgOrCanvas.naturalHeight) * scale));
    const c = document.createElement('canvas'); c.width=w; c.height=h;
    const g = c.getContext('2d', {willReadFrequently:true});
    g.drawImage(imgOrCanvas, 0,0,w,h);
    const data = g.getImageData(0,0,w,h).data;
    const isWhite = (x,y) => { const p=(y*w+x)*4; return data[p]>245 && data[p+1]>245 && data[p+2]>245; };
    const rowWhite = y => { let cnt=0; for(let x=0;x<w;x+=4) if(isWhite(x,y)) cnt++; return cnt >= Math.ceil(w/4)*0.96; };
    const colWhite = x => { let cnt=0; for(let y=0;y<h;y+=4) if(isWhite(x,y)) cnt++; return cnt >= Math.ceil(h/4)*0.96; };
    let top=0,bottom=0,left=0,right=0;
    while(top<h-1 && rowWhite(top)) top++;
    while(bottom<h-top-1 && rowWhite(h-1-bottom)) bottom++;
    while(left<w-1 && colWhite(left)) left++;
    while(right<w-left-1 && colWhite(w-1-right)) right++;
    return {top:Math.round(top/scale), bottom:Math.round(bottom/scale), left:Math.round(left/scale), right:Math.round(right/scale)};
  }

  function setOrientation(o){
    if(state.orientation === o) return;
    pushHistory();
    state.orientation = o;
    state.canvasCrop = {top:0,right:0,bottom:0,left:0};
    state.seams.forEach(s => { s.beforeCrop=0; s.afterCrop=0; });
    updateToolbarButtons(); renderProps(); fitToView(false); requestRender();
  }

  function clearAll(){
    if(!state.images.length) return;
    if(!confirm('确定清空当前图片和编辑参数吗？')) return;
    pushHistory();
    state.images=[]; state.seams=[]; state.annotations=[]; state.selected=null; state.canvasCrop={top:0,right:0,bottom:0,left:0};
    renderProps(); requestRender();
  }

  function handleKey(e){
    if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
    if(e.key === '1') setMode('seam');
    else if(e.key === '2') setMode('canvasCrop');
    else if(e.key === '3') setMode('imageCrop');
    else if(e.key === '4') setMode('divider');
    else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){ e.preventDefault(); undo(); }
    else if((e.ctrlKey||e.metaKey) && (e.key.toLowerCase()==='y' || (e.shiftKey && e.key.toLowerCase()==='z'))){ e.preventDefault(); redo(); }
    else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='s'){ e.preventDefault(); exportPng(); }
    else if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Delete','Backspace'].includes(e.key)){
      if(!state.images.length) return;
      e.preventDefault();
      if(e.key === 'Delete' || e.key === 'Backspace'){
        if(state.selected?.type === 'seam'){ pushHistory(); const s=state.seams[state.selected.index]; if(s){s.beforeCrop=0;s.afterCrop=0;} }
        if(state.selected?.type === 'divider'){ toggleDivider(state.selected.index); return; }
        if(state.selected?.type === 'annotation'){ deleteSelectedAnnotation(); return; }
        renderProps(); requestRender(); return;
      }
      const amount = e.shiftKey ? 10 : (e.ctrlKey || e.metaKey ? 50 : 1);
      const sign = (e.key === 'ArrowDown' || e.key === 'ArrowRight') ? 1 : -1;
      nudge(sign * amount, e.key);
    }
  }

  function nudge(delta, key){
    const verticalKey = key === 'ArrowUp' || key === 'ArrowDown';
    if(state.mode === 'seam' && state.selected?.type === 'seam'){
      const s = state.seams[state.selected.index]; if(!s) return;
      if(s.locked){ toast('拼接线已锁定，先解锁'); return; }
      pushHistory();
      if((state.orientation === 'vertical' && verticalKey) || (state.orientation === 'horizontal' && !verticalKey)){
        if(key==='ArrowUp' || key==='ArrowLeft') s.beforeCrop = Math.max(0, s.beforeCrop + Math.abs(delta));
        if(key==='ArrowDown' || key==='ArrowRight') s.afterCrop = Math.max(0, s.afterCrop + Math.abs(delta));
      }
    } else if(state.mode === 'canvasCrop'){
      pushHistory();
      if(key==='ArrowUp') state.canvasCrop.top = Math.max(0,state.canvasCrop.top+amountSign(delta));
      if(key==='ArrowDown') state.canvasCrop.bottom = Math.max(0,state.canvasCrop.bottom+Math.abs(delta));
      if(key==='ArrowLeft') state.canvasCrop.left = Math.max(0,state.canvasCrop.left+amountSign(delta));
      if(key==='ArrowRight') state.canvasCrop.right = Math.max(0,state.canvasCrop.right+Math.abs(delta));
    } else if(state.mode === 'imageCrop' && state.selected?.type === 'image'){
      pushHistory();
      const c = state.images[state.selected.index].crop;
      const amt = Math.abs(delta);
      if(key==='ArrowUp') c.top = Math.max(0,c.top+amt);
      if(key==='ArrowDown') c.bottom = Math.max(0,c.bottom+amt);
      if(key==='ArrowLeft') c.left = Math.max(0,c.left+amt);
      if(key==='ArrowRight') c.right = Math.max(0,c.right+amt);
    } else if(state.mode === 'tools' && state.selected?.type === 'annotation'){
      pushHistory();
      const a = state.annotations[state.selected.index];
      if(key==='ArrowUp') a.y = Math.max(0,(a.y||0)-Math.abs(delta));
      if(key==='ArrowDown') a.y = Math.max(0,(a.y||0)+Math.abs(delta));
      if(key==='ArrowLeft') a.x = Math.max(0,(a.x||0)-Math.abs(delta));
      if(key==='ArrowRight') a.x = Math.max(0,(a.x||0)+Math.abs(delta));
    }
    renderProps(); requestRender();
  }
  function amountSign(delta){ return Math.abs(delta); }

  // Events
  $('#fileInput').addEventListener('change', e => { addFiles(e.target.files); e.target.value=''; });
  $('#projectInput').addEventListener('change', e => { if(e.target.files[0]) openProject(e.target.files[0]); e.target.value=''; });
  $('#pasteBtn').addEventListener('click', addClipboardImages);
  $('#saveProjectBtn').addEventListener('click', saveProject);
  $('#exportBtn').addEventListener('click', exportPng);
  $('#fitBtn').addEventListener('click', () => fitToView());
  $('#previewBtn').addEventListener('click', () => { state.preview=!state.preview; requestRender(); updateToolbarButtons(); });
  $('#undoBtn').addEventListener('click', undo);
  $('#redoBtn').addEventListener('click', redo);
  $('#clearBtn').addEventListener('click', clearAll);
  $('#verticalBtn').addEventListener('click', () => setOrientation('vertical'));
  $('#horizontalBtn').addEventListener('click', () => setOrientation('horizontal'));
  $$('.mode-btn,.mobile-mode').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));

  document.addEventListener('paste', async e => {
    const files = [];
    for(const item of e.clipboardData?.items || []){
      if(item.type.startsWith('image/')) files.push(item.getAsFile());
    }
    if(files.length) await addFiles(files);
  });
  stage.addEventListener('dragover', e => { e.preventDefault(); });
  stage.addEventListener('drop', e => { e.preventDefault(); addFiles(e.dataTransfer.files); });
  stage.addEventListener('pointerdown', onPointerDown);
  stage.addEventListener('pointermove', onPointerMove);
  stage.addEventListener('pointerup', onPointerUp);
  stage.addEventListener('pointercancel', onPointerUp);
  stage.addEventListener('wheel', onWheel, {passive:false});
  stage.addEventListener('dblclick', e => {
    const p = getPointer(e); const w = screenToWorld(p.x,p.y); const h = hitTest(w.x,w.y);
    if(h?.type?.startsWith('seam')){ state.selected={type:'seam',index:h.index}; autoCurrentSeam(); }
  });
  document.addEventListener('keydown', handleKey);
  window.addEventListener('resize', () => requestRender());
  resizeObserver = new ResizeObserver(() => requestRender());
  resizeObserver.observe(stageWrap);

  renderProps();
  updateUndoRedo();
  requestRender();
})();
</script>
</body>
</html>
