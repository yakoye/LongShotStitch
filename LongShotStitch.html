    toolPopover.querySelectorAll('[data-ann-step]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.preventDefault();
        const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
        if(idx < 0) return;
        const key = btn.dataset.annStep;
        const min = Math.round(+btn.dataset.min || 1);
        const max = Math.round(+btn.dataset.max || 999);
        const delta = Math.round(+btn.dataset.delta || 0);
        const a = state.annotations[idx];
        pushHistory();
        a[key] = clamp(Math.round(+a[key] || min) + delta, min, max);
        renderToolPopover(); requestRender();
      });
    });

    $('#deleteAnnotationBtnFloat')?.addEventListener('click', deleteSelectedAnnotation);
    $('#duplicateAnnotationBtnFloat')?.addEventListener('click', duplicateSelectedAnnotation);
  }

  function updateAnnotationInput(inp){
    const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
    if(idx < 0) return;
    const a = state.annotations[idx];
    const key = inp.dataset.ann;
    let val = inp.dataset.value != null ? inp.dataset.value : (inp.type === 'checkbox' ? inp.checked : inp.value);
    pushHistory();
    if(key === 'outline'){
      a.outline = val === 'toggle' ? !a.outline : (val === true || val === 'true');
    } else if(key === 'type'){
      a.type = val;
      if((val === 'boxFill' || val === 'circleFill') && !a.fillColor) a.fillColor = '#fee2e2';
    } else if(inp.type === 'number' || ['x','y','w','h','fontSize','lineWidth','gridSize','repeatCount'].includes(key)){
      if(key === 'opacity') a[key] = clamp(parseFloat(val || '1'), .05, 1);
      else a[key] = Math.round(+val || 0);
    } else if(key === 'opacity'){
      a[key] = clamp(parseFloat(val || '1'), .05, 1);
    } else {
      a[key] = val;
    }
    renderToolPopover(); requestRender();
  }

  function duplicateSelectedAnnotation(){
    const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
    if(idx < 0) return;
    pushHistory();
    const copy = JSON.parse(JSON.stringify(state.annotations[idx]));
    copy.id = uid('ann'); copy.x = (copy.x||0)+24; copy.y = (copy.y||0)+24;
    state.annotations.push(copy);
    state.selected = {type:'annotation', index:state.annotations.length-1};
    renderProps(); requestRender();
  }

  function drawToolsOverlay(c, layout){
    for(let i=0;i<state.annotations.length;i++){
      const a = state.annotations[i];
      const b = annotationBounds(a);
      const selectable = state.toolArmed === 'select' || state.selected?.type === 'annotation';
      hitAreas.push({type:'annotationSelect', index:i, x:b.x, y:b.y, w:b.w, h:b.h, cursor: selectable ? 'move' : 'default'});
      const selected = state.selected?.type === 'annotation' && state.selected.index === i;
      if(selected){
        c.save();
        c.strokeStyle = '#2f80ed';
        c.lineWidth = 2/state.zoom;
        c.setLineDash([8/state.zoom, 6/state.zoom]);
        c.strokeRect(b.x, b.y, b.w, b.h);
        c.setLineDash([]);
        const hs = 14 / state.zoom;
        c.fillStyle = '#2f80ed';
        c.fillRect(b.x+b.w-hs/2, b.y+b.h-hs/2, hs, hs);
        if(state.toolArmed === 'select') hitAreas.push({type:'annotationResize', index:i, x:b.x+b.w-hs, y:b.y+b.h-hs, w:hs*2, h:hs*2, cursor:'nwse-resize'});
        c.restore();
      }
    }
  }


  function drawAnnotations(c, layout, exportMode=false){
    const drawArrowHead = (x1,y1,x2,y2,color,lineWidth=4) => {
      const ang = Math.atan2(y2-y1, x2-x1);
      const len = Math.max(12, (lineWidth || 4) * 4.2);
      c.save();
      c.fillStyle = color;
      c.beginPath();
      c.moveTo(x2,y2);
      c.lineTo(x2-len*Math.cos(ang-Math.PI/6), y2-len*Math.sin(ang-Math.PI/6));
      c.lineTo(x2-len*Math.cos(ang+Math.PI/6), y2-len*Math.sin(ang+Math.PI/6));
      c.closePath();
      c.fill();
      c.restore();
    };

    for(const a of state.annotations){
      c.save();
      c.globalAlpha = clamp(a.opacity == null ? 1 : +a.opacity, 0.05, 1);
      c.translate(a.x || 0, a.y || 0);
      const w = a.w == null ? 180 : a.w;
      const h = a.h == null ? 90 : a.h;
      const lw = Math.max(1, a.lineWidth || 3);
      const color = a.color || '#ef4444';

      if(a.type === 'text' || a.type === 'watermark'){
        const fs = a.fontSize || (a.type === 'watermark' ? 34 : 28);
        c.font = `700 ${fs}px ui-sans-serif, system-ui, sans-serif`;
        c.textAlign = 'left'; c.textBaseline = 'top';
        const lines = String(a.text || (a.type === 'watermark' ? '水印' : 'Text')).split('\n');
        const drawTextBlock = (ox=0, oy=0) => {
          if(a.bg && a.bg !== 'transparent'){
            const temp = document.createElement('canvas').getContext('2d');
            temp.font = c.font;
            const mw = Math.max(...lines.map(line => temp.measureText(line).width), 40);
            const hh = lines.length * (fs + 6) + 12;
            c.fillStyle = a.bg;
            c.fillRect(ox-8,oy-6,mw+16,hh);
          }
          if(a.outline){
            c.strokeStyle = a.outlineColor || '#ffffff';
            c.lineWidth = Math.max(2, fs/10);
            lines.forEach((line,i)=> c.strokeText(line,ox,oy+i*(fs+6)));
          }
          c.fillStyle = a.color || '#111827';
          lines.forEach((line,i)=> c.fillText(line,ox,oy+i*(fs+6)));
        };
        if(a.type === 'watermark' && (a.repeatCount || 1) > 1 && layout){
          const count = clamp(Math.round(a.repeatCount || 1), 1, 120);
          const cols = Math.max(1, Math.ceil(Math.sqrt(count * Math.max(1, layout.fullWidth) / Math.max(1, layout.fullHeight))));
          const rows = Math.max(1, Math.ceil(count / cols));
          let n = 0;
          for(let r=0;r<rows;r++){
            for(let col=0;col<cols && n<count;col++,n++){
              const px = (col + .5) * layout.fullWidth / cols - (a.x||0);
              const py = (r + .5) * layout.fullHeight / rows - (a.y||0);
              c.save(); c.translate(px, py); c.rotate(-Math.PI/9); drawTextBlock(0,0); c.restore();
            }
          }
        } else drawTextBlock(0,0);
      } else if(a.type === 'badge'){
        const fs = a.fontSize || 34;
        const r = Math.max(12, fs * .62);
        c.beginPath(); c.arc(r, r, r, 0, Math.PI*2);
        c.fillStyle = a.color || '#2f80ed'; c.fill();
        c.strokeStyle = '#fff'; c.lineWidth = Math.max(2, fs/10); c.stroke();
        c.fillStyle = '#fff'; c.font = `800 ${fs}px ui-sans-serif, system-ui, sans-serif`; c.textAlign='center'; c.textBaseline='middle';
        c.fillText(String(a.text || '1'), r, r+1);
      } else if(a.type === 'mosaic'){
        const cell = Math.max(6, a.gridSize || 14);
        const x0 = Math.min(0,w), y0 = Math.min(0,h), ww = Math.abs(w), hh = Math.abs(h);
        c.save();
        c.beginPath(); c.rect(x0,y0,ww,hh); c.clip();
        c.fillStyle = 'rgba(229,231,235,.88)';
        c.fillRect(x0,y0,ww,hh);
        for(let yy=y0; yy<y0+hh; yy+=cell){
          for(let xx=x0; xx<x0+ww; xx+=cell){
            const k = (Math.floor(xx/cell) + Math.floor(yy/cell)) % 4;
            c.fillStyle = ['rgba(31,41,55,.42)','rgba(107,114,128,.42)','rgba(209,213,219,.72)','rgba(17,24,39,.30)'][k];
            c.fillRect(xx, yy, cell+0.5, cell+0.5);
          }
        }
        c.restore();
      } else if(a.type === 'redact'){
        c.fillStyle = a.color || '#111827';
        c.fillRect(0,0,w,h);
      } else if(a.type === 'box' || a.type === 'boxFill'){
        if(a.type === 'boxFill'){
          c.fillStyle = a.fillColor || color;
          c.fillRect(0,0,w,h);
        }
        c.strokeStyle = color;
        c.lineWidth = lw;
        c.strokeRect(0,0,w,h);
      } else if(a.type === 'circle' || a.type === 'circleFill'){
        const x0 = Math.min(0,w), y0 = Math.min(0,h), ww = Math.abs(w), hh = Math.abs(h);
        c.beginPath();
        c.ellipse(x0+ww/2, y0+hh/2, Math.max(1,ww/2), Math.max(1,hh/2), 0, 0, Math.PI*2);
        if(a.type === 'circleFill'){
          c.fillStyle = a.fillColor || color;
          c.fill();
        }
        c.strokeStyle = color;
        c.lineWidth = lw;
        c.stroke();
      } else if(a.type === 'line' || a.type === 'arrow' || a.type === 'doubleArrow'){
        c.strokeStyle = color;
        c.fillStyle = color;
        c.lineWidth = lw;
        c.lineCap = 'round';
        c.lineJoin = 'round';
        c.beginPath(); c.moveTo(0,0); c.lineTo(w,h); c.stroke();
        if(a.type === 'arrow' || a.type === 'doubleArrow') drawArrowHead(0,0,w,h,color,lw);
        if(a.type === 'doubleArrow') drawArrowHead(w,h,0,0,color,lw);
      } else if(a.type === 'pen' || a.type === 'highlight' || a.type === 'mosaicPen'){
        const pts = a.points || [];
        if(pts.length){
          if(a.type === 'mosaicPen'){
            const cell = Math.max(6, a.gridSize || 14);
            const size = Math.max(cell*1.4, a.lineWidth || cell*2);
            for(const p of pts){
              const x0 = p.x - size/2, y0 = p.y - size/2;
              for(let yy=y0; yy<y0+size; yy+=cell){
                for(let xx=x0; xx<x0+size; xx+=cell){
                  const k = (Math.floor(xx/cell) + Math.floor(yy/cell)) % 4;
                  c.fillStyle = ['rgba(31,41,55,.42)','rgba(107,114,128,.42)','rgba(209,213,219,.72)','rgba(17,24,39,.30)'][k];
                  c.fillRect(xx, yy, cell+0.5, cell+0.5);
                }
              }
            }
          } else {
            c.strokeStyle = a.color || (a.type === 'highlight' ? '#facc15' : '#ef4444');
            c.lineWidth = a.lineWidth || (a.type === 'highlight' ? 18 : 4);
            c.lineCap = 'round'; c.lineJoin = 'round';
            if(a.type === 'highlight') c.globalCompositeOperation = 'multiply';
            c.beginPath();
            c.moveTo(pts[0].x, pts[0].y);
            for(let i=1;i<pts.length;i++) c.lineTo(pts[i].x, pts[i].y);
            c.stroke();
          }
        }
      }
      c.restore();
    }
  }

  function annotationBounds(a){
    if(a.type === 'text' || a.type === 'watermark'){
      const temp = document.createElement('canvas').getContext('2d');
      const fs = a.fontSize || (a.type === 'watermark' ? 34 : 28);
      temp.font = `700 ${fs}px ui-sans-serif, system-ui, sans-serif`;
      const lines = String(a.text || (a.type === 'watermark' ? '水印' : 'Text')).split('\n');
      const width = Math.max(...lines.map(line => temp.measureText(line).width), 40) + ((a.bg && a.bg !== 'transparent') ? 16 : 0);
      const height = Math.max(24, lines.length * (fs+6));
      return {x:(a.x||0)-8, y:(a.y||0)-6, w:width+16, h:height+12};
    }
    if(a.type === 'badge'){
      const fs = a.fontSize || 34; const r = Math.max(12, fs*.62);
      return {x:a.x||0, y:a.y||0, w:r*2, h:r*2};
    }
    if(a.type === 'pen' || a.type === 'highlight' || a.type === 'mosaicPen'){
      const pts = a.points || [];
      if(!pts.length) return {x:a.x||0, y:a.y||0, w:24, h:24};
      const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const pad = Math.max(8, (a.lineWidth || (a.type === 'highlight' ? 18 : 4)) / 2 + 4);
      return {x:(a.x||0)+minX-pad, y:(a.y||0)+minY-pad, w:Math.max(24,maxX-minX+pad*2), h:Math.max(24,maxY-minY+pad*2)};
    }
    const w = a.w == null ? 180 : a.w;
    const h = a.h == null ? 90 : a.h;
    const pad = Math.max(6, (a.lineWidth || 3) + 4);
    return {x:(a.x||0)+Math.min(0,w)-pad, y:(a.y||0)+Math.min(0,h)-pad, w:Math.max(24,Math.abs(w)+pad*2), h:Math.max(24,Math.abs(h)+pad*2)};
  }

  function makeAnnotation(type, pt){
    const s = state.toolSettings || {};
    const base = { id: uid('ann'), type, x: Math.round(pt.x), y: Math.round(pt.y), w: 180, h: 90, color: s.color || '#ef4444', fillColor:s.fillColor || '#fee2e2', bg: 'transparent', opacity: s.opacity == null ? 1 : s.opacity, lineWidth: s.lineWidth || 4, fontSize: 28, text: '文本' };
    if(type === 'redact') Object.assign(base, {color:'#111827', fillColor:'#111827', w:220, h:72});
    if(type === 'mosaic') Object.assign(base, {w:220, h:90, gridSize:s.mosaicGrid || 14, opacity:1});
    if(type === 'mosaicPen') Object.assign(base, {points:[{x:0,y:0}], w:0, h:0, gridSize:s.mosaicGrid || 14, lineWidth:Math.max(18,(s.mosaicGrid||14)*2), opacity:1});
    if(type === 'box') Object.assign(base, {color:s.color || '#ef4444', w:220, h:110, lineWidth:s.lineWidth || 4});
    if(type === 'boxFill') Object.assign(base, {color:s.color || '#ef4444', fillColor:s.fillColor || '#fee2e2', opacity:s.opacity == null ? .72 : s.opacity, w:220, h:110, lineWidth:s.lineWidth || 4});
    if(type === 'circle') Object.assign(base, {color:s.color || '#ef4444', w:180, h:120, lineWidth:s.lineWidth || 4});
    if(type === 'circleFill') Object.assign(base, {color:s.color || '#ef4444', fillColor:s.fillColor || '#fee2e2', opacity:s.opacity == null ? .72 : s.opacity, w:180, h:120, lineWidth:s.lineWidth || 4});
    if(type === 'line') Object.assign(base, {color:s.color || '#ef4444', w:200, h:80, lineWidth:s.lineWidth || 4});
    if(type === 'arrow') Object.assign(base, {color:s.color || '#ef4444', w:200, h:80, lineWidth:s.lineWidth || 4});
    if(type === 'doubleArrow') Object.assign(base, {color:s.color || '#ef4444', w:200, h:80, lineWidth:s.lineWidth || 4});
    if(type === 'text') Object.assign(base, {color:s.textColor || '#111827', bg:s.textBg || 'transparent', outline:!!s.textOutline, text:s.textValue || '输入文字', fontSize:s.textSize || 28, w:0, h:0});
    if(type === 'badge') Object.assign(base, {color:s.badgeColor || '#2f80ed', text:String(s.badgeNumber || 1), fontSize:s.badgeSize || 34, w:0, h:0});
    if(type === 'watermark') Object.assign(base, {color:s.watermarkColor || '#111827', bg:'transparent', text:s.watermarkText || '水印', fontSize:s.watermarkSize || 34, opacity:s.watermarkOpacity == null ? .22 : s.watermarkOpacity, repeatCount:s.watermarkRepeat || 1, w:0, h:0});
    if(type === 'pen') Object.assign(base, {color:s.penColor || '#ef4444', lineWidth:s.penWidth || 4, points:[{x:0,y:0}], w:0, h:0});
    if(type === 'highlight') Object.assign(base, {color:s.penColor || '#facc15', opacity:.45, lineWidth:s.highlightWidth || 18, points:[{x:0,y:0}], w:0, h:0});
    return base;
  }

  function addAnnotation(type){
    if(!state.images.length) return;
    const layout = computeLayout(true);
    addAnnotationAt(type, { x: Math.max(20, layout.fullWidth/2 - 80), y: Math.max(20, layout.fullHeight/2 - 40) });
  }

  function beginToolDraw(type, pt){
    if(!type || type === 'select' || !state.images.length) return false;
    if(type === 'watermark'){
      const existing = findExistingWatermarkIndex();
      if(existing >= 0) return selectAnnotationForEdit(existing);
    }
    pushHistory();
    const a = makeAnnotation(type, pt);
    state.annotations.push(a);
    const idx = state.annotations.length - 1;
    state.selected = {type:'annotation', index:idx};
    if(type === 'text' || type === 'watermark' || type === 'badge'){
      if(type === 'badge' && state.toolSettings.badgeNumber < 10) state.toolSettings.badgeNumber++;
      applyActiveTool();
      renderProps(); requestRender();
      return true;
    }
    drag = { type:'toolCreate', index:idx, tool:type, start:{...pt}, ann:{...a} };
    renderProps(); requestRender();
    return true;
  }

  function addAnnotationAt(type, pt){
    return beginToolDraw(type, pt);
  }

  function deleteSelectedAnnotation(){
    const idx = state.selected?.type === 'annotation' ? state.selected.index : -1;
    if(idx < 0) return;
    pushHistory();
    state.annotations.splice(idx,1);
    state.selected = state.annotations.length ? {type:'annotation', index: clamp(idx, 0, state.annotations.length-1)} : null;
    renderProps(); requestRender();
  }

  function normalizeProjectCrops(){
    const effective = state.images.map((im,i) => getEffectiveCrop(i));
    state.images.forEach((im,i) => { im.crop = {...effective[i]}; });
    state.seams.forEach(s => { s.beforeCrop = 0; s.afterCrop = 0; });
  }



  function splitImageAt(index, localPos=null){
    const original = state.images[index];
    if(!original) return;
    pushHistory();
    normalizeProjectCrops();
    const im = state.images[index];
    const visible = state.orientation === 'vertical' ? (im.height - im.crop.top - im.crop.bottom) : (im.width - im.crop.left - im.crop.right);
    const pos = clamp(Math.round(localPos == null ? visible/2 : localPos), 1, Math.max(1, visible - 1));
    const a = {...im, id: uid('img'), name: im.name + ' A', crop: {...im.crop}};
    const b = {...im, id: uid('img'), name: im.name + ' B', crop: {...im.crop}};
    if(state.orientation === 'vertical'){
      const sourceSplit = im.crop.top + pos;
      a.crop.bottom = im.height - sourceSplit;
      b.crop.top = sourceSplit;
    } else {
      const sourceSplit = im.crop.left + pos;
      a.crop.right = im.width - sourceSplit;
      b.crop.left = sourceSplit;
    }
    state.images.splice(index,1,a,b);
    syncSeams(true);
    if(state.seams[index]) state.seams[index].locked = false;
    state.selected = {type:'seam', index};
    state.mode = 'seam';
    updateModeButtons(); renderProps(); requestRender();
    toast('已插入分割线，并把当前图片分成两段');
  }

  function insertSeamAtDraft(){
    if(!state.images.length) return;
    ensureSplitDraft();
    const layout = computeLayout(true);
    const pos = state.splitDraft.pos;
    const seamThreshold = 18;
    const enterCurrentSeamEdit = (idx) => {
      state.mode = 'divider';
      state.selected = {type:'seam', index:idx};
      state.activeHandle = {kind:'seamCenter', index:idx};
      updateModeButtons(); renderProps(); requestRender();
    };
    if(state.orientation === 'vertical'){
      const existing = layout.seams.find(sv => Math.abs(sv.y - pos) <= seamThreshold);
      if(existing){ enterCurrentSeamEdit(existing.index); return; }
      const target = layout.imageBounds.find(b => pos > b.y + 1 && pos < b.y + b.h - 1);
      if(!target) return;
      splitImageAt(target.index, pos - target.y);
      enterCurrentSeamEdit(target.index);
    } else {
      const existing = layout.seams.find(sv => Math.abs(sv.x - pos) <= seamThreshold);
      if(existing){ enterCurrentSeamEdit(existing.index); return; }
      const target = layout.imageBounds.find(b => pos > b.x + 1 && pos < b.x + b.w - 1);
      if(!target) return;
      splitImageAt(target.index, pos - target.x);
      enterCurrentSeamEdit(target.index);
    }
  }

  function fitToView(animate=true){
    const rect = stageWrap.getBoundingClientRect();
    const layout = computeLayout(true);
    const pad = 64;
    if(!state.images.length){ state.zoom = 1; state.pan = {x:0,y:0}; requestRender(); return; }
    const z = Math.min((rect.width-pad)/layout.fullWidth, (rect.height-pad)/layout.fullHeight);
    state.zoom = clamp(isFinite(z) ? z : 1, 0.03, 3);
    state.pan.x = (rect.width - layout.fullWidth*state.zoom)/2;
    state.pan.y = (rect.height - layout.fullHeight*state.zoom)/2;
    requestRender();
  }

  function hitTest(wx, wy){
    for(let i=hitAreas.length-1;i>=0;i--){
      const h = hitAreas[i];
      if(wx >= h.x && wx <= h.x+h.w && wy >= h.y && wy <= h.y+h.h) return h;
    }
    return null;
  }

  function onPointerDown(e){
    if(e.button !== undefined && e.button !== 0) return;
    stage.setPointerCapture?.(e.pointerId);
    const p = getPointer(e);
    const w = screenToWorld(p.x,p.y);
    const h = hitTest(w.x,w.y);
    if(!state.preview && state.mode === 'tools' && state.toolArmed === 'eraser'){
      if(h?.type === 'annotationSelect'){
        state.selected = {type:'annotation', index:h.index};
        deleteSelectedAnnotation();
      }
      return;
    }
    if(!state.preview && state.mode === 'tools' && state.toolArmed && state.toolArmed !== 'select'){
      if(h && (h.type === 'annotationSelect' || h.type === 'annotationResize')){
        handleHitDown(h, w, e);
      } else if(!h){
        beginToolDraw(state.toolArmed, w);
      } else {
        handleHitDown(h, w, e);
      }
    } else if(h && !state.preview){
      handleHitDown(h, w, e);
    } else {
      drag = { type:'pan', startX:p.x, startY:p.y, pan:{...state.pan} };
      stage.classList.add('dragging');
    }
  }

  function handleHitDown(h, w, e){
    if(h.type === 'activeDone'){
      const finishedActive = state.activeHandle ? {...state.activeHandle} : null;
      if(state.mode === 'divider' && finishedActive?.kind === 'seamCenter'){
        // 完成接缝编辑后，分割线应停在当前接缝原位置。
        // 之后由 drawDividerOverlay 判断：仍在可视范围就保持；离开可视范围才自动回到屏幕中心。
        const layout = computeLayout(true);
        const sv = layout.seams.find(v => v.index === finishedActive.index);
        if(sv){
          if(!state.splitDraft) state.splitDraft = {pos:1};
          state.splitDraft.pos = Math.round(state.orientation === 'vertical' ? sv.y : sv.x);
          state.splitDraftManual = true;
        }
      }
      state.activeHandle = null;
      if(state.mode === 'divider'){
        state.selected = null;
      }
      renderProps(); requestRender(); return;
    }
    if(h.type === 'activeDrag'){ startActiveDrag(w, getPointer(e)); return; }
    if(h.type === 'activeDragBefore' || h.type === 'activeDragAfter'){
      const s = state.seams[h.index];
      if(!s) return;
      pushHistory();
      state.selected = {type:'seam', index:h.index};
      drag = { type: h.type === 'activeDragBefore' ? 'seamBefore' : 'seamAfter', index:h.index, start:w, before:s.beforeCrop, after:s.afterCrop };
      return;
    }
    if(h.type === 'seamSelect'){ state.activeHandle = null; state.selected = {type:'seam', index:h.index}; renderProps(); requestRender(); return; }
    if(h.type === 'annotationSelect'){
      if(state.mode === 'tools' && state.toolArmed === 'eraser'){
        state.selected = {type:'annotation', index:h.index};
        deleteSelectedAnnotation();
        return;
      }
      state.selected = {type:'annotation', index:h.index}; renderProps(); requestRender();
      if(state.toolArmed === 'select'){ const a = state.annotations[h.index]; drag = {type:'annotationMove', index:h.index, start:w, ann:{...a}}; }
      return;
    }
    if(h.type === 'annotationResize'){
      if(state.toolArmed !== 'select') return;
      state.selected = {type:'annotation', index:h.index}; renderProps(); requestRender();
      const a = state.annotations[h.index]; drag = {type:'annotationResize', index:h.index, start:w, ann:{...a}}; return;
    }
    if(h.type === 'splitDraftCommit'){ insertSeamAtDraft(); return; }
    if(h.type === 'splitDraftDrag'){ state.splitDraftManual = true; drag = {type:'splitDraft', start:w, pos: state.splitDraft?.pos || 0}; return; }
    if(h.type === 'canvasCrop'){ state.selected = {type:'canvasCrop'}; state.activeHandle = {kind:'canvasCrop', edge:h.edge}; renderProps(); requestRender(); return; }
    if(h.type === 'imageCrop'){ state.selected = {type:'image', index:h.index}; state.activeHandle = {kind:'imageCrop', index:h.index, edge:h.edge}; renderProps(); requestRender(); return; }
    if(['seamBefore','seamAfter','seamCenter'].includes(h.type)){ state.selected = {type:'seam', index:h.index}; state.activeHandle = {kind:'seamCenter', index:h.index}; renderProps(); requestRender(); return; }
    if(state.mode === 'tools' && state.toolArmed && !['select','eraser'].includes(state.toolArmed)){ addAnnotationAt(state.toolArmed, w); return; }
  }

  function startActiveDrag(w, sp){
    const h = state.activeHandle;
    if(!h) return;
    pushHistory();
    if(h.kind === 'canvasCrop'){
      const layout = computeLayout(true);
      state.selected = {type:'canvasCrop'};
      drag = { type:'canvasCrop', edge:h.edge, start:w, startScreen: sp || {x:0,y:0}, startCrop:{...state.canvasCrop}, pan:{...state.pan}, fullWidth:layout.fullWidth, fullHeight:layout.fullHeight };
      return;
    }
    if(h.kind === 'imageCrop'){
      const idx = h.index;
      const layout = computeLayout(true);
      const item = layout.items.find(v => v.index === idx);
      const scaleX = item ? (item.dw / Math.max(1, item.sw)) : 1;
      const scaleY = item ? (item.dh / Math.max(1, item.sh)) : 1;
      state.selected = {type:'image', index:idx};
      const frame = layout.imageBounds.find(v => v.index === idx) || {x:0,y:0,w:1,h:1};
      drag = { type:'imageCrop', index:idx, edge:h.edge, start:w, startScreen: sp || {x:0,y:0}, startCrop:{...state.images[idx].crop}, scaleX, scaleY, pan:{...state.pan}, frame:{...frame} };
      return;
    }
    if(['seamBefore','seamAfter','seamCenter'].includes(h.kind)){
      const s = state.seams[h.index];
      if(!s) return;
      state.selected = {type:'seam', index:h.index};
      drag = { type:'seamCenter', index:h.index, start:w, before:s.beforeCrop, after:s.afterCrop };
      return;
    }
  }

  function onPointerMove(e){
    const p = getPointer(e);
    const w = screenToWorld(p.x,p.y);
    if(!drag){
      const h = hitTest(w.x,w.y);
      stage.style.cursor = h?.cursor || 'grab';
      return;
    }
    if(drag.type === 'pan'){
      state.pan.x = drag.pan.x + (p.x - drag.startX);
      state.pan.y = drag.pan.y + (p.y - drag.startY);
      requestRender(); return;
    }
    if(drag.type === 'splitDraft'){
      const layout = computeLayout(true);
      if(state.orientation === 'vertical') state.splitDraft.pos = clamp(Math.round(drag.pos + (w.y - drag.start.y)), 1, Math.max(1, layout.fullHeight-1));
      else state.splitDraft.pos = clamp(Math.round(drag.pos + (w.x - drag.start.x)), 1, Math.max(1, layout.fullWidth-1));
      requestRender(); return;
    }
    if(drag.type === 'canvasCrop'){
      const dx = Math.round((p.x - drag.startScreen.x) / Math.max(0.0001, state.zoom));
      const dy = Math.round((p.y - drag.startScreen.y) / Math.max(0.0001, state.zoom));
      const layout = computeLayout(true);
      const c = {...drag.startCrop};
      if(drag.edge === 'top') c.top = clamp(c.top - dy, 0, layout.fullHeight - c.bottom - 1);
      if(drag.edge === 'bottom') c.bottom = clamp(c.bottom + dy, 0, layout.fullHeight - c.top - 1);
      if(drag.edge === 'left') c.left = clamp(c.left - dx, 0, layout.fullWidth - c.right - 1);
      if(drag.edge === 'right') c.right = clamp(c.right + dx, 0, layout.fullWidth - c.left - 1);
      state.canvasCrop = c;
      // 固定裁剪窗口、移动整张拼图内容：补偿 viewport pan，使被编辑边在屏幕上保持不动。
      const z = state.zoom;
      if(drag.edge === 'left'){
        const startEdge = drag.startCrop.left;
        const screenEdge = startEdge * z + drag.pan.x;
        state.pan.x = screenEdge - c.left * z;
      } else if(drag.edge === 'right'){
        const startEdge = drag.fullWidth - drag.startCrop.right;
        const screenEdge = startEdge * z + drag.pan.x;
        state.pan.x = screenEdge - (layout.fullWidth - c.right) * z;
      } else if(drag.edge === 'top'){
        const startEdge = drag.startCrop.top;
        const screenEdge = startEdge * z + drag.pan.y;
        state.pan.y = screenEdge - c.top * z;
      } else if(drag.edge === 'bottom'){
        const startEdge = drag.fullHeight - drag.startCrop.bottom;
        const screenEdge = startEdge * z + drag.pan.y;
        state.pan.y = screenEdge - (layout.fullHeight - c.bottom) * z;
      }
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'imageCrop'){
      const im = state.images[drag.index];
      const dxWorld = (p.x - drag.startScreen.x) / Math.max(0.0001, state.zoom);
      const dyWorld = (p.y - drag.startScreen.y) / Math.max(0.0001, state.zoom);
      const dx = Math.round(dxWorld / Math.max(0.0001, drag.scaleX || 1));
      const dy = Math.round(dyWorld / Math.max(0.0001, drag.scaleY || 1));
      const c = {...drag.startCrop};
      if(drag.edge === 'top') c.top = clamp(c.top - dy, 0, im.height - c.bottom - 1);
      if(drag.edge === 'bottom') c.bottom = clamp(c.bottom + dy, 0, im.height - c.top - 1);
      if(drag.edge === 'left') c.left = clamp(c.left - dx, 0, im.width - c.right - 1);
      if(drag.edge === 'right') c.right = clamp(c.right + dx, 0, im.width - c.left - 1);
      im.crop = c;
      // 固定当前图裁剪窗口、移动当前图内容：补偿 pan，使当前编辑边在屏幕上保持不动。
      const updated = computeLayout(true);
      const nb = updated.imageBounds.find(v => v.index === drag.index);
      if(nb && drag.frame){
        const z = state.zoom;
        if(drag.edge === 'left'){
          const screenEdge = drag.frame.x * z + drag.pan.x;
          state.pan.x = screenEdge - nb.x * z;
        } else if(drag.edge === 'right'){
          const screenEdge = (drag.frame.x + drag.frame.w) * z + drag.pan.x;
          state.pan.x = screenEdge - (nb.x + nb.w) * z;
        } else if(drag.edge === 'top'){
          const screenEdge = drag.frame.y * z + drag.pan.y;
          state.pan.y = screenEdge - nb.y * z;
        } else if(drag.edge === 'bottom'){
          const screenEdge = (drag.frame.y + drag.frame.h) * z + drag.pan.y;
          state.pan.y = screenEdge - (nb.y + nb.h) * z;
        }
      }
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'toolCreate'){
      const a = state.annotations[drag.index];
      if(!a) return;
      if(a.type === 'pen' || a.type === 'highlight' || a.type === 'mosaicPen'){
        const last = (a.points || [])[a.points.length-1];
        const next = {x: Math.round(w.x - (a.x||0)), y: Math.round(w.y - (a.y||0))};
        if(!last || Math.hypot(next.x-last.x, next.y-last.y) >= 2) a.points.push(next);
      } else {
        a.w = Math.round(w.x - drag.start.x);
        a.h = Math.round(w.y - drag.start.y);
      }
      requestRender(); return;
    }
    if(drag.type === 'annotationMove'){
      const a = state.annotations[drag.index];
      a.x = Math.round(drag.ann.x + (w.x - drag.start.x));
      a.y = Math.round(drag.ann.y + (w.y - drag.start.y));
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'annotationResize'){
      const a = state.annotations[drag.index];
      a.w = Math.max(24, Math.round((drag.ann.w || 180) + (w.x - drag.start.x)));
      a.h = Math.max(24, Math.round((drag.ann.h || 90) + (w.y - drag.start.y)));
      if(a.type === 'text'){ a.fontSize = Math.max(12, Math.round((drag.ann.fontSize || 28) + (w.y - drag.start.y)/4)); }
      renderProps(); requestRender(); return;
    }
    if(['seamBefore','seamAfter','seamCenter'].includes(drag.type)){
      const s = state.seams[drag.index];
      const vertical = state.orientation === 'vertical';
      const d = vertical ? Math.round(w.y - drag.start.y) : Math.round(w.x - drag.start.x);
      const a = state.images[drag.index];
      const b = state.images[drag.index+1];
      const maxBefore = vertical ? a.height - a.crop.top - a.crop.bottom - 1 : a.width - a.crop.left - a.crop.right - 1;
      const maxAfter = vertical ? b.height - b.crop.top - b.crop.bottom - 1 : b.width - b.crop.left - b.crop.right - 1;
      if(drag.type === 'seamBefore') s.beforeCrop = clamp(drag.before + d, 0, maxBefore);
      if(drag.type === 'seamAfter') s.afterCrop = clamp(drag.after - d, 0, maxAfter);
      if(drag.type === 'seamCenter'){
        s.beforeCrop = clamp(drag.before + d, 0, maxBefore);
        s.afterCrop = clamp(drag.after - d, 0, maxAfter);
      }
      renderProps(); requestRender(); return;
    }
  }

  function onPointerUp(e){
    const finished = drag;
    drag = null;
    stage.classList.remove('dragging');
    if(finished && finished.type === 'pan') requestRender();
    if(finished && finished.type === 'splitDraft') renderProps();
    if(finished && finished.type === 'toolCreate'){
      const a = state.annotations[finished.index];
      if(a && a.type !== 'pen' && a.type !== 'highlight' && a.type !== 'mosaicPen'){
        if(Math.abs(a.w || 0) < 6 && Math.abs(a.h || 0) < 6){ a.w = finished.ann.w || 180; a.h = finished.ann.h || 90; }
      }
      applyActiveTool();
      renderProps(); requestRender();
    }
  }

  function getPointer(e){
    const r = stageWrap.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  function onWheel(e){
    if(!state.images.length) return;
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      const rect = stageWrap.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const before = screenToWorld(mx,my);
      const factor = e.deltaY < 0 ? 1.08 : 0.92;
      state.zoom = clamp(state.zoom * factor, 0.03, 8);
      state.pan.x = mx - before.x * state.zoom;
      state.pan.y = my - before.y * state.zoom;
      requestRender();
    } else {
      state.pan.x -= e.deltaX;
      state.pan.y -= e.deltaY;
      requestRender();
    }
  }

  function renderProps(){
    updateToolbarButtons();
    if(!state.images.length){ props.innerHTML = ''; renderToolDock(); return; }
    const mode = state.mode;
    let html = '';
    if(mode !== 'tools' && mode !== 'divider') html += imageListCard();
    if(mode === 'seam') html += seamProps();
    if(mode === 'canvasCrop') html += canvasCropProps();
    if(mode === 'imageCrop') html += imageCropProps();
    if(mode === 'divider') html += dividerProps();
    if(mode === 'tools') html += toolsProps();
    props.innerHTML = html;
    bindPropEvents();
    renderToolDock();
  }

  function imageListCard(){
    return `<div class="prop-card"><div class="image-list">${state.images.map((im,i)=>`
      <div class="image-item ${state.selected?.type==='image'&&state.selected.index===i?'selected':''}" data-select-image="${i}">
        <img class="thumb" src="${im.dataUrl}" alt="">
        <div><div class="image-name">${escapeHtml(im.name)}</div><div class="image-meta">${im.width}×${im.height}px</div></div>
        <div class="tiny-actions">
          <button title="上移" data-move-up="${i}">↑</button>
          <button title="下移" data-move-down="${i}">↓</button>
          <button title="删除" data-remove-image="${i}">×</button>
        </div>
      </div>`).join('')}</div></div>`;
  }

  function seamProps(){
    const idx = state.selected?.type==='seam' ? state.selected.index : 0;
    const s = state.seams[idx];
    if(!s) return `<div class="prop-card"></div>`;
    return `<div class="prop-card">
      <div class="row"><label>上图/左图</label><input type="number" data-num="seam.beforeCrop" value="${s.beforeCrop}" min="0"></div>
      <div class="row"><label>下图/右图</label><input type="number" data-num="seam.afterCrop" value="${s.afterCrop}" min="0"></div>
      <div class="mini-grid">
        <button class="mini-btn" id="autoSeamBtn">自动识别</button>
        <button class="mini-btn" id="resetSeamBtn">重置</button>
      </div>
    </div>`;
  }

  function canvasCropProps(){
    const c = state.canvasCrop;
    return `<div class="prop-card">${cropInputs('canvas', c)}
      <div class="mini-grid">
        <button class="mini-btn" id="resetCanvasCrop">重置</button>
        <button class="mini-btn" id="autoWhiteCanvas">去白边</button>
      </div>
    </div>`;
  }

  function imageCropProps(){
    let idx = state.selected?.type==='image' ? state.selected.index : 0;
    idx = clamp(idx, 0, state.images.length-1);
    const im = state.images[idx];
    return `<div class="prop-card">${cropInputs('image', im.crop)}
      <div class="mini-grid">
        <button class="mini-btn" id="resetImageCrop">重置当前</button>
        <button class="mini-btn" id="copyCropNext">复制到下一张</button>
        <button class="mini-btn" id="applyCropAll">应用到全部</button>
        <button class="mini-btn" id="autoWhiteImage">去白边</button>
      </div>
    </div>`;
  }

  function dividerProps(){
    const pos = Math.round(state.splitDraft?.pos || 0);
    return `<div class="prop-card">
      <div class="row"><label>位置</label><input type="number" id="splitDraftPos" value="${pos}" min="1"></div>
      <div class="mini-grid">
        <button class="mini-btn" id="commitSplitDraft">插入接缝</button>
        <button class="mini-btn" id="centerSplitDraft">居中</button>
      </div>
    </div>`;
  }

  function toolsProps(){
    return `<div class="prop-card tool-panel-card minimal" id="desktopToolPanel">
      <div class="desktop-tools-slot" id="desktopToolDockSlot"></div>
    </div>`;
  }

  function cropInputs(prefix, c){
    return `<div class="row"><label>顶部</label><input type="number" min="0" data-crop="${prefix}.top" value="${c.top}"></div>
      <div class="row"><label>底部</label><input type="number" min="0" data-crop="${prefix}.bottom" value="${c.bottom}"></div>
      <div class="row"><label>左侧</label><input type="number" min="0" data-crop="${prefix}.left" value="${c.left}"></div>
      <div class="row"><label>右侧</label><input type="number" min="0" data-crop="${prefix}.right" value="${c.right}"></div>`;
  }

  function bindPropEvents(){
    $$('[data-select-image]', props).forEach(el => el.addEventListener('click', e=>{
      if(e.target.closest('button')) return;
      state.selected = {type:'image', index:+el.dataset.selectImage};
      if(state.mode !== 'tools') state.mode = 'imageCrop';
      updateModeButtons(); renderProps(); requestRender();
    }));
    $$('[data-move-up]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); moveImage(+btn.dataset.moveUp, -1); }));
    $$('[data-move-down]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); moveImage(+btn.dataset.moveDown, 1); }));
    $$('[data-remove-image]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); removeImage(+btn.dataset.removeImage); }));

    $$('[data-crop]', props).forEach(inp => inp.addEventListener('change', () => {
      pushHistory();
      const [obj, edge] = inp.dataset.crop.split('.');
      const v = Math.max(0, Math.round(+inp.value || 0));
      if(obj === 'canvas') state.canvasCrop[edge] = v;
      if(obj === 'image'){
        const idx = state.selected?.type==='image' ? state.selected.index : 0;
        state.images[idx].crop[edge] = v;
      }
      renderProps(); requestRender();
    }));

    $$('[data-num]', props).forEach(inp => inp.addEventListener('change', () => {
      pushHistory();
      const idx = state.selected?.type==='seam' ? state.selected.index : 0;
      const s = state.seams[idx]; if(!s) return;
      const prop = inp.dataset.num.split('.')[1];
      s[prop] = Math.max(0, Math.round(+inp.value || 0));
      renderProps(); requestRender();
    }));

    $('#autoSeamBtn')?.addEventListener('click', () => autoCurrentSeam());
    $('#resetSeamBtn')?.addEventListener('click', () => { const idx = selectedSeamIndex(); if(idx<0)return; pushHistory(); state.seams[idx].beforeCrop=0; state.seams[idx].afterCrop=0; renderProps(); requestRender(); });

    $('#resetCanvasCrop')?.addEventListener('click', () => { pushHistory(); state.canvasCrop={top:0,right:0,bottom:0,left:0}; renderProps(); requestRender(); });
    $('#autoWhiteCanvas')?.addEventListener('click', () => { autoWhiteCanvas(); });
    $('#resetImageCrop')?.addEventListener('click', () => { const idx = selectedImageIndex(); pushHistory(); state.images[idx].crop={top:0,right:0,bottom:0,left:0}; renderProps(); requestRender(); });
    $('#copyCropNext')?.addEventListener('click', () => { const idx=selectedImageIndex(); if(!state.images[idx+1])return; pushHistory(); state.images[idx+1].crop={...state.images[idx].crop}; renderProps(); requestRender(); });
    $('#applyCropAll')?.addEventListener('click', () => { const idx=selectedImageIndex(); pushHistory(); const c={...state.images[idx].crop}; state.images.forEach(im=>im.crop={...c}); renderProps(); requestRender(); });
    $('#autoWhiteImage')?.addEventListener('click', () => { autoWhiteImage(selectedImageIndex()); });

    $('#splitDraftPos')?.addEventListener('change', (e) => { ensureSplitDraft(); state.splitDraftManual = true; state.splitDraft.pos = Math.max(1, Math.round(+e.target.value || 1)); requestRender(); });
    $('#commitSplitDraft')?.addEventListener('click', () => insertSeamAtDraft());
    $('#centerSplitDraft')?.addEventListener('click', () => { state.splitDraftManual = false; syncSplitDraftToViewportCenter(); renderProps(); requestRender(); });

    $$('[data-tool]', props).forEach(btn => btn.addEventListener('click', () => { state.toolArmed = btn.dataset.tool; renderProps(); requestRender(); }));
    $('#deleteAnnotationBtn')?.addEventListener('click', () => deleteSelectedAnnotation());
    $$('[data-ann]', props).forEach(inp => inp.addEventListener(inp.type==='text' ? 'input' : 'change', () => {
      const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
      if(idx < 0) return;
      pushHistory();
      const a = state.annotations[idx];
      const key = inp.dataset.ann;
      if(inp.type === 'number'){
        if(key === 'opacity') a[key] = clamp(parseFloat(inp.value || '1'), 0.05, 1);
        else a[key] = Math.round(+inp.value || 0);
      } else a[key] = inp.value;
      renderProps(); requestRender();
    }));
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function selectedImageIndex(){ return clamp(state.selected?.type==='image' ? state.selected.index : 0, 0, state.images.length-1); }
  function selectedSeamIndex(){ return state.selected?.type==='seam' ? state.selected.index : (state.seams.length?0:-1); }
  function selectedDividerIndex(){ return state.selected?.type==='divider' ? state.selected.index : (state.seams.length?0:-1); }

  function selectSeamByDelta(d){
    if(!state.seams.length) return;
    const cur = state.selected?.type==='seam' || state.selected?.type==='divider' ? state.selected.index : 0;
    const next = clamp(cur + d, 0, state.seams.length-1);
    state.selected = {type: state.mode==='divider' ? 'divider' : 'seam', index: next};
    renderProps(); requestRender();
  }

  function moveImage(i, d){
    const j = i+d;
    if(j<0 || j>=state.images.length) return;
    pushHistory();
    [state.images[i], state.images[j]] = [state.images[j], state.images[i]];
    syncSeams(true);
    state.selected = {type:'image', index:j};
    renderProps(); fitToView(false); requestRender();
  }

  function removeImage(i){
    pushHistory();
    state.images.splice(i,1);
    syncSeams(true);
    state.selected = state.images.length ? {type:'image', index:clamp(i,0,state.images.length-1)} : null;
    renderProps(); fitToView(false); requestRender();
  }

  function toggleDivider(idx){
    if(idx<0) return;
    pushHistory();
    const s = state.seams[idx];
    if(s.divider?.enabled) s.divider = null;
    else ensureDivider(idx);
    state.selected = {type:'divider', index:idx};
    renderProps(); requestRender();
  }
  function ensureDivider(idx){
    if(!state.seams[idx].divider) state.seams[idx].divider = {enabled:true, style:'solid', thickness:2, color:'#111827', background:'#ffffff', marginBefore:8, marginAfter:8};
  }

  function updateModeButtons(){
    $$('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
    $$('.mobile-mode').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
  }

  function updateToolbarButtons(){
    $('#verticalBtn')?.classList.toggle('active', state.orientation === 'vertical');
    $('#horizontalBtn')?.classList.toggle('active', state.orientation === 'horizontal');
    $('#previewBtn')?.classList.toggle('blue', state.preview);
    updateUndoRedo();
  }

  function setMode(m){
    state.mode = m;
    state.activeHandle = null;
    state.preview = false;
    if(m === 'canvasCrop') state.selected = {type:'canvasCrop'};
    if(m === 'seam' && state.seams.length) state.selected = state.selected?.type === 'seam' ? state.selected : {type:'seam', index:0};
    if(m === 'imageCrop' && state.images.length) state.selected = state.selected?.type === 'image' ? state.selected : {type:'image', index:0};
    if(m === 'divider'){
      state.splitDraftManual = false;
      ensureSplitDraft();
      syncSplitDraftToViewportCenter();
      state.selected = null;
    }
    if(m === 'tools'){ state.toolSettings.group = state.toolSettings.group || 'select'; applyActiveTool(); }
    updateModeButtons(); renderProps(); requestRender();
  }

  async function exportPng(){
    if(!state.images.length){ toast('请先导入图片'); return; }
    const layout = computeLayout(false);
    const maxSide = 32760;
    if(layout.width > maxSide || layout.height > maxSide){
      toast('输出尺寸过大，建议先裁剪或分批导出');
      return;
    }
    const out = document.createElement('canvas');
    out.width = Math.max(1, Math.round(layout.width));
    out.height = Math.max(1, Math.round(layout.height));
    const oc = out.getContext('2d');
    oc.fillStyle = '#fff'; oc.fillRect(0,0,out.width,out.height);
    const full = computeLayout(true);
    oc.save();
    oc.translate(-state.canvasCrop.left, -state.canvasCrop.top);
    drawComposition(oc, full, true, true);
    oc.restore();
    const a = document.createElement('a');
    a.download = `longshot_${new Date().toISOString().replace(/[:.]/g,'-')}.png`;
    a.href = out.toDataURL('image/png');
    a.click();
    toast('PNG 已导出');
  }

  function saveProject(){
    if(!state.images.length){ toast('没有可保存的工程'); return; }
    const blob = new Blob([snapshot()], {type:'application/json'});
    const a = document.createElement('a');
    a.download = `longshot_project_${new Date().toISOString().slice(0,10)}.json`;
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }

  async function openProject(file){
    const txt = await file.text();
    pushHistory();
    await restoreFromSnapshot(txt);
    toast('工程已打开');
  }

  function autoCurrentSeam(){
    const idx = selectedSeamIndex();
    if(idx < 0) return;
    pushHistory();
    const best = findOverlap(idx);
    const s = state.seams[idx];
    if(best){
      // Use detected overlap by cropping the top/left of the second image.
      if(state.orientation === 'vertical') s.afterCrop = best.overlap;
      else s.afterCrop = best.overlap;
      toast(`已尝试自动识别重叠：${best.overlap}px`);
    } else toast('没有找到明显重叠，保持原样');
    renderProps(); requestRender();
  }

  function findOverlap(idx){
    // lightweight pixel sampling: compare bottom/right strip of before image and top/left strip of after image
    const a = state.images[idx], b = state.images[idx+1];
    if(!a || !b) return null;
    const vertical = state.orientation === 'vertical';
    const maxOverlap = Math.min(vertical ? a.height : a.width, vertical ? b.height : b.width, 600);
    const minOverlap = 40;
    const step = 8;
    const sample = 64;
    const ca = document.createElement('canvas'), cb = document.createElement('canvas');
    const ac = ca.getContext('2d', {willReadFrequently:true}), bc = cb.getContext('2d', {willReadFrequently:true});
    if(vertical){ ca.width = cb.width = sample; ca.height = cb.height = maxOverlap; }
    else { ca.width = cb.width = maxOverlap; ca.height = cb.height = sample; }
    try{
      if(vertical){
        ac.drawImage(a.img, 0, a.height-maxOverlap, a.width, maxOverlap, 0, 0, sample, maxOverlap);
        bc.drawImage(b.img, 0, 0, b.width, maxOverlap, 0, 0, sample, maxOverlap);
      } else {
        ac.drawImage(a.img, a.width-maxOverlap, 0, maxOverlap, a.height, 0, 0, maxOverlap, sample);
        bc.drawImage(b.img, 0, 0, maxOverlap, b.height, 0, 0, maxOverlap, sample);
      }
      const ia = ac.getImageData(0,0,ca.width,ca.height).data;
      const ib = bc.getImageData(0,0,cb.width,cb.height).data;
      let best = {score: Infinity, overlap: 0};
      for(let ov=minOverlap; ov<=maxOverlap; ov+=step){
        let score=0, count=0;
        if(vertical){
          const startA = maxOverlap - ov;
          for(let y=0;y<ov;y+=4){ for(let x=0;x<sample;x+=4){
            const pa = ((startA+y)*sample+x)*4, pb=(y*sample+x)*4;
            score += Math.abs(ia[pa]-ib[pb]) + Math.abs(ia[pa+1]-ib[pb+1]) + Math.abs(ia[pa+2]-ib[pb+2]); count++;
          }}
        } else {
          const startA = maxOverlap - ov;
          for(let x=0;x<ov;x+=4){ for(let y=0;y<sample;y+=4){
            const pa = (y*maxOverlap+startA+x)*4, pb=(y*maxOverlap+x)*4;
            score += Math.abs(ia[pa]-ib[pb]) + Math.abs(ia[pa+1]-ib[pb+1]) + Math.abs(ia[pa+2]-ib[pb+2]); count++;
          }}
        }
        score /= Math.max(1,count);
        if(score < best.score) best = {score, overlap: ov};
      }
      return best.score < 38 ? best : null;
    }catch(e){ return null; }
  }

  function autoWhiteImage(idx){
    const im = state.images[idx]; if(!im) return;
    pushHistory();
    const c = detectWhiteBorder(im.img);
    im.crop = c;
    renderProps(); requestRender(); toast('已尝试去除当前图片白边');
  }

  function autoWhiteCanvas(){
    if(!state.images.length) return;
    pushHistory();
    const layout = computeLayout(true);
    const out = document.createElement('canvas'); out.width = layout.fullWidth; out.height = layout.fullHeight;
    const oc = out.getContext('2d'); drawComposition(oc, layout, true, true);
    state.canvasCrop = detectWhiteBorder(out);
    renderProps(); requestRender(); toast('已尝试去除整体白边');
  }

  function detectWhiteBorder(imgOrCanvas){
    const maxSample = 1200;
    const scale = Math.min(1, maxSample / Math.max(imgOrCanvas.width || imgOrCanvas.naturalWidth, imgOrCanvas.height || imgOrCanvas.naturalHeight));
    const w = Math.max(1, Math.round((imgOrCanvas.width || imgOrCanvas.naturalWidth) * scale));
    const h = Math.max(1, Math.round((imgOrCanvas.height || imgOrCanvas.naturalHeight) * scale));
    const c = document.createElement('canvas'); c.width=w; c.height=h;
    const g = c.getContext('2d', {willReadFrequently:true});
    g.drawImage(imgOrCanvas, 0,0,w,h);
    const data = g.getImageData(0,0,w,h).data;
    const isWhite = (x,y) => { const p=(y*w+x)*4; return data[p]>245 && data[p+1]>245 && data[p+2]>245; };
    const rowWhite = y => { let cnt=0; for(let x=0;x<w;x+=4) if(isWhite(x,y)) cnt++; return cnt >= Math.ceil(w/4)*0.96; };
    const colWhite = x => { let cnt=0; for(let y=0;y<h;y+=4) if(isWhite(x,y)) cnt++; return cnt >= Math.ceil(h/4)*0.96; };
    let top=0,bottom=0,left=0,right=0;
    while(top<h-1 && rowWhite(top)) top++;
    while(bottom<h-top-1 && rowWhite(h-1-bottom)) bottom++;
    while(left<w-1 && colWhite(left)) left++;
    while(right<w-left-1 && colWhite(w-1-right)) right++;
    return {top:Math.round(top/scale), bottom:Math.round(bottom/scale), left:Math.round(left/scale), right:Math.round(right/scale)};
  }

  function setOrientation(o){
    if(state.orientation === o) return;
    pushHistory();
    state.orientation = o;
    state.canvasCrop = {top:0,right:0,bottom:0,left:0};
    state.seams.forEach(s => { s.beforeCrop=0; s.afterCrop=0; });
    updateToolbarButtons(); renderProps(); fitToView(false); requestRender();
  }

  function clearAll(){
    if(!state.images.length) return;
    if(!confirm('确定清空当前图片和编辑参数吗？')) return;
    pushHistory();
    state.images=[]; state.seams=[]; state.annotations=[]; state.selected=null; state.canvasCrop={top:0,right:0,bottom:0,left:0};
    renderProps(); requestRender();
  }

  function handleKey(e){
    if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
    if(e.key === '1') setMode('seam');
    else if(e.key === '2') setMode('canvasCrop');
    else if(e.key === '3') setMode('imageCrop');
    else if(e.key === '4') setMode('divider');
    else if(e.key === '5') setMode('tools');
    else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){ e.preventDefault(); undo(); }
    else if((e.ctrlKey||e.metaKey) && (e.key.toLowerCase()==='y' || (e.shiftKey && e.key.toLowerCase()==='z'))){ e.preventDefault(); redo(); }
    else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='s'){ e.preventDefault(); exportPng(); }
    else if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Delete','Backspace'].includes(e.key)){
      if(!state.images.length) return;
      e.preventDefault();
      if(e.key === 'Delete' || e.key === 'Backspace'){
        if(state.selected?.type === 'seam'){ pushHistory(); const s=state.seams[state.selected.index]; if(s){s.beforeCrop=0;s.afterCrop=0;} }
        if(state.selected?.type === 'divider'){ toggleDivider(state.selected.index); return; }
        if(state.selected?.type === 'annotation'){ deleteSelectedAnnotation(); return; }
        renderProps(); requestRender(); return;
      }
      const amount = e.shiftKey ? 10 : (e.ctrlKey || e.metaKey ? 50 : 1);
      const sign = (e.key === 'ArrowDown' || e.key === 'ArrowRight') ? 1 : -1;
      nudge(sign * amount, e.key);
    }
  }

  function nudge(delta, key){
    const verticalKey = key === 'ArrowUp' || key === 'ArrowDown';
    if(state.mode === 'seam' && state.selected?.type === 'seam'){
      const s = state.seams[state.selected.index]; if(!s) return;
      
      pushHistory();
      if((state.orientation === 'vertical' && verticalKey) || (state.orientation === 'horizontal' && !verticalKey)){
        if(key==='ArrowUp' || key==='ArrowLeft') s.beforeCrop = Math.max(0, s.beforeCrop + Math.abs(delta));
        if(key==='ArrowDown' || key==='ArrowRight') s.afterCrop = Math.max(0, s.afterCrop + Math.abs(delta));
      }
    } else if(state.mode === 'canvasCrop'){
      pushHistory();
      if(key==='ArrowUp') state.canvasCrop.top = Math.max(0,state.canvasCrop.top+amountSign(delta));
      if(key==='ArrowDown') state.canvasCrop.bottom = Math.max(0,state.canvasCrop.bottom+Math.abs(delta));
      if(key==='ArrowLeft') state.canvasCrop.left = Math.max(0,state.canvasCrop.left+amountSign(delta));
      if(key==='ArrowRight') state.canvasCrop.right = Math.max(0,state.canvasCrop.right+Math.abs(delta));
    } else if(state.mode === 'imageCrop' && state.selected?.type === 'image'){
      pushHistory();
      const c = state.images[state.selected.index].crop;
      const amt = Math.abs(delta);
      if(key==='ArrowUp') c.top = Math.max(0,c.top+amt);
      if(key==='ArrowDown') c.bottom = Math.max(0,c.bottom+amt);
      if(key==='ArrowLeft') c.left = Math.max(0,c.left+amt);
      if(key==='ArrowRight') c.right = Math.max(0,c.right+amt);
    } else if(state.mode === 'tools' && state.selected?.type === 'annotation'){
      pushHistory();
      const a = state.annotations[state.selected.index];
      if(key==='ArrowUp') a.y = Math.max(0,(a.y||0)-Math.abs(delta));
      if(key==='ArrowDown') a.y = Math.max(0,(a.y||0)+Math.abs(delta));
      if(key==='ArrowLeft') a.x = Math.max(0,(a.x||0)-Math.abs(delta));
      if(key==='ArrowRight') a.x = Math.max(0,(a.x||0)+Math.abs(delta));
    }
    renderProps(); requestRender();
  }
  function amountSign(delta){ return Math.abs(delta); }


  function beginMiniMapNav(e){
    if(!state.images.length) return;
    e.preventDefault(); e.stopPropagation();
    const w = miniMapPointToWorld(e);
    setViewportCenter(w.x, w.y);
    navDrag = {type:'miniMap'};
  }
  function beginVScroll(e){
    if(!state.images.length) return;
    e.preventDefault(); e.stopPropagation();
    vScroll.classList.add('dragging');
    const r = vScroll.getBoundingClientRect();
    const th = vThumb.getBoundingClientRect();
    const offset = e.target === vThumb ? e.clientY - th.top : th.height / 2;
    navDrag = {type:'vScroll', offset};
    const ratio = (e.clientY - r.top - offset) / Math.max(1, r.height - th.height);
    setVerticalScrollRatio(ratio);
  }
  function beginHScroll(e){
    if(!state.images.length) return;
    e.preventDefault(); e.stopPropagation();
    hScroll.classList.add('dragging');
    const r = hScroll.getBoundingClientRect();
    const tw = hThumb.getBoundingClientRect();
    const offset = e.target === hThumb ? e.clientX - tw.left : tw.width / 2;
    navDrag = {type:'hScroll', offset};
    const ratio = (e.clientX - r.left - offset) / Math.max(1, r.width - tw.width);
    setHorizontalScrollRatio(ratio);
  }
  function onNavPointerMove(e){
    if(!navDrag) return;
    e.preventDefault();
    if(navDrag.type === 'miniMap'){
      const w = miniMapPointToWorld(e);
      setViewportCenter(w.x, w.y);
    } else if(navDrag.type === 'vScroll'){
      const r = vScroll.getBoundingClientRect();
      const th = vThumb.getBoundingClientRect();
      const ratio = (e.clientY - r.top - navDrag.offset) / Math.max(1, r.height - th.height);
      setVerticalScrollRatio(ratio);
    } else if(navDrag.type === 'hScroll'){
      const r = hScroll.getBoundingClientRect();
      const tw = hThumb.getBoundingClientRect();
      const ratio = (e.clientX - r.left - navDrag.offset) / Math.max(1, r.width - tw.width);
      setHorizontalScrollRatio(ratio);
    }
  }
  function endNavDrag(){
    if(!navDrag) return;
    navDrag = null;
    vScroll.classList.remove('dragging');
    hScroll.classList.remove('dragging');
    requestRender();
  }


  // Events
  $('#fileInput').addEventListener('change', e => { addFiles(e.target.files); e.target.value=''; });
  $('#projectInput').addEventListener('change', e => { if(e.target.files[0]) openProject(e.target.files[0]); e.target.value=''; });
  $('#pasteBtn').addEventListener('click', addClipboardImages);
  $('#saveProjectBtn').addEventListener('click', saveProject);
  $('#exportBtn').addEventListener('click', exportPng);
  $('#fitBtn').addEventListener('click', () => fitToView());
  $('#previewBtn').addEventListener('click', () => { state.preview=!state.preview; requestRender(); updateToolbarButtons(); renderToolDock(); });
  $('#undoBtn').addEventListener('click', undo);
  $('#redoBtn').addEventListener('click', redo);
  $('#clearBtn').addEventListener('click', clearAll);
  $('#verticalBtn').addEventListener('click', () => setOrientation('vertical'));
  $('#horizontalBtn').addEventListener('click', () => setOrientation('horizontal'));
  $$('.mode-btn,.mobile-mode').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
  window.addEventListener('resize', () => renderToolDock());
  miniMap.addEventListener('pointerdown', beginMiniMapNav);
  vScroll.addEventListener('pointerdown', beginVScroll);
  hScroll.addEventListener('pointerdown', beginHScroll);
  document.addEventListener('pointermove', onNavPointerMove);
  document.addEventListener('pointerup', endNavDrag);
  document.addEventListener('pointercancel', endNavDrag);

  document.addEventListener('paste', async e => {
    const files = [];
    for(const item of e.clipboardData?.items || []){
      if(item.type.startsWith('image/')) files.push(item.getAsFile());
    }
    if(files.length) await addFiles(files);
  });
  function handleDroppedFiles(files){
    const list = Array.from(files || []);
    const project = list.find(f => /\.json$/i.test(f.name || '') || f.type === 'application/json');
    if(project && list.length === 1) openProject(project);
    else addFiles(list.filter(f => f.type.startsWith('image/') || /\.(png|jpe?g|webp|gif|bmp)$/i.test(f.name || '')));
  }
  stage.addEventListener('dragover', e => { e.preventDefault(); });
  stage.addEventListener('drop', e => { e.preventDefault(); handleDroppedFiles(e.dataTransfer.files); });
  dropHint.addEventListener('pointerdown', e => e.stopPropagation());
  dropHint.addEventListener('click', e => {
    e.stopPropagation();
    if(e.target?.id === 'openProjectEmpty') $('#projectInput').click();
    else $('#fileInput').click();
  });
  stage.addEventListener('pointerdown', onPointerDown);
  stage.addEventListener('pointermove', onPointerMove);
  stage.addEventListener('pointerup', onPointerUp);
  stage.addEventListener('pointercancel', onPointerUp);
  stage.addEventListener('wheel', onWheel, {passive:false});
  stage.addEventListener('dblclick', e => {
    const p = getPointer(e); const w = screenToWorld(p.x,p.y); const h = hitTest(w.x,w.y);
    if(h?.type?.startsWith('seam')){ state.selected={type:'seam',index:h.index}; autoCurrentSeam(); }
  });
  document.addEventListener('keydown', handleKey);
  window.addEventListener('resize', () => requestRender());
  resizeObserver = new ResizeObserver(() => requestRender());
  resizeObserver.observe(stageWrap);

  renderProps();
  updateUndoRedo();
  requestRender();
})();
</script>
</body>
</html>
