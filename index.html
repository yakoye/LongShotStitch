  function activeToolFromSettings(){
    const s = state.toolSettings;
    if(s.group === 'select') return 'select';
    if(s.group === 'shape') return s.shapeKind === 'circle' ? (s.shapeFill ? 'circleFill' : 'circle') : (s.shapeFill ? 'boxFill' : 'box');
    if(s.group === 'pen') return s.penKind === 'highlight' ? 'highlight' : 'pen';
    if(s.group === 'arrow') return s.arrowKind || 'arrow';
    if(s.group === 'text') return 'text';
    if(s.group === 'badge') return 'badge';
    if(s.group === 'mosaic') return s.mosaicKind === 'free' ? 'mosaicPen' : 'mosaic';
    if(s.group === 'eraser') return 'eraser';
    if(s.group === 'watermark') return 'watermark';
    return 'select';
  }

  function applyActiveTool(){
    state.toolArmed = activeToolFromSettings();
  }

  function findExistingWatermarkIndex(){
    return state.annotations.findIndex(a => a && a.type === 'watermark');
  }

  function selectAnnotationForEdit(index){
    if(index < 0 || index >= state.annotations.length) return false;
    state.selected = {type:'annotation', index};
    const a = state.annotations[index];
    syncToolSettingsFromAnnotation(a);
    if(isMobileLayout()) state.mobileToolPopoverOpen = true;
    closeInlineTextEditor(false);
    renderProps(); requestRender();
    return true;
  }

  function syncToolSettingsFromAnnotation(a){
    if(!a) return;
    const s = state.toolSettings;
    if(['box','boxFill','circle','circleFill'].includes(a.type)){
      s.group = 'shape';
      s.shapeKind = a.type.startsWith('circle') ? 'circle' : 'box';
      s.shapeFill = a.type.endsWith('Fill');
      if(a.color) s.color = a.color;
      if(a.fillColor) s.fillColor = a.fillColor;
      if(a.lineWidth) s.lineWidth = a.lineWidth;
      if(a.opacity != null) s.opacity = a.opacity;
    } else if(['line','arrow','doubleArrow'].includes(a.type)){
      s.group = 'arrow';
      s.arrowKind = a.type;
      if(a.color) s.color = a.color;
      if(a.lineWidth) s.lineWidth = a.lineWidth;
    } else if(['pen','highlight'].includes(a.type)){
      s.group = 'pen';
      s.penKind = a.type === 'highlight' ? 'highlight' : 'pen';
      if(a.color) s.penColor = a.color;
      if(a.type === 'highlight') s.highlightWidth = a.lineWidth || s.highlightWidth;
      else s.penWidth = a.lineWidth || s.penWidth;
    } else if(a.type === 'text'){
      s.group = 'text';
      s.textValue = a.text || '';
      s.textColor = a.color || s.textColor;
      s.textSize = a.fontSize || s.textSize;
      s.textBg = a.bg || 'transparent';
      s.textOutline = !!a.outline;
      s.textVertical = !!a.vertical;
    } else if(a.type === 'badge'){
      s.group = 'badge';
      s.badgeNumber = Math.round(+a.text || s.badgeNumber || 1);
      s.badgeColor = a.color || s.badgeColor;
      s.badgeSize = a.fontSize || s.badgeSize;
    } else if(['mosaic','mosaicPen'].includes(a.type)){
      s.group = 'mosaic';
      s.mosaicKind = a.type === 'mosaicPen' ? 'free' : 'mosaic';
      s.mosaicGrid = a.gridSize || s.mosaicGrid;
    } else if(a.type === 'watermark'){
      s.group = 'watermark';
      s.watermarkText = a.text || s.watermarkText;
      s.watermarkSize = a.fontSize || s.watermarkSize;
      s.watermarkColor = a.color || s.watermarkColor;
      s.watermarkOpacity = a.opacity == null ? s.watermarkOpacity : a.opacity;
      s.watermarkRepeat = a.repeatCount || s.watermarkRepeat;
    }
    applyActiveTool();
  }

  function groupForAnnotationType(type){
    if(['box','boxFill','circle','circleFill','redact'].includes(type)) return 'shape';
    if(['pen','highlight'].includes(type)) return 'pen';
    if(['line','arrow','doubleArrow'].includes(type)) return 'arrow';
    if(type === 'text') return 'text';
    if(type === 'badge') return 'badge';
    if(['mosaic','mosaicPen'].includes(type)) return 'mosaic';
    if(type === 'watermark') return 'watermark';
    return 'select';
  }

  function setToolGroup(group){
    if(isMobileLayout()) return mobileToolGroupTap(group);
    const sameGroup = (state.toolSettings.group || 'select') === group;
    state.toolSettings.group = group;
    state.mobileToolPopoverOpen = sameGroup ? !state.mobileToolPopoverOpen : true;
    if(group === 'watermark'){
      const idx = findExistingWatermarkIndex();
      state.selected = idx >= 0 ? {type:'annotation', index:idx} : null;
      closeInlineTextEditor(false);
    } else if(group !== 'select') {
      state.selected = null;
      if(group !== 'text') closeInlineTextEditor(false);
    }
    applyActiveTool();
    updateModeButtons();
    renderProps(); requestRender();
  }

  function mobileToolGroupTap(group){
    const sameGroup = (state.toolSettings.group || 'select') === group;
    state.toolSettings.group = group;
    state.mobileToolPopoverOpen = sameGroup ? !state.mobileToolPopoverOpen : false;
    if(group === 'watermark'){
      const idx = findExistingWatermarkIndex();
      state.selected = idx >= 0 ? {type:'annotation', index:idx} : null;
      if(idx >= 0) state.mobileToolPopoverOpen = true;
      closeInlineTextEditor(false);
    } else if(group !== 'select') {
      state.selected = null;
      if(group !== 'text') closeInlineTextEditor(false);
    }
    applyActiveTool();
    updateModeButtons();
    renderProps(); requestRender();
  }

  function isDesktopLayout(){ return window.matchMedia('(min-width: 761px)').matches; }
  function isMobileLayout(){ return !isDesktopLayout(); }

  function attachToolUi(){
    if(!toolDock || !toolPopover) return;
    const desktopSlot = $('#desktopToolDockSlot');
    const desktopPanel = $('#desktopToolPanel');
    if(isDesktopLayout() && state.mode === 'tools' && desktopSlot && desktopPanel){
      if(toolDock.parentElement !== desktopSlot) desktopSlot.appendChild(toolDock);
      if(toolPopover.parentElement !== desktopPanel) desktopPanel.appendChild(toolPopover);
    } else {
      if(toolDock.parentElement !== stage) stage.appendChild(toolDock);
      if(toolPopover.parentElement !== stage) stage.appendChild(toolPopover);
    }
  }

  function renderToolDock(){
    if(!toolDock || !toolPopover) return;
    attachToolUi();
    if(state.mode !== 'tools' || state.preview || !state.images.length){
      toolDock.classList.remove('show');
      toolPopover.classList.remove('show');
      return;
    }
    const groups = [
      ['select','select','选择 / 移动'],
      ['shape','shape','几何图形'],
      ['pen','pen','铅笔 / 荧光笔'],
      ['arrow','arrow','直线 / 箭头'],
      ['text','text','文字'],
      ['badge','badge','标号'],
      ['mosaic','mosaic','马赛克'],
      ['eraser','eraser','橡皮擦'],
      ['watermark','watermark','水印']
    ];
    const activeGroup = state.toolSettings.group || 'select';
    if(isMobileLayout()){
      toolDock.classList.remove('show');
      renderToolPopover();
      return;
    }
    toolDock.innerHTML = groups.map(([g,icon,title],i) => `${i===7?'<span class="tool-dock-sep"></span>':''}<button class="tool-dock-btn ${activeGroup===g?'active':''} ${g==='eraser'?'danger':''}" data-tool-group="${g}" title="${title}" aria-label="${title}">${svgIcon(icon)}</button>`).join('');
    toolDock.classList.add('show');
    toolDock.querySelectorAll('[data-tool-group]').forEach(btn=>{
      btn.addEventListener('pointerdown', e=>e.stopPropagation());
      btn.addEventListener('click', e=>{ e.stopPropagation(); setToolGroup(btn.dataset.toolGroup); });
    });
    renderToolPopover();
  }

  function activeAnchorButton(){
    const group = state.toolSettings.group || 'select';
    if(isMobileLayout()){
      return document.querySelector(`.mobile-tool-group[data-tool-group="${group}"]`) || document.querySelector('.mobile-tool-group[data-tool-group="select"]');
    }
    if(!toolDock) return null;
    return toolDock.querySelector(`[data-tool-group="${group}"]`) || toolDock.querySelector('[data-tool-group="select"]');
  }

  function positionToolPopover(anchor){
    if(!toolPopover || !anchor) return;
    if(isDesktopLayout() && state.mode === 'tools'){
      toolPopover.style.left = '';
      toolPopover.style.top = '';
      toolPopover.style.visibility = '';
      return;
    }
    toolPopover.style.visibility = 'hidden';
    toolPopover.classList.add('show');
    const sw = stageWrap.clientWidth, sh = stageWrap.clientHeight;
    const pw = toolPopover.offsetWidth, ph = toolPopover.offsetHeight;
    const ar = anchor.getBoundingClientRect();
    const sr = stageWrap.getBoundingClientRect();
    const ax = ar.left - sr.left + ar.width/2;
    const ayTop = ar.top - sr.top;
    const ayBottom = ar.bottom - sr.top;
    let left = clamp(ax - pw/2, 8, Math.max(8, sw - pw - 8));
    let below = ayBottom + 8;
    let above = ayTop - ph - 8;
    let top = isMobileLayout() ? Math.max(8, above) : ((below + ph <= sh - 8) ? below : Math.max(8, above));
    if(top + ph > sh - 8) top = Math.max(8, sh - ph - 8);
    toolPopover.style.left = `${left}px`;
    toolPopover.style.top = `${top}px`;
    toolPopover.style.visibility = '';
  }

  function renderToolPopover(){
    if(!toolPopover) return;
    if(state.mode !== 'tools' || state.preview || !state.images.length){ toolPopover.classList.remove('show'); toolPopover.classList.remove('mobile-collapsed'); return; }
    if(!state.mobileToolPopoverOpen){
      toolPopover.classList.add('mobile-collapsed');
      toolPopover.classList.remove('show');
      return;
    }
    toolPopover.classList.remove('mobile-collapsed');
    const a = state.selected?.type === 'annotation' ? state.annotations[state.selected.index] : null;
    if(a?.type !== 'text' && inlineTextIndex >= 0) closeInlineTextEditor(false);
    let html = a ? annotationPopover(a) : groupPopover();
    if(!html){ toolPopover.innerHTML = ''; toolPopover.classList.remove('show'); return; }
    toolPopover.innerHTML = html;
    toolPopover.classList.toggle('compact', !a && ['select','eraser'].includes(state.toolSettings.group));
    toolPopover.onpointerdown = e => e.stopPropagation();
    bindToolPopoverEvents();
    toolPopover.classList.add('show');
    requestAnimationFrame(()=>positionToolPopover(activeAnchorButton()));
  }

  function boolChip(key, active, body, title=''){ return `<button class="pop-chip ${active?'active':''}" data-tool-setting="${key}" data-value="toggle" title="${title}" aria-label="${title}">${body}</button>`; }
  function compactPanel(body){ return `<div class="pop-compact">${body}</div>`; }
  function compactRow(body){ return `<div class="pop-inline">${body}</div>`; }
  function swatchButton(key, color, active=false, ann=false, title=''){
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    const label = title || (color === 'transparent' ? '透明' : color);
    const fill = color === 'transparent' ? 'linear-gradient(45deg,#fff 0 45%,#ef4444 45% 55%,#fff 55% 100%)' : color;
    return `<button class="color-swatch ${active?'active':''}" ${attr} data-value="${color}" title="${label}" aria-label="${label}"><span style="background:${fill}"></span></button>`;
  }
  function colorPalette(key, value, ann=false, colors=TOOL_COLORS){
    return `<span class="color-strip">${colors.map(c=>swatchButton(key,c,(value||'').toLowerCase()===c.toLowerCase(),ann)).join('')}${ann?'':colorInput(key,value)}</span>`;
  }
  function widthLine(w){ return `<span class="line-preview" style="height:${Math.max(1,Math.min(18,+w||1))}px;width:${18 + Math.min(26,(+w||1)*2)}px"></span>`; }
  function widthControl(key, value, min=1, max=80, ann=false, presets=null){
    const basePresets = presets || [1,2,4,8];
    const values = [...new Set(basePresets)].filter(v=>v>=min && v<=max);
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    const wheelAttr = ann ? `data-ann-width="${key}"` : `data-tool-width="${key}"`;
    const current = Math.round(+value || min);
    return `<span class="width-control" ${wheelAttr} data-min="${min}" data-max="${max}" title="滚轮调粗细">${values.map(v=>`<button class="line-chip ${current===v?'active':''}" ${attr} data-value="${v}" title="${v}">${widthLine(v)}</button>`).join('')}<input class="width-number" type="number" ${attr} value="${current}" min="${min}" max="${max}" step="1" title="数字设定"></span>`;
  }
  function opacityControl(key, value, ann=false){
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    const v = value == null ? 1 : value;
    return `<input class="tiny-number" type="number" ${attr} value="${v}" min="0.05" max="1" step="0.05" title="透明度">`;
  }
  function repeatControl(key, value, ann=false){
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    const current = Math.round(+value || 1);
    return `<span class="density-strip">${[1,4,9,16,25].map(v=>`<button class="pop-chip ${current===v?'active':''}" ${attr} data-value="${v}" title="${v}">${'·'.repeat(Math.min(5,Math.ceil(Math.sqrt(v))))}</button>`).join('')}<input class="tiny-number" type="number" ${attr} value="${current}" min="1" max="80" step="1" title="次数"></span>`;
  }
  function sizeButtons(key, value, min, max, ann=false){
    const attr = ann ? `data-ann-step="${key}"` : `data-tool-step="${key}"`;
    const inputAttr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    return `<span class="size-control"><button class="pop-chip" ${attr} data-delta="-2" data-min="${min}" data-max="${max}" title="缩小">A−</button><input class="tiny-number" type="number" ${inputAttr} value="${Math.round(+value||min)}" min="${min}" max="${max}" step="1" title="数字设定"><button class="pop-chip" ${attr} data-delta="2" data-min="${min}" data-max="${max}" title="放大">A+</button></span>`;
  }
  function textInput(key, value, ann=false, title='文字'){
    const attr = ann ? `data-ann="${key}"` : `data-tool-setting="${key}"`;
    return `<input class="compact-text-input" type="text" ${attr} value="${escapeHtml(value||'')}" title="${title}" placeholder="${title}">`;
  }
  function annChip(key, val, active, body, title=''){ return `<button class="pop-chip ${active?'active':''}" data-ann="${key}" data-value="${val}" title="${title}" aria-label="${title}">${body}</button>`; }

  function groupPopover(){
    const s = state.toolSettings, g = s.group || 'select';
    if(g === 'select') return '';
    if(g === 'shape') return compactPanel(
      compactRow(`${chip('shapeKind','box',s.shapeKind!=='circle',svgIcon('rect'),'矩形')}${chip('shapeKind','circle',s.shapeKind==='circle',svgIcon('circle'),'圆形')}${boolChip('shapeFill',!!s.shapeFill,'◩','填充 / 空心')}${colorPalette('color',s.color)}${widthControl('lineWidth',s.lineWidth||4,1,64)}${opacityControl('opacity',s.opacity||1)}`)
    );
    if(g === 'pen'){
      const widthKey = s.penKind==='highlight' ? 'highlightWidth' : 'penWidth';
      const widthVal = s.penKind==='highlight' ? (s.highlightWidth||18) : (s.penWidth||4);
      return compactPanel(
        compactRow(`${chip('penKind','pen',s.penKind!=='highlight','✎','自由笔')}${chip('penKind','highlight',s.penKind==='highlight','▰','荧光笔')}${colorPalette('penColor',s.penColor || (s.penKind==='highlight'?'#facc15':'#ef4444'))}${widthControl(widthKey,widthVal,1,96)}`)
      );
    }
    if(g === 'arrow') return compactPanel(
      compactRow(`${chip('arrowKind','line',s.arrowKind==='line',svgIcon('line'),'直线')}${chip('arrowKind','arrow',s.arrowKind!=='line'&&s.arrowKind!=='doubleArrow',svgIcon('arrow'),'单箭头')}${chip('arrowKind','doubleArrow',s.arrowKind==='doubleArrow',svgIcon('doubleArrow'),'双箭头')}${colorPalette('color',s.color)}${widthControl('lineWidth',s.lineWidth||4,1,64)}`)
    );
    if(g === 'text') return compactPanel(
      compactRow(`${textInput('textValue',s.textValue||'',false,'文字')}`)+
      compactRow(`${sizeButtons('textSize',s.textSize||14,8,160)}${colorPalette('textColor',s.textColor||'#111827')}${boolChip('textOutline',!!s.textOutline,'Å','描边')}${boolChip('textVertical',!!s.textVertical,'竖','竖排')}`)+
      compactRow(`${['transparent','#ffffff','#111827','#ffeb3b'].map(c=>swatchButton('textBg',c,(s.textBg||'transparent')===c,false,c==='transparent'?'透明背景':'背景')).join('')}`)
    );
    if(g === 'badge') return compactPanel(
      compactRow(`<input class="tiny-number" type="number" data-tool-setting="badgeNumber" value="${Math.round(+s.badgeNumber||1)}" min="1" max="9999" step="1" title="编号">${colorPalette('badgeColor',s.badgeColor||'#2f80ed')}${sizeButtons('badgeSize',s.badgeSize||34,14,120)}`)
    );
    if(g === 'mosaic') return compactPanel(
      compactRow(`${chip('mosaicKind','mosaic',s.mosaicKind!=='free','▦','矩形马赛克')}${chip('mosaicKind','free',s.mosaicKind==='free','✎','自由马赛克')}${widthControl('mosaicGrid',s.mosaicGrid||14,4,80)}`)
    );
    if(g === 'eraser') return compactPanel(compactRow(`${widthControl('eraserSize',s.eraserSize||24,4,120,false,[4,8,16,32])}`));
    if(g === 'watermark') return compactPanel(
      compactRow(`${textInput('watermarkText',s.watermarkText||'水印',false,'水印')}`)+
      compactRow(`${sizeButtons('watermarkSize',s.watermarkSize||34,8,180)}${colorPalette('watermarkColor',s.watermarkColor||'#111827')}${opacityControl('watermarkOpacity',s.watermarkOpacity||.22)}${repeatControl('watermarkRepeat',s.watermarkRepeat||1)}`)
    );
    return '';
  }

  function annotationPopover(a){
    const shapeLike = ['box','boxFill','circle','circleFill','mosaic','redact','line','arrow','doubleArrow'].includes(a.type);
    const lineLike = ['box','boxFill','circle','circleFill','line','arrow','doubleArrow','pen','highlight'].includes(a.type);
    const textLike = ['text','watermark'].includes(a.type);
    const opacityLike = ['watermark','highlight','boxFill','circleFill','mosaic','mosaicPen'].includes(a.type);
    let html = '';
    const rotateLike = !['pen','highlight','mosaicPen','badge','line','arrow','doubleArrow'].includes(a.type);
    html += compactRow(`<input class="tiny-number" type="number" data-ann="x" value="${Math.round(a.x||0)}" title="X"><input class="tiny-number" type="number" data-ann="y" value="${Math.round(a.y||0)}" title="Y">${shapeLike ? `<input class="tiny-number" type="number" data-ann="w" value="${Math.round(a.w||180)}" title="宽"><input class="tiny-number" type="number" data-ann="h" value="${Math.round(a.h||90)}" title="高">` : ''}${rotateLike ? `<input class="tiny-number" type="number" data-ann="rotation" value="${Math.round(a.rotation||0)}" min="-360" max="360" step="1" title="旋转">` : ''}`);
    if(['box','boxFill','circle','circleFill'].includes(a.type)){
      const isCircle = a.type.startsWith('circle');
      const isFill = a.type.endsWith('Fill');
      html += compactRow(`${annChip('type',isFill?'boxFill':'box',!isCircle,svgIcon('rect'),'矩形')}${annChip('type',isFill?'circleFill':'circle',isCircle,svgIcon('circle'),'圆形')}${annChip('type',isCircle?(isFill?'circle':'circleFill'):(isFill?'box':'boxFill'),isFill,'◩','填充 / 空心')}`);
    }
    if(['line','arrow','doubleArrow'].includes(a.type)) html += compactRow(`${annChip('type','line',a.type==='line',svgIcon('line'),'直线')}${annChip('type','arrow',a.type==='arrow',svgIcon('arrow'),'单箭头')}${annChip('type','doubleArrow',a.type==='doubleArrow',svgIcon('doubleArrow'),'双箭头')}`);
    if(textLike) html += compactRow(`${textInput('text',a.text||'',true,'文字')}${sizeButtons('fontSize',a.fontSize||14,8,180,true)}${a.type==='text' ? annChip('vertical','toggle',!!a.vertical,'竖','竖排') : ''}`);
    if(a.type === 'badge') html += compactRow(`<input class="tiny-number" type="number" data-ann="text" value="${Math.round(+a.text||1)}" min="1" max="9999" step="1" title="编号">${sizeButtons('fontSize',a.fontSize||34,14,120,true)}`);
    html += compactRow(`${colorPalette('color',a.color||'#ef4444',true)}${['boxFill','circleFill'].includes(a.type) ? colorPalette('fillColor',a.fillColor||'#fee2e2',true,['#fee2e2','#ffedd5','#fef9c3','#dcfce7','#dbeafe','#ffffff']) : ''}`);
    if(textLike) html += compactRow(`${annChip('outline','toggle',!!a.outline,'Å','描边')}${['transparent','#ffffff','#111827','#ffeb3b'].map(c=>swatchButton('bg',c,(a.bg||'transparent')===c,true,c==='transparent'?'透明背景':'背景')).join('')}`);
    if(lineLike) html += compactRow(`${widthControl('lineWidth',a.lineWidth || (a.type==='highlight'?18:4),1,96,true)}`);
    if(a.type==='mosaic' || a.type==='mosaicPen') html += compactRow(`${widthControl('gridSize',a.gridSize||14,4,80,true)}`);
    if(a.type==='watermark') html += compactRow(`${repeatControl('repeatCount',a.repeatCount||1,true)}`);
    if(opacityLike) html += compactRow(`${opacityControl('opacity',a.opacity == null ? 1 : a.opacity,true)}`);
    html += `<div class="pop-actions compact-actions"><button class="mini-btn warn" id="deleteAnnotationBtnFloat" title="删除">✕</button><button class="mini-btn" id="duplicateAnnotationBtnFloat" title="复制">⧉</button><button class="mini-btn" id="hideToolPopoverBtnFloat" title="收起">⌄</button></div>`;
    return compactPanel(html);
  }
  function bindToolPopoverEvents(){
    if(!toolPopover) return;
    const numericToolKeys = ['lineWidth','penWidth','highlightWidth','textSize','badgeNumber','badgeSize','mosaicGrid','eraserSize','watermarkSize','watermarkRepeat'];
    const numericAnnKeys = ['x','y','w','h','fontSize','lineWidth','gridSize','repeatCount','rotation'];

    toolPopover.querySelectorAll('[data-tool-setting]').forEach(el=>{
      const ev = (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'number' || el.type === 'color')) ? 'input' : 'click';
      el.addEventListener(ev, e=>{
        const key = el.dataset.toolSetting;
        let val = el.dataset.value != null ? el.dataset.value : (el.type === 'checkbox' ? el.checked : el.value);
        if(val === 'toggle') val = !state.toolSettings[key];
        if(['shapeFill','textOutline','textVertical'].includes(key)) val = !!val;
        if(numericToolKeys.includes(key)) val = Math.round(+val || 1);
        if(['opacity','watermarkOpacity'].includes(key)) val = clamp(parseFloat(val || '1'), .05, 1);
        state.toolSettings[key] = val;
        applyActiveTool();
        if(el.tagName === 'INPUT' && ['text','number','color'].includes(el.type)) requestRender();
        else { renderToolDock(); requestRender(); }
      });
    });

    toolPopover.querySelectorAll('[data-tool-width]').forEach(box=>{
      box.addEventListener('wheel', e=>{
        e.preventDefault();
        const key = box.dataset.toolWidth;
        const min = Math.round(+box.dataset.min || 1);
        const max = Math.round(+box.dataset.max || 120);
        const next = clamp(Math.round(+state.toolSettings[key] || min) + (e.deltaY < 0 ? 1 : -1), min, max);
        state.toolSettings[key] = next;
        applyActiveTool();
        renderToolDock(); requestRender();
      }, {passive:false});
    });

    toolPopover.querySelectorAll('[data-tool-step]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.preventDefault();
        const key = btn.dataset.toolStep;
        const min = Math.round(+btn.dataset.min || 1);
        const max = Math.round(+btn.dataset.max || 999);
        const delta = Math.round(+btn.dataset.delta || 0);
        state.toolSettings[key] = clamp(Math.round(+state.toolSettings[key] || min) + delta, min, max);
        applyActiveTool(); renderToolDock(); requestRender();
      });
    });

    toolPopover.querySelectorAll('[data-ann]').forEach(el=>{
      const ev = (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'number' || el.type === 'color')) ? 'input' : 'click';
      el.addEventListener(ev, ()=> updateAnnotationInput(el));
      if(el.tagName === 'INPUT' && el.type === 'text'){
        el.addEventListener('blur', ()=> { el.__historyStarted = false; renderToolPopover(); requestRender(); });
        el.addEventListener('change', ()=> { el.__historyStarted = false; renderToolPopover(); requestRender(); });
      }
    });

    toolPopover.querySelectorAll('[data-ann-width]').forEach(box=>{
      box.addEventListener('wheel', e=>{
        e.preventDefault();
        const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
        if(idx < 0) return;
        const key = box.dataset.annWidth;
        const min = Math.round(+box.dataset.min || 1);
        const max = Math.round(+box.dataset.max || 120);
        const a = state.annotations[idx];
        pushHistory();
        a[key] = clamp(Math.round(+a[key] || min) + (e.deltaY < 0 ? 1 : -1), min, max);
        renderToolPopover(); requestRender();
      }, {passive:false});
    });

    toolPopover.querySelectorAll('[data-ann-step]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.preventDefault();
        const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
        if(idx < 0) return;
        const key = btn.dataset.annStep;
        const min = Math.round(+btn.dataset.min || 1);
        const max = Math.round(+btn.dataset.max || 999);
        const delta = Math.round(+btn.dataset.delta || 0);
        const a = state.annotations[idx];
        pushHistory();
        a[key] = clamp(Math.round(+a[key] || min) + delta, min, max);
        renderToolPopover(); requestRender();
      });
    });

    $('#deleteAnnotationBtnFloat')?.addEventListener('click', deleteSelectedAnnotation);
    $('#duplicateAnnotationBtnFloat')?.addEventListener('click', duplicateSelectedAnnotation);
    $('#hideToolPopoverBtnFloat')?.addEventListener('click', hideToolPopover);
  }

  function hideToolPopover(){
    state.mobileToolPopoverOpen = false;
    renderToolDock();
    requestRender();
  }

  if(inlineTextEditor){
    inlineTextEditor.addEventListener('pointerdown', e => e.stopPropagation());
    inlineTextEditor.addEventListener('click', e => e.stopPropagation());
    inlineTextEditor.addEventListener('input', () => {
      if(inlineTextIndex < 0) return;
      const a = state.annotations[inlineTextIndex];
      if(!a || a.type !== 'text') return;
      a.text = inlineTextEditor.value;
      renderToolPopover();
      requestRender();
    });
    inlineTextEditor.addEventListener('keydown', e => {
      e.stopPropagation();
      if((e.ctrlKey || e.metaKey) && e.key === 'Enter') closeInlineTextEditor(true);
      if(e.key === 'Escape') closeInlineTextEditor(true);
    });
    inlineTextEditor.addEventListener('blur', () => {
      if(inlineTextIndex >= 0){
        const a = state.annotations[inlineTextIndex];
        if(a && a.type === 'text') a.text = inlineTextEditor.value;
        requestRender();
      }
    });
  }

  function updateAnnotationInput(inp){
    const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
    if(idx < 0) return;
    const a = state.annotations[idx];
    const key = inp.dataset.ann;
    const isLiveTextEdit = inp.tagName === 'INPUT' && inp.type === 'text' && key === 'text';
    let val = inp.dataset.value != null ? inp.dataset.value : (inp.type === 'checkbox' ? inp.checked : inp.value);
    if(!isLiveTextEdit || !inp.__historyStarted){ pushHistory(); inp.__historyStarted = true; }
    if(key === 'outline'){
      a.outline = val === 'toggle' ? !a.outline : (val === true || val === 'true');
    } else if(key === 'vertical'){
      a.vertical = val === 'toggle' ? !a.vertical : (val === true || val === 'true');
    } else if(key === 'type'){
      a.type = val;
      if((val === 'boxFill' || val === 'circleFill') && !a.fillColor) a.fillColor = '#fee2e2';
    } else if(inp.type === 'number' || ['x','y','w','h','fontSize','lineWidth','gridSize','repeatCount','rotation'].includes(key)){
      if(key === 'opacity') a[key] = clamp(parseFloat(val || '1'), .05, 1);
      else {
        const oldBadgeValue = (a.type === 'badge' && key === 'text') ? Math.round(+a.text || 1) : null;
        a[key] = Math.round(+val || 0);
        if(a.type === 'badge' && key === 'text') syncBadgeSequence(state.selected.index, oldBadgeValue, Math.round(+val || 1));
      }
    } else if(key === 'opacity'){
      a[key] = clamp(parseFloat(val || '1'), .05, 1);
    } else {
      const oldBadgeValue = (a.type === 'badge' && key === 'text') ? Math.round(+a.text || 1) : null;
      a[key] = val;
      if(a.type === 'badge' && key === 'text') syncBadgeSequence(state.selected.index, oldBadgeValue, Math.round(+val || 1));
    }
    syncToolSettingsFromAnnotation(a);
    if(isLiveTextEdit){
      requestRender();
      return;
    }
    renderToolPopover(); requestRender();
  }


  function syncBadgeSequence(startIndex, oldValue, newValue){
    if(startIndex == null || startIndex < 0 || oldValue == null || oldValue === newValue) return;
    let next = newValue + 1;
    for(let i=startIndex+1;i<state.annotations.length;i++){
      const a = state.annotations[i];
      if(!a || a.type !== 'badge') continue;
      const n = Math.round(+a.text || 0);
      if(n === oldValue + (next - newValue - 1) || n > oldValue){
        a.text = String(next++);
      }
    }
  }

  function duplicateSelectedAnnotation(){
    const idx = state.selected?.type==='annotation' ? state.selected.index : -1;
    if(idx < 0) return;
    pushHistory();
    const copy = JSON.parse(JSON.stringify(state.annotations[idx]));
    copy.id = uid('ann'); copy.x = (copy.x||0)+24; copy.y = (copy.y||0)+24;
    state.annotations.push(copy);
    state.selected = {type:'annotation', index:state.annotations.length-1};
    renderProps(); requestRender();
  }


  function cloneAnnotationForDrag(a){
    return JSON.parse(JSON.stringify(a || {}));
  }

  function isLineAnnotation(a){ return a && ['line','arrow','doubleArrow'].includes(a.type); }
  function isFreePathAnnotation(a){ return a && ['pen','highlight','mosaicPen'].includes(a.type); }

  function drawToolsOverlay(c, layout){
    for(let i=0;i<state.annotations.length;i++){
      const a = state.annotations[i];
      const b = annotationBounds(a);
      hitAreas.push({type:'annotationSelect', index:i, x:b.x, y:b.y, w:b.w, h:b.h, cursor:'move'});
      const selected = state.selected?.type === 'annotation' && state.selected.index === i;
      if(selected){
        c.save();
        c.strokeStyle = '#2f80ed';
        c.lineWidth = 2/state.zoom;
        c.setLineDash([8/state.zoom, 6/state.zoom]);
        const hs = 14 / state.zoom;

        if(!isFreePathAnnotation(a) && !isLineAnnotation(a)){
          const fr = annotationFrame(a);
          const [tl,tr,br,bl] = fr.points;
          c.beginPath();
          c.moveTo(tl.x, tl.y); c.lineTo(tr.x, tr.y); c.lineTo(br.x, br.y); c.lineTo(bl.x, bl.y); c.closePath();
          c.stroke();
          c.setLineDash([]);
          c.fillStyle = '#2f80ed';
          c.fillRect(fr.resizeHandle.x-hs/2, fr.resizeHandle.y-hs/2, hs, hs);
          hitAreas.push({type:'annotationResize', index:i, x:fr.resizeHandle.x-hs, y:fr.resizeHandle.y-hs, w:hs*2, h:hs*2, cursor:'nwse-resize'});

          if(a.type !== 'badge'){
            const rx = fr.rotateHandle.x, ry = fr.rotateHandle.y;
            c.beginPath();
            c.moveTo(fr.topMid.x, fr.topMid.y);
            c.lineTo(rx, ry);
            c.strokeStyle = '#2f80ed';
            c.lineWidth = 1.4/state.zoom;
            c.stroke();
            c.beginPath();
            c.arc(rx, ry, 7/state.zoom, 0, Math.PI*2);
            c.fillStyle = '#2f80ed';
            c.fill();
            c.strokeStyle = '#fff';
            c.lineWidth = 2/state.zoom;
            c.stroke();
            hitAreas.push({type:'annotationRotate', index:i, x:rx-hs, y:ry-hs, w:hs*2, h:hs*2, cursor:'grab'});
          }
        } else {
          c.strokeRect(b.x, b.y, b.w, b.h);
          c.setLineDash([]);
          c.fillStyle = '#2f80ed';
          c.fillRect(b.x+b.w-hs/2, b.y+b.h-hs/2, hs, hs);
          hitAreas.push({type:'annotationResize', index:i, x:b.x+b.w-hs, y:b.y+b.h-hs, w:hs*2, h:hs*2, cursor:'nwse-resize'});
        }

        if(isLineAnnotation(a)){
          const p1 = {x:a.x||0, y:a.y||0};
          const p2 = {x:(a.x||0)+(a.w||0), y:(a.y||0)+(a.h||0)};
          c.fillStyle = '#2f80ed';
          c.beginPath(); c.arc(p1.x,p1.y,7/state.zoom,0,Math.PI*2); c.fill();
          c.beginPath(); c.arc(p2.x,p2.y,7/state.zoom,0,Math.PI*2); c.fill();
          hitAreas.push({type:'annotationLineStart', index:i, x:p1.x-hs, y:p1.y-hs, w:hs*2, h:hs*2, cursor:'crosshair'});
          hitAreas.push({type:'annotationLineEnd', index:i, x:p2.x-hs, y:p2.y-hs, w:hs*2, h:hs*2, cursor:'crosshair'});
        }
        c.restore();
      }
    }
  }


  function measureTextAnnotation(a){
    const temp = document.createElement('canvas').getContext('2d');
    const fs = a.fontSize || (a.type === 'watermark' ? 34 : 14);
    temp.font = `600 ${fs}px ui-sans-serif, system-ui, sans-serif`;
    const raw = String(a.text || (a.type === 'watermark' ? '水印' : '输入文字'));
    const lines = a.vertical ? [...raw.replace(/\n/g,'')].filter(Boolean) : raw.split('\n');
    const step = a.vertical ? fs + 4 : fs + 6;
    const width = (a.vertical ? fs : Math.max(...lines.map(line => temp.measureText(line).width), 40)) + ((a.bg && a.bg !== 'transparent') ? 16 : 0);
    const height = Math.max(24, lines.length * step) + ((a.bg && a.bg !== 'transparent') ? 12 : 0);
    return {lines, fs, step, width:width+16, height:height+12};
  }

  function annotationLocalSize(a){
    if(a.type === 'text' || a.type === 'watermark'){
      const m = measureTextAnnotation(a);
      return {w:m.width, h:m.height};
    }
    if(a.type === 'badge'){
      const fs = a.fontSize || 34; const r = Math.max(12, fs*.62);
      return {w:r*2, h:r*2};
    }
    if(a.type === 'pen' || a.type === 'highlight' || a.type === 'mosaicPen'){
      const b = annotationRawBounds(a);
      return {w:b.w, h:b.h};
    }
    return {w:Math.abs(a.w == null ? 180 : a.w), h:Math.abs(a.h == null ? 90 : a.h)};
  }

  function rotateAabb(b, deg){
    const r = (deg || 0) * Math.PI / 180;
    if(!r) return b;
    const cx = b.x + b.w/2, cy = b.y + b.h/2;
    const pts = [
      {x:b.x,y:b.y},{x:b.x+b.w,y:b.y},{x:b.x+b.w,y:b.y+b.h},{x:b.x,y:b.y+b.h}
    ].map(p=>{
      const dx=p.x-cx, dy=p.y-cy;
      return {x:cx+dx*Math.cos(r)-dy*Math.sin(r), y:cy+dx*Math.sin(r)+dy*Math.cos(r)};
    });
    const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
    return {x:Math.min(...xs), y:Math.min(...ys), w:Math.max(...xs)-Math.min(...xs), h:Math.max(...ys)-Math.min(...ys)};
  }


  function drawAnnotations(c, layout, exportMode=false){
    const drawArrowHead = (x1,y1,x2,y2,color,lineWidth=4) => {
      const ang = Math.atan2(y2-y1, x2-x1);
      const len = Math.max(12, (lineWidth || 4) * 4.2);
      c.save();
      c.fillStyle = color;
      c.beginPath();
      c.moveTo(x2,y2);
      c.lineTo(x2-len*Math.cos(ang-Math.PI/6), y2-len*Math.sin(ang-Math.PI/6));
      c.lineTo(x2-len*Math.cos(ang+Math.PI/6), y2-len*Math.sin(ang+Math.PI/6));
      c.closePath();
      c.fill();
      c.restore();
    };

    c.save();
    if(layout){
      c.beginPath();
      for(const ib of layout.imageBounds || []) c.rect(ib.x, ib.y, ib.w, ib.h);
      for(const dv of layout.dividers || []) c.rect(dv.x, dv.y, dv.w, dv.h);
      c.clip();
    }
    for(const a of state.annotations){
      c.save();
      c.globalAlpha = clamp(a.opacity == null ? 1 : +a.opacity, 0.05, 1);
      c.translate(a.x || 0, a.y || 0);
      const w = a.w == null ? 180 : a.w;
      const h = a.h == null ? 90 : a.h;
      const lw = Math.max(1, a.lineWidth || 3);
      const color = a.color || '#ef4444';
      if((a.rotation || 0) && !isFreePathAnnotation(a)){
        // Rotate around the same visual frame center used by the blue dashed selection box.
        const rb = annotationRawBounds(a);
        const cx = (rb.x - (a.x || 0)) + rb.w / 2;
        const cy = (rb.y - (a.y || 0)) + rb.h / 2;
        c.translate(cx, cy);
        c.rotate((a.rotation || 0) * Math.PI / 180);
        c.translate(-cx, -cy);
      }

      if(a.type === 'text' || a.type === 'watermark'){
        const m = measureTextAnnotation(a);
        const fs = m.fs;
        c.font = `600 ${fs}px ui-sans-serif, system-ui, sans-serif`;
        c.textAlign = 'left'; c.textBaseline = 'top';
        const lines = m.lines;
        const drawTextBlock = (ox=0, oy=0) => {
          if(a.bg && a.bg !== 'transparent'){
            c.fillStyle = a.bg;
            c.fillRect(ox-8,oy-6,m.width,m.height);
          }
          if(a.outline){
            c.strokeStyle = a.outlineColor || '#ffffff';
            c.lineWidth = Math.max(2, fs/10);
            lines.forEach((line,i)=> c.strokeText(line,ox,oy+i*m.step));
          }
          c.fillStyle = a.color || '#111827';
          lines.forEach((line,i)=> c.fillText(line,ox,oy+i*m.step));
        };
        if(a.type === 'watermark' && (a.repeatCount || 1) > 1 && layout){
          const count = clamp(Math.round(a.repeatCount || 1), 1, 120);
          const cols = Math.max(1, Math.ceil(Math.sqrt(count * Math.max(1, layout.fullWidth) / Math.max(1, layout.fullHeight))));
          const rows = Math.max(1, Math.ceil(count / cols));
          let n = 0;
          for(let r=0;r<rows;r++){
            for(let col=0;col<cols && n<count;col++,n++){
              const px = (col + .5) * layout.fullWidth / cols - (a.x||0);
              const py = (r + .5) * layout.fullHeight / rows - (a.y||0);
              c.save(); c.translate(px, py); c.rotate(-Math.PI/9); drawTextBlock(0,0); c.restore();
            }
          }
        } else drawTextBlock(0,0);
      } else if(a.type === 'badge'){
        const fs = a.fontSize || 34;
        const r = Math.max(12, fs * .62);
        c.beginPath(); c.arc(r, r, r, 0, Math.PI*2);
        c.fillStyle = a.color || '#2f80ed'; c.fill();
        c.strokeStyle = '#fff'; c.lineWidth = Math.max(2, fs/10); c.stroke();
        c.fillStyle = '#fff'; c.font = `800 ${fs}px ui-sans-serif, system-ui, sans-serif`; c.textAlign='center'; c.textBaseline='middle';
        c.fillText(String(a.text || '1'), r, r+1);
      } else if(a.type === 'mosaic'){
        const cell = Math.max(6, a.gridSize || 14);
        const x0 = Math.min(0,w), y0 = Math.min(0,h), ww = Math.abs(w), hh = Math.abs(h);
        c.save();
        c.beginPath(); c.rect(x0,y0,ww,hh); c.clip();
        c.fillStyle = 'rgba(229,231,235,.88)';
        c.fillRect(x0,y0,ww,hh);
        for(let yy=y0; yy<y0+hh; yy+=cell){
          for(let xx=x0; xx<x0+ww; xx+=cell){
            const k = (Math.floor(xx/cell) + Math.floor(yy/cell)) % 4;
            c.fillStyle = ['rgba(31,41,55,.42)','rgba(107,114,128,.42)','rgba(209,213,219,.72)','rgba(17,24,39,.30)'][k];
            c.fillRect(xx, yy, cell+0.5, cell+0.5);
          }
        }
        c.restore();
      } else if(a.type === 'redact'){
        c.fillStyle = a.color || '#111827';
        c.fillRect(0,0,w,h);
      } else if(a.type === 'box' || a.type === 'boxFill'){
        if(a.type === 'boxFill'){
          c.fillStyle = a.fillColor || color;
          c.fillRect(0,0,w,h);
        }
        c.strokeStyle = color;
        c.lineWidth = lw;
        c.strokeRect(0,0,w,h);
      } else if(a.type === 'circle' || a.type === 'circleFill'){
        const x0 = Math.min(0,w), y0 = Math.min(0,h), ww = Math.abs(w), hh = Math.abs(h);
        c.beginPath();
        c.ellipse(x0+ww/2, y0+hh/2, Math.max(1,ww/2), Math.max(1,hh/2), 0, 0, Math.PI*2);
        if(a.type === 'circleFill'){
          c.fillStyle = a.fillColor || color;
          c.fill();
        }
        c.strokeStyle = color;
        c.lineWidth = lw;
        c.stroke();
      } else if(a.type === 'line' || a.type === 'arrow' || a.type === 'doubleArrow'){
        c.strokeStyle = color;
        c.fillStyle = color;
        c.lineWidth = lw;
        c.lineCap = 'round';
        c.lineJoin = 'round';
        c.beginPath(); c.moveTo(0,0); c.lineTo(w,h); c.stroke();
        if(a.type === 'arrow' || a.type === 'doubleArrow') drawArrowHead(0,0,w,h,color,lw);
        if(a.type === 'doubleArrow') drawArrowHead(w,h,0,0,color,lw);
      } else if(a.type === 'pen' || a.type === 'highlight' || a.type === 'mosaicPen'){
        const pts = a.points || [];
        if(pts.length){
          if(a.type === 'mosaicPen'){
            const cell = Math.max(6, a.gridSize || 14);
            const size = Math.max(cell*1.4, a.lineWidth || cell*2);
            for(const p of pts){
              const x0 = p.x - size/2, y0 = p.y - size/2;
              for(let yy=y0; yy<y0+size; yy+=cell){
                for(let xx=x0; xx<x0+size; xx+=cell){
                  const k = (Math.floor(xx/cell) + Math.floor(yy/cell)) % 4;
                  c.fillStyle = ['rgba(31,41,55,.42)','rgba(107,114,128,.42)','rgba(209,213,219,.72)','rgba(17,24,39,.30)'][k];
                  c.fillRect(xx, yy, cell+0.5, cell+0.5);
                }
              }
            }
          } else {
            c.strokeStyle = a.color || (a.type === 'highlight' ? '#facc15' : '#ef4444');
            c.lineWidth = a.lineWidth || (a.type === 'highlight' ? 18 : 4);
            c.lineCap = 'round'; c.lineJoin = 'round';
            if(a.type === 'highlight') c.globalCompositeOperation = 'multiply';
            c.beginPath();
            c.moveTo(pts[0].x, pts[0].y);
            for(let i=1;i<pts.length;i++) c.lineTo(pts[i].x, pts[i].y);
            c.stroke();
          }
        }
      }
      c.restore();
    }
    c.restore();
  }

  function annotationRawBounds(a){
    if(a.type === 'text' || a.type === 'watermark'){
      const m = measureTextAnnotation(a);
      return {x:(a.x||0)-8, y:(a.y||0)-6, w:m.width, h:m.height};
    }
    if(a.type === 'badge'){
      const fs = a.fontSize || 34; const r = Math.max(12, fs*.62);
      return {x:a.x||0, y:a.y||0, w:r*2, h:r*2};
    }
    if(a.type === 'pen' || a.type === 'highlight' || a.type === 'mosaicPen'){
      const pts = a.points || [];
      if(!pts.length) return {x:a.x||0, y:a.y||0, w:24, h:24};
      const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      const pad = Math.max(8, (a.lineWidth || (a.type === 'highlight' ? 18 : 4)) / 2 + 4);
      return {x:(a.x||0)+minX-pad, y:(a.y||0)+minY-pad, w:Math.max(24,maxX-minX+pad*2), h:Math.max(24,maxY-minY+pad*2)};
    }
    const w = a.w == null ? 180 : a.w;
    const h = a.h == null ? 90 : a.h;
    const pad = Math.max(6, (a.lineWidth || 3) + 4);
    return {x:(a.x||0)+Math.min(0,w)-pad, y:(a.y||0)+Math.min(0,h)-pad, w:Math.max(24,Math.abs(w)+pad*2), h:Math.max(24,Math.abs(h)+pad*2)};
  }

  function annotationBounds(a){
    return rotateAabb(annotationRawBounds(a), a.rotation || 0);
  }

  function rotatePointAround(p, c, deg){
    const r = (deg || 0) * Math.PI / 180;
    const dx = p.x - c.x, dy = p.y - c.y;
    return {x:c.x + dx*Math.cos(r) - dy*Math.sin(r), y:c.y + dx*Math.sin(r) + dy*Math.cos(r)};
  }

  function annotationFrame(a){
    const b = annotationRawBounds(a);
    const deg = a.rotation || 0;
    const center = {x:b.x + b.w/2, y:b.y + b.h/2};
    const tl = rotatePointAround({x:b.x, y:b.y}, center, deg);
    const tr = rotatePointAround({x:b.x+b.w, y:b.y}, center, deg);
    const br = rotatePointAround({x:b.x+b.w, y:b.y+b.h}, center, deg);
    const bl = rotatePointAround({x:b.x, y:b.y+b.h}, center, deg);
    const topMid = rotatePointAround({x:b.x+b.w/2, y:b.y}, center, deg);
    const rotateHandle = rotatePointAround({x:b.x+b.w/2, y:b.y - 28/Math.max(0.0001,state.zoom)}, center, deg);
    return {b, center, points:[tl,tr,br,bl], topMid, rotateHandle, resizeHandle:br};
  }


  function makeAnnotation(type, pt){
    const s = state.toolSettings || {};
    const mobileStroke = isMobileLayout() ? 7 : 4;
    const base = { id: uid('ann'), type, x: Math.round(pt.x), y: Math.round(pt.y), w: 180, h: 90, color: s.color || '#ef4444', fillColor:s.fillColor || '#fee2e2', bg: 'transparent', opacity: s.opacity == null ? 1 : s.opacity, lineWidth: s.lineWidth || mobileStroke, fontSize: 14, text: '' };
    if(type === 'redact') Object.assign(base, {color:'#111827', fillColor:'#111827', w:220, h:72});
    if(type === 'mosaic') Object.assign(base, {w:220, h:90, gridSize:s.mosaicGrid || 14, opacity:1});
    if(type === 'mosaicPen') Object.assign(base, {points:[{x:0,y:0}], w:0, h:0, gridSize:s.mosaicGrid || 14, lineWidth:Math.max(18,(s.mosaicGrid||14)*2), opacity:1});
    if(type === 'box') Object.assign(base, {color:s.color || '#ef4444', w:220, h:110, lineWidth:s.lineWidth || mobileStroke});
    if(type === 'boxFill') Object.assign(base, {color:s.color || '#ef4444', fillColor:s.fillColor || '#fee2e2', opacity:s.opacity == null ? .72 : s.opacity, w:220, h:110, lineWidth:s.lineWidth || mobileStroke});
    if(type === 'circle') Object.assign(base, {color:s.color || '#ef4444', w:180, h:120, lineWidth:s.lineWidth || mobileStroke});
    if(type === 'circleFill') Object.assign(base, {color:s.color || '#ef4444', fillColor:s.fillColor || '#fee2e2', opacity:s.opacity == null ? .72 : s.opacity, w:180, h:120, lineWidth:s.lineWidth || mobileStroke});
    if(type === 'line') Object.assign(base, {color:s.color || '#ef4444', w:200, h:80, lineWidth:s.lineWidth || mobileStroke});
    if(type === 'arrow') Object.assign(base, {color:s.color || '#ef4444', w:200, h:80, lineWidth:s.lineWidth || mobileStroke});
    if(type === 'doubleArrow') Object.assign(base, {color:s.color || '#ef4444', w:200, h:80, lineWidth:s.lineWidth || mobileStroke});
    if(type === 'text') Object.assign(base, {color:s.textColor || '#111827', bg:s.textBg || 'transparent', outline:!!s.textOutline, vertical:!!s.textVertical, text:s.textValue || '', fontSize:s.textSize || 14, w:0, h:0});
    if(type === 'badge') Object.assign(base, {color:s.badgeColor || '#2f80ed', text:String(s.badgeNumber || 1), fontSize:s.badgeSize || 34, w:0, h:0});
    if(type === 'watermark') Object.assign(base, {color:s.watermarkColor || '#111827', bg:'transparent', text:s.watermarkText || '水印', fontSize:s.watermarkSize || 34, opacity:s.watermarkOpacity == null ? .22 : s.watermarkOpacity, repeatCount:s.watermarkRepeat || 1, w:0, h:0});
    if(type === 'pen') Object.assign(base, {color:s.penColor || '#ef4444', lineWidth:s.penWidth || mobileStroke, points:[{x:0,y:0}], w:0, h:0});
    if(type === 'highlight') Object.assign(base, {color:s.penColor || '#facc15', opacity:.45, lineWidth:s.highlightWidth || 18, points:[{x:0,y:0}], w:0, h:0});
    return base;
  }

  function addAnnotation(type){
    if(!state.images.length) return;
    const layout = computeLayout(true);
    addAnnotationAt(type, { x: Math.max(20, layout.fullWidth/2 - 80), y: Math.max(20, layout.fullHeight/2 - 40) });
  }

  function beginToolDraw(type, pt){
    if(!type || type === 'select' || !state.images.length) return false;
    if(type === 'watermark'){
      const existing = findExistingWatermarkIndex();
      if(existing >= 0) return selectAnnotationForEdit(existing);
    }
    pushHistory();
    const a = makeAnnotation(type, pt);
    state.annotations.push(a);
    const idx = state.annotations.length - 1;
    state.selected = {type:'annotation', index:idx};
    if(type === 'text' || type === 'watermark' || type === 'badge'){
      if(type === 'badge') state.toolSettings.badgeNumber = clamp(Math.round(+state.toolSettings.badgeNumber || 1) + 1, 1, 9999);
      applyActiveTool();
      renderProps(); requestRender();
      closeInlineTextEditor(false);
      if(type === 'text' && isMobileLayout()) openMobileTextEditor(idx, true);
      return true;
    }
    drag = { type:'toolCreate', index:idx, tool:type, start:{...pt}, ann:{...a} };
    renderProps(); requestRender();
    return true;
  }

  function addAnnotationAt(type, pt){
    return beginToolDraw(type, pt);
  }

  function deleteSelectedAnnotation(){
    const idx = state.selected?.type === 'annotation' ? state.selected.index : -1;
    if(idx < 0) return;
    pushHistory();
    state.annotations.splice(idx,1);
    state.selected = state.annotations.length ? {type:'annotation', index: clamp(idx, 0, state.annotations.length-1)} : null;
    renderProps(); requestRender();
  }

  function normalizeProjectCrops(){
    const effective = state.images.map((im,i) => getEffectiveCrop(i));
    state.images.forEach((im,i) => { im.crop = {...effective[i]}; });
    state.seams.forEach(s => { s.beforeCrop = 0; s.afterCrop = 0; });
  }



  function splitImageAt(index, localPos=null){
    const original = state.images[index];
    if(!original) return;
    pushHistory();
    normalizeProjectCrops();
    const im = state.images[index];
    const visible = state.orientation === 'vertical' ? (im.height - im.crop.top - im.crop.bottom) : (im.width - im.crop.left - im.crop.right);
    const pos = clamp(Math.round(localPos == null ? visible/2 : localPos), 1, Math.max(1, visible - 1));
    const a = {...im, id: uid('img'), name: im.name + ' A', crop: {...im.crop}};
    const b = {...im, id: uid('img'), name: im.name + ' B', crop: {...im.crop}};
    if(state.orientation === 'vertical'){
      const sourceSplit = im.crop.top + pos;
      a.crop.bottom = im.height - sourceSplit;
      b.crop.top = sourceSplit;
    } else {
      const sourceSplit = im.crop.left + pos;
      a.crop.right = im.width - sourceSplit;
      b.crop.left = sourceSplit;
    }
    state.images.splice(index,1,a,b);
    syncSeams(true);
    if(state.seams[index]) state.seams[index].locked = false;
    state.selected = {type:'seam', index};
    state.mode = 'seam';
    updateModeButtons(); renderProps(); requestRender();
    toast('已插入分割线，并把当前图片分成两段');
  }

  function insertSeamAtDraft(){
    if(!state.images.length) return;
    ensureSplitDraft();
    const layout = computeLayout(true);
    const pos = state.splitDraft.pos;
    const seamThreshold = 18;
    const enterCurrentSeamEdit = (idx) => {
      state.mode = 'divider';
      state.selected = {type:'seam', index:idx};
      state.activeHandle = {kind:'seamCenter', index:idx};
      updateModeButtons(); renderProps(); requestRender();
    };
    if(state.orientation === 'vertical'){
      const existing = layout.seams.find(sv => Math.abs(sv.y - pos) <= seamThreshold);
      if(existing){ enterCurrentSeamEdit(existing.index); return; }
      const target = layout.imageBounds.find(b => pos > b.y + 1 && pos < b.y + b.h - 1);
      if(!target) return;
      splitImageAt(target.index, layoutDistanceToSourcePixels(pos - target.y, target, 'y'));
      enterCurrentSeamEdit(target.index);
    } else {
      const existing = layout.seams.find(sv => Math.abs(sv.x - pos) <= seamThreshold);
      if(existing){ enterCurrentSeamEdit(existing.index); return; }
      const target = layout.imageBounds.find(b => pos > b.x + 1 && pos < b.x + b.w - 1);
      if(!target) return;
      splitImageAt(target.index, layoutDistanceToSourcePixels(pos - target.x, target, 'x'));
      enterCurrentSeamEdit(target.index);
    }
  }

  function fitToView(animate=true){
    const rect = stageWrap.getBoundingClientRect();
    const layout = computeLayout(true);
    if(!state.images.length){ state.zoom = 1; state.pan = {x:0,y:0}; requestRender(); return; }
    if(isMobileLayout()){
      const safe = mobileSafeInset();
      const fitW = Math.max(1, rect.width - safe * 2);
      const fitH = Math.max(1, rect.height - safe * 2);
      const z = state.orientation === 'vertical'
        ? fitW / Math.max(1, layout.fullWidth)
        : fitH / Math.max(1, layout.fullHeight);
      state.zoom = clamp(isFinite(z) ? z : 1, 0.03, 8);
      if(state.orientation === 'vertical'){
        state.pan.x = safe + (fitW - layout.fullWidth * state.zoom) / 2;
        state.pan.y = safe;
      } else {
        state.pan.x = safe;
        state.pan.y = safe + (fitH - layout.fullHeight * state.zoom) / 2;
      }
      lockMobilePanAxis(layout);
    } else {
      const pad = 64;
      const z = Math.min((rect.width-pad)/layout.fullWidth, (rect.height-pad)/layout.fullHeight);
      state.zoom = clamp(isFinite(z) ? z : 1, 0.03, 3);
      state.pan.x = (rect.width - layout.fullWidth*state.zoom)/2;
      state.pan.y = (rect.height - layout.fullHeight*state.zoom)/2;
    }
    requestRender();
  }

  function hitTest(wx, wy){
    for(let i=hitAreas.length-1;i>=0;i--){
      const h = hitAreas[i];
      if(wx >= h.x && wx <= h.x+h.w && wy >= h.y && wy <= h.y+h.h) return h;
    }
    return null;
  }

  function seamAnchorScreen(index){
    const layout = computeLayout(true);
    const sv = layout.seams.find(v => v.index === index);
    if(!sv) return null;
    return state.orientation === 'vertical'
      ? sv.y * state.zoom + state.pan.y
      : sv.x * state.zoom + state.pan.x;
  }

  function seamDragSourceScale(index, side='before'){
    const layout = computeLayout(true);
    const imageIndex = side === 'after' ? index + 1 : index;
    const item = layout.items.find(v => v.index === imageIndex);
    if(!item) return 1;
    return state.orientation === 'vertical'
      ? (item.scaleY || item.scale || 1)
      : (item.scaleX || item.scale || 1);
  }

  function keepSeamAnchor(activeDrag){
    if(activeDrag.anchorScreen == null) return;
    const layout = computeLayout(true);
    const sv = layout.seams.find(v => v.index === activeDrag.index);
    if(!sv) return;
    if(state.orientation === 'vertical') state.pan.y = activeDrag.anchorScreen - sv.y * state.zoom;
    else state.pan.x = activeDrag.anchorScreen - sv.x * state.zoom;
  }

  function onPointerDown(e){
    if(e.button !== undefined && e.button !== 0) return;
    stage.setPointerCapture?.(e.pointerId);
    const p = getPointer(e);
    if(e.pointerType === 'touch'){
      activePointers.set(e.pointerId, p);
      if(activePointers.size >= 2 && beginPinchZoom()){
        e.preventDefault();
        return;
      }
    }
    const w = screenToWorld(p.x,p.y);
    const h = hitTest(w.x,w.y);
    if(!state.preview && state.mode === 'tools' && state.toolArmed === 'eraser'){
      if(h?.type === 'annotationSelect'){
        state.selected = {type:'annotation', index:h.index};
        deleteSelectedAnnotation();
      }
      return;
    }
    if(!state.preview && state.mode === 'tools' && state.toolArmed && state.toolArmed !== 'select'){
      if(h && (h.type === 'annotationSelect' || h.type === 'annotationResize')){
        handleHitDown(h, w, e);
      } else if(!h){
        beginToolDraw(state.toolArmed, w);
      } else {
        handleHitDown(h, w, e);
      }
    } else if(h && !state.preview){
      handleHitDown(h, w, e);
    } else {
      drag = { type:'pan', startX:p.x, startY:p.y, pan:{...state.pan} };
      stage.classList.add('dragging');
    }
  }

  function handleHitDown(h, w, e){
    if(h.type === 'activeDone'){
      const finishedActive = state.activeHandle ? {...state.activeHandle} : null;
      if(finishedActive?.kind === 'canvasCrop'){
        commitCanvasCrop();
        return;
      }
      if(state.mode === 'divider' && finishedActive?.kind === 'seamCenter'){
        // 完成接缝编辑后，分割线应停在当前接缝原位置。
        // 之后由 drawDividerOverlay 判断：仍在可视范围就保持；离开可视范围才自动回到屏幕中心。
        const layout = computeLayout(true);
        const sv = layout.seams.find(v => v.index === finishedActive.index);
        if(sv){
          if(!state.splitDraft) state.splitDraft = {pos:1};
          state.splitDraft.pos = Math.round(state.orientation === 'vertical' ? sv.y : sv.x);
          state.splitDraftManual = true;
        }
      }
      state.activeHandle = null;
      if(state.mode === 'divider'){
        state.selected = null;
      }
      renderProps(); requestRender(); return;
    }
    if(h.type === 'activeDrag'){ startActiveDrag(w, getPointer(e)); return; }
    if(h.type === 'activeDragBefore' || h.type === 'activeDragAfter'){
      const s = state.seams[h.index];
      if(!s) return;
      pushHistory();
      state.selected = {type:'seam', index:h.index};
      const side = h.type === 'activeDragAfter' ? 'after' : 'before';
      drag = { type: side === 'before' ? 'seamBefore' : 'seamAfter', index:h.index, start:w, startScreen:getPointer(e), before:s.beforeCrop, after:s.afterCrop, anchorScreen:seamAnchorScreen(h.index), sourceScale:seamDragSourceScale(h.index, side) };
      return;
    }
    if(h.type === 'seamSelect'){ state.activeHandle = null; state.selected = {type:'seam', index:h.index}; renderProps(); requestRender(); return; }
    if(h.type === 'annotationSelect'){
      if(state.mode === 'tools' && state.toolArmed === 'eraser'){
        state.selected = {type:'annotation', index:h.index};
        deleteSelectedAnnotation();
        return;
      }
      selectAnnotationForEdit(h.index);
      if(isMobileLayout() && state.annotations[h.index]?.type === 'text'){
        openMobileTextEditor(h.index, true);
        return;
      }
      { const a = state.annotations[h.index];
        drag = {type:'annotationMove', index:h.index, start:w, ann:cloneAnnotationForDrag(a)}; }
      return;
    }
    if(h.type === 'annotationResize'){
      selectAnnotationForEdit(h.index);
      const a = state.annotations[h.index]; drag = {type:'annotationResize', index:h.index, start:w, ann:cloneAnnotationForDrag(a)}; return;
    }
    if(h.type === 'annotationLineStart' || h.type === 'annotationLineEnd'){
      selectAnnotationForEdit(h.index);
      const a = state.annotations[h.index]; drag = {type:h.type, index:h.index, start:w, ann:cloneAnnotationForDrag(a)}; return;
    }
    if(h.type === 'annotationRotate'){
      selectAnnotationForEdit(h.index);
      const a = state.annotations[h.index]; const center = annotationFrame(a).center;
      drag = {type:'annotationRotate', index:h.index, center, startAngle:Math.atan2(w.y-center.y,w.x-center.x), rotation:+(a.rotation||0)}; return;
    }
    if(h.type === 'splitDraftCommit'){ insertSeamAtDraft(); return; }
    if(h.type === 'splitDraftDrag'){ state.splitDraftManual = true; drag = {type:'splitDraft', start:w, startScreen:getPointer(e), pos: state.splitDraft?.pos || 0}; return; }
    if(h.type === 'subtitleRegion' || h.type === 'subtitleEdge'){
      const layout = computeLayout(true);
      const item = layout.items.find(v => v.index === h.index);
      const im = state.images[h.index];
      if(!item || !im) return;
      pushHistory();
      state.selected = {type:'image', index:h.index};
      drag = {type:h.type === 'subtitleRegion' ? 'subtitleMove' : 'subtitleEdge', edge:h.edge, index:h.index, start:w, region:{...state.subtitleRegion}, item:{...item}, imageHeight:im.height};
      return;
    }
    if(h.type === 'cutLine'){
      const lines = ensureCutLines(false);
      pushHistory();
      drag = {type:'cutLine', axis:h.axis, index:h.index, start:w, lines:{x:[...lines.x], y:[...lines.y]}};
      return;
    }
    if(h.type === 'canvasCrop'){ state.selected = {type:'canvasCrop'}; state.activeHandle = {kind:'canvasCrop', edge:h.edge}; renderProps(); requestRender(); return; }
    if(h.type === 'imageCrop'){ state.selected = {type:'image', index:h.index}; state.activeHandle = {kind:'imageCrop', index:h.index, edge:h.edge}; renderProps(); requestRender(); return; }
    if(['seamBefore','seamAfter','seamCenter'].includes(h.type)){ state.selected = {type:'seam', index:h.index}; state.activeHandle = {kind:'seamCenter', index:h.index}; renderProps(); requestRender(); return; }
    if(state.mode === 'tools' && state.toolArmed && !['select','eraser'].includes(state.toolArmed)){ addAnnotationAt(state.toolArmed, w); return; }
  }

  function startActiveDrag(w, sp){
    const h = state.activeHandle;
    if(!h) return;
    pushHistory();
    if(h.kind === 'canvasCrop'){
      const layout = computeLayout(true);
      state.selected = {type:'canvasCrop'};
      drag = { type:'canvasCrop', edge:h.edge, start:w, startScreen: sp || {x:0,y:0}, startCrop:{...state.canvasCrop}, pan:{...state.pan}, fullWidth:layout.fullWidth, fullHeight:layout.fullHeight };
      return;
    }
    if(h.kind === 'imageCrop'){
      const idx = h.index;
      const layout = computeLayout(true);
      const item = layout.items.find(v => v.index === idx);
      const scaleX = item ? (item.dw / Math.max(1, item.sw)) : 1;
      const scaleY = item ? (item.dh / Math.max(1, item.sh)) : 1;
      state.selected = {type:'image', index:idx};
      const frame = layout.imageBounds.find(v => v.index === idx) || {x:0,y:0,w:1,h:1};
      drag = { type:'imageCrop', index:idx, edge:h.edge, start:w, startScreen: sp || {x:0,y:0}, startCrop:{...state.images[idx].crop}, scaleX, scaleY, pan:{...state.pan}, frame:{...frame} };
      return;
    }
    if(['seamBefore','seamAfter','seamCenter'].includes(h.kind)){
      const s = state.seams[h.index];
      if(!s) return;
      state.selected = {type:'seam', index:h.index};
      drag = { type:'seamCenter', index:h.index, start:w, startScreen: sp || {x:0,y:0}, before:s.beforeCrop, after:s.afterCrop, anchorScreen:seamAnchorScreen(h.index), sourceScale:seamDragSourceScale(h.index, 'before') };
      return;
    }
  }

  function onPointerMove(e){
    const p = getPointer(e);
    if(activePointers.has(e.pointerId)){
      activePointers.set(e.pointerId, p);
      if(pinchState && updatePinchZoom()){
        e.preventDefault();
        return;
      }
    }
    const w = screenToWorld(p.x,p.y);
    if(!drag){
      const h = hitTest(w.x,w.y);
      stage.style.cursor = h?.cursor || 'grab';
      return;
    }
    if(drag.type === 'pan'){
      const factor = mobilePanFactor();
      state.pan.x = drag.pan.x + (p.x - drag.startX) * factor;
      state.pan.y = drag.pan.y + (p.y - drag.startY) * factor;
      if(isMobileLayout()){
        if(state.orientation === 'vertical') state.pan.x = drag.pan.x;
        else state.pan.y = drag.pan.y;
      }
      requestRender(); return;
    }
    if(drag.type === 'splitDraft'){
      const layout = computeLayout(true);
      const dx = (p.x - drag.startScreen.x) / Math.max(0.0001, state.zoom);
      const dy = (p.y - drag.startScreen.y) / Math.max(0.0001, state.zoom);
      if(state.orientation === 'vertical') state.splitDraft.pos = clamp(Math.round(drag.pos + dy), 1, Math.max(1, layout.fullHeight-1));
      else state.splitDraft.pos = clamp(Math.round(drag.pos + dx), 1, Math.max(1, layout.fullWidth-1));
      requestRender(); return;
    }
    if(drag.type === 'cutLine'){
      const idx = selectedImageIndex();
      const layout = computeLayout(true);
      const item = layout.items.find(v => v.index === idx);
      if(!item) return;
      const lines = ensureCutLines(false);
      if(drag.axis === 'x'){
        const ratio = clamp((w.x - item.dx) / Math.max(1, item.dw), 0.01, 0.99);
        const prev = drag.index > 0 ? lines.x[drag.index - 1] + 0.01 : 0.01;
        const next = drag.index < lines.x.length - 1 ? lines.x[drag.index + 1] - 0.01 : 0.99;
        lines.x[drag.index] = clamp(ratio, prev, next);
      } else {
        const ratio = clamp((w.y - item.dy) / Math.max(1, item.dh), 0.01, 0.99);
        const prev = drag.index > 0 ? lines.y[drag.index - 1] + 0.01 : 0.01;
        const next = drag.index < lines.y.length - 1 ? lines.y[drag.index + 1] - 0.01 : 0.99;
        lines.y[drag.index] = clamp(ratio, prev, next);
      }
      requestRender(); return;
    }
    if(drag.type === 'subtitleMove' || drag.type === 'subtitleEdge'){
      const scale = Math.max(0.0001, drag.item?.scale || 1);
      const imageH = Math.max(1, drag.imageHeight || 1);
      const dyRatio = ((w.y - drag.start.y) / scale) / imageH;
      const minH = 0.03;
      const maxH = 0.85;
      if(drag.type === 'subtitleMove'){
        state.subtitleRegion.heightRatio = clamp(drag.region.heightRatio, minH, maxH);
        state.subtitleRegion.yRatio = clamp(drag.region.yRatio + dyRatio, 0, 1 - state.subtitleRegion.heightRatio);
      } else {
        const startTop = drag.region.yRatio;
        const startBottom = drag.region.yRatio + drag.region.heightRatio;
        if(drag.edge === 'top'){
          const nextTop = clamp(startTop + dyRatio, 0, startBottom - minH);
          state.subtitleRegion.yRatio = nextTop;
          state.subtitleRegion.heightRatio = clamp(startBottom - nextTop, minH, maxH);
        } else {
          const nextBottom = clamp(startBottom + dyRatio, startTop + minH, 1);
          state.subtitleRegion.yRatio = startTop;
          state.subtitleRegion.heightRatio = clamp(nextBottom - startTop, minH, maxH);
        }
        state.subtitleRegion.yRatio = clamp(state.subtitleRegion.yRatio, 0, 1 - state.subtitleRegion.heightRatio);
      }
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'canvasCrop'){
      const dx = Math.round((p.x - drag.startScreen.x) / Math.max(0.0001, state.zoom));
      const dy = Math.round((p.y - drag.startScreen.y) / Math.max(0.0001, state.zoom));
      const layout = computeLayout(true);
      const c = {...drag.startCrop};
      if(drag.edge === 'top') c.top = clamp(c.top - dy, 0, layout.fullHeight - c.bottom - 1);
      if(drag.edge === 'bottom') c.bottom = clamp(c.bottom + dy, 0, layout.fullHeight - c.top - 1);
      if(drag.edge === 'left') c.left = clamp(c.left - dx, 0, layout.fullWidth - c.right - 1);
      if(drag.edge === 'right') c.right = clamp(c.right + dx, 0, layout.fullWidth - c.left - 1);
      state.canvasCrop = c;
      // 固定裁剪窗口、移动整张拼图内容：补偿 viewport pan，使被编辑边在屏幕上保持不动。
      const z = state.zoom;
      if(drag.edge === 'left'){
        const startEdge = drag.startCrop.left;
        const screenEdge = startEdge * z + drag.pan.x;
        state.pan.x = screenEdge - c.left * z;
      } else if(drag.edge === 'right'){
        const startEdge = drag.fullWidth - drag.startCrop.right;
        const screenEdge = startEdge * z + drag.pan.x;
        state.pan.x = screenEdge - (layout.fullWidth - c.right) * z;
      } else if(drag.edge === 'top'){
        const startEdge = drag.startCrop.top;
        const screenEdge = startEdge * z + drag.pan.y;
        state.pan.y = screenEdge - c.top * z;
      } else if(drag.edge === 'bottom'){
        const startEdge = drag.fullHeight - drag.startCrop.bottom;
        const screenEdge = startEdge * z + drag.pan.y;
        state.pan.y = screenEdge - (layout.fullHeight - c.bottom) * z;
      }
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'imageCrop'){
      const im = state.images[drag.index];
      const dxWorld = (p.x - drag.startScreen.x) / Math.max(0.0001, state.zoom);
      const dyWorld = (p.y - drag.startScreen.y) / Math.max(0.0001, state.zoom);
      const dx = Math.round(dxWorld / Math.max(0.0001, drag.scaleX || 1));
      const dy = Math.round(dyWorld / Math.max(0.0001, drag.scaleY || 1));
      const c = {...drag.startCrop};
      if(drag.edge === 'top') c.top = clamp(c.top - dy, 0, im.height - c.bottom - 1);
      if(drag.edge === 'bottom') c.bottom = clamp(c.bottom + dy, 0, im.height - c.top - 1);
      if(drag.edge === 'left') c.left = clamp(c.left - dx, 0, im.width - c.right - 1);
      if(drag.edge === 'right') c.right = clamp(c.right + dx, 0, im.width - c.left - 1);
      im.crop = c;
      // 固定当前图裁剪窗口、移动当前图内容：补偿 pan，使当前编辑边在屏幕上保持不动。
      const updated = computeLayout(true);
      const nb = updated.imageBounds.find(v => v.index === drag.index);
      if(nb && drag.frame){
        const z = state.zoom;
        if(drag.edge === 'left'){
          const screenEdge = drag.frame.x * z + drag.pan.x;
          state.pan.x = screenEdge - nb.x * z;
        } else if(drag.edge === 'right'){
          const screenEdge = (drag.frame.x + drag.frame.w) * z + drag.pan.x;
          state.pan.x = screenEdge - (nb.x + nb.w) * z;
        } else if(drag.edge === 'top'){
          const screenEdge = drag.frame.y * z + drag.pan.y;
          state.pan.y = screenEdge - nb.y * z;
        } else if(drag.edge === 'bottom'){
          const screenEdge = (drag.frame.y + drag.frame.h) * z + drag.pan.y;
          state.pan.y = screenEdge - (nb.y + nb.h) * z;
        }
      }
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'toolCreate'){
      const a = state.annotations[drag.index];
      if(!a) return;
      if(a.type === 'pen' || a.type === 'highlight' || a.type === 'mosaicPen'){
        const last = (a.points || [])[a.points.length-1];
        const next = {x: Math.round(w.x - (a.x||0)), y: Math.round(w.y - (a.y||0))};
        if(!last || Math.hypot(next.x-last.x, next.y-last.y) >= 2) a.points.push(next);
      } else {
        a.w = Math.round(w.x - drag.start.x);
        a.h = Math.round(w.y - drag.start.y);
      }
      requestRender(); return;
    }
    if(drag.type === 'annotationMove'){
      const a = state.annotations[drag.index];
      a.x = Math.round(drag.ann.x + (w.x - drag.start.x));
      a.y = Math.round(drag.ann.y + (w.y - drag.start.y));
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'annotationResize'){
      const a = state.annotations[drag.index];
      if(a.type === 'text' || a.type === 'watermark' || a.type === 'badge'){
        const diff = Math.round(((w.x - drag.start.x) + (w.y - drag.start.y)) / 6);
        a.fontSize = clamp(Math.round((drag.ann.fontSize || (a.type==='badge'?34:14)) + diff), 8, 240);
      } else {
        a.w = Math.max(8, Math.round((drag.ann.w || 180) + (w.x - drag.start.x)));
        a.h = Math.max(8, Math.round((drag.ann.h || 90) + (w.y - drag.start.y)));
      }
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'annotationLineStart'){
      const a = state.annotations[drag.index];
      const end = {x:(drag.ann.x||0)+(drag.ann.w||0), y:(drag.ann.y||0)+(drag.ann.h||0)};
      a.x = Math.round(w.x); a.y = Math.round(w.y);
      a.w = Math.round(end.x - a.x); a.h = Math.round(end.y - a.y);
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'annotationLineEnd'){
      const a = state.annotations[drag.index];
      a.w = Math.round(w.x - (drag.ann.x||0));
      a.h = Math.round(w.y - (drag.ann.y||0));
      renderProps(); requestRender(); return;
    }
    if(drag.type === 'annotationRotate'){
      const a = state.annotations[drag.index];
      const ang = Math.atan2(w.y-drag.center.y, w.x-drag.center.x);
      let deg = drag.rotation + (ang - drag.startAngle) * 180 / Math.PI;
      deg = ((deg % 360) + 360) % 360;
      a.rotation = Math.round(deg);
      renderProps(); requestRender(); return;
    }
    if(['seamBefore','seamAfter','seamCenter'].includes(drag.type)){
      const s = state.seams[drag.index];
      const vertical = state.orientation === 'vertical';
      const layoutDelta = vertical
        ? Math.round((p.y - drag.startScreen.y) / Math.max(0.0001, state.zoom))
        : Math.round((p.x - drag.startScreen.x) / Math.max(0.0001, state.zoom));
      const d = Math.round(layoutDelta / Math.max(0.0001, drag.sourceScale || 1));
      const a = state.images[drag.index];
      const b = state.images[drag.index+1];
      const maxBefore = vertical ? a.height - a.crop.top - a.crop.bottom - 1 : a.width - a.crop.left - a.crop.right - 1;
      const maxAfter = vertical ? b.height - b.crop.top - b.crop.bottom - 1 : b.width - b.crop.left - b.crop.right - 1;
      if(drag.type === 'seamBefore') s.beforeCrop = clamp(drag.before + d, 0, maxBefore);
      if(drag.type === 'seamAfter') s.afterCrop = clamp(drag.after - d, 0, maxAfter);
      if(drag.type === 'seamCenter'){
        s.beforeCrop = clamp(drag.before + d, 0, maxBefore);
      }
      keepSeamAnchor(drag);
      renderProps(); requestRender(); return;
    }
  }

  function onPointerUp(e){
    if(activePointers.has(e.pointerId)){
      activePointers.delete(e.pointerId);
      if(pinchState){
        if(activePointers.size < 2) pinchState = null;
        e.preventDefault();
        requestRender();
        return;
      }
    }
    const finished = drag;
    drag = null;
    stage.classList.remove('dragging');
    if(finished && finished.type === 'pan') requestRender();
    if(finished && finished.type === 'splitDraft') renderProps();
    if(finished && finished.type === 'toolCreate'){
      const a = state.annotations[finished.index];
      if(a && a.type !== 'pen' && a.type !== 'highlight' && a.type !== 'mosaicPen'){
        if(Math.abs(a.w || 0) < 6 && Math.abs(a.h || 0) < 6){ a.w = finished.ann.w || 180; a.h = finished.ann.h || 90; }
      }
      applyActiveTool();
      renderProps(); requestRender();
    }
  }

  function getPointer(e){
    const r = stageWrap.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  function onWheel(e){
    if(!state.images.length) return;
    if(e.ctrlKey || e.metaKey){
      e.preventDefault();
      const rect = stageWrap.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const before = screenToWorld(mx,my);
      const factor = e.deltaY < 0 ? 1.08 : 0.92;
      state.zoom = clamp(state.zoom * factor, 0.03, 8);
      state.pan.x = mx - before.x * state.zoom;
      state.pan.y = my - before.y * state.zoom;
      requestRender();
    } else {
      state.pan.x -= e.deltaX;
      state.pan.y -= e.deltaY;
      requestRender();
    }
  }

  function renderProps(){
    updateToolbarButtons();
    if(!state.images.length){ props.innerHTML = ''; renderToolDock(); return; }
    const mode = state.mode;
    let html = '';
    if(shouldShowImageList(mode)) html += imageListCard();
    if(mode === 'seam') html += seamProps();
    if(mode === 'canvasCrop') html += canvasCropProps();
    if(mode === 'imageCrop') html += imageCropProps();
    if(mode === 'divider') html += dividerProps();
    if(mode === 'tools') html += toolsProps();
    if(mode === 'subtitle') html += subtitleProps();
    if(mode === 'cut') html += cutProps();
    props.innerHTML = html;
    bindPropEvents();
    renderToolDock();
  }

  function shouldShowImageList(mode){
    return mode !== 'tools' && mode !== 'divider' && !(isMobileLayout() && (mode === 'subtitle' || mode === 'cut'));
  }

  function imageListCard(){
    return `<div class="prop-card"><div class="image-list">${state.images.map((im,i)=>`
      <div class="image-item ${state.selected?.type==='image'&&state.selected.index===i?'selected':''}" data-select-image="${i}">
        <img class="thumb" src="${thumbSrc(im)}" alt="">
        <div><div class="image-name">${escapeHtml(im.name)}</div><div class="image-meta">${im.width}×${im.height}px${proxyText(im)}</div></div>
        <div class="tiny-actions">
          <button title="上移" data-move-up="${i}">↑</button>
          <button title="下移" data-move-down="${i}">↓</button>
          <button title="删除" data-remove-image="${i}">×</button>
        </div>
      </div>`).join('')}</div></div>`;
  }

  function thumbSrc(im){
    return im.previewDataUrl || im.dataUrl;
  }

  function proxyText(im){
    if(im.proxyStatus === 'queued') return ' · 排队';
    if(im.proxyStatus === 'building') return ' · 优化中';
    if(im.proxyStatus === 'ready') return ' · 预览';
    return '';
  }

  function stitchActionButtons(){
    return `<div class="stitch-action-row">
      <button class="mini-btn" data-stitch-action="manualStitch">手动拼接</button>
      <button class="mini-btn" data-stitch-action="autoStitch">自动拼接</button>
      <button class="mini-btn" data-stitch-action="autoSubtitle">自动字幕</button>
      <button class="mini-btn" data-stitch-action="manualSubtitle">手动字幕</button>
    </div>`;
  }

  function seamProps(){
    const idx = state.selected?.type==='seam' ? state.selected.index : 0;
    const s = state.seams[idx];
    if(!s) return `<div class="prop-card">${stitchActionButtons()}<p class="hint">当前只有一张图。</p></div>`;
    return `<div class="prop-card">
      ${stitchActionButtons()}

  function bindPropEvents(){
    $$('[data-select-image]', props).forEach(el => el.addEventListener('click', e=>{
      if(e.target.closest('button')) return;
      state.selected = {type:'image', index:+el.dataset.selectImage};

      updateModeButtons(); renderProps(); requestRender();
    }));
    $$('[data-move-up]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); moveImage(+btn.dataset.moveUp, -1); }));
    $$('[data-move-down]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); moveImage(+btn.dataset.moveDown, 1); }));
    $$('[data-remove-image]', props).forEach(btn => btn.addEventListener('click', e=>{ e.stopPropagation(); removeImage(+btn.dataset.removeImage); }));

    $$('[data-crop]', props).forEach(inp => inp.addEventListener('change', () => {

      if(obj === 'canvas') state.canvasCrop[edge] = v;
      if(obj === 'image'){

        state.images[idx].crop[edge] = v;

      renderProps(); requestRender();

    $$('[data-num]', props).forEach(inp => inp.addEventListener('change', () => {
      pushHistory();
      const idx = state.selected?.type==='seam' ? state.selected.index : 0;

    }));

    $('#autoSeamBtn')?.addEventListener('click', () => autoCurrentSeam());

    $('#resetCanvasCrop')?.addEventListener('click', () => { pushHistory(); state.canvasCrop={top:0,right:0,bottom:0,left:0}; renderProps(); requestRender(); });

    $('#copyCropNext')?.addEventListener('click', () => { const idx=selectedImageIndex(); if(!state.images[idx+1])return; pushHistory(); state.images[idx+1].crop={...state.images[idx].crop}; renderProps(); requestRender(); });
    $('#applyCropAll')?.addEventListener('click', () => { const idx=selectedImageIndex(); pushHistory(); const c={...state.images[idx].crop}; state.images.forEach(im=>im.crop={...c}); renderProps(); requestRender(); });

    $('#centerSplitDraft')?.addEventListener('click', () => { state.splitDraftManual = false; syncSplitDraftToViewportCenter(); renderProps(); requestRender(); });

    $$('[data-cut]', props).forEach(inp => inp.addEventListener('change', () => {
      const nextRows = inp.dataset.cut === 'rows' ? +inp.value : state.cutSettings.rows;
