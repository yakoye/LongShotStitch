  function escapeHtml(s){ return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function selectedImageIndex(){ return clamp(state.selected?.type==='image' ? state.selected.index : 0, 0, state.images.length-1); }
  function selectedLayoutItem(layout){
    const idx = selectedImageIndex();
    return layout.items.find(v => v.index === idx) || layout.items[0] || null;
  }
  function selectImageForRegionMode(){
    if(!state.images.length) return;
    if(state.selected?.type === 'image' && state.images[state.selected.index]) return;
    const layout = computeLayout(true);
    const center = visibleWorldCenter();
    const hit = layout.imageBounds.find(b => center.x >= b.x && center.x <= b.x + b.w && center.y >= b.y && center.y <= b.y + b.h);
    state.selected = {type:'image', index: hit ? hit.index : 0};
  }
  function selectedSeamIndex(){ return state.selected?.type==='seam' ? state.selected.index : (state.seams.length?0:-1); }
  function selectedDividerIndex(){ return state.selected?.type==='divider' ? state.selected.index : (state.seams.length?0:-1); }

  function selectSeamByDelta(d){
    if(!state.seams.length) return;
    const cur = state.selected?.type==='seam' || state.selected?.type==='divider' ? state.selected.index : 0;
    const next = clamp(cur + d, 0, state.seams.length-1);
    state.selected = {type: state.mode==='divider' ? 'divider' : 'seam', index: next};
    renderProps(); requestRender();
  }

  function moveImage(i, d){
    const j = i+d;
    if(j<0 || j>=state.images.length) return;
    pushHistory();
    [state.images[i], state.images[j]] = [state.images[j], state.images[i]];
    syncSeams(true);
    state.selected = {type:'image', index:j};
    renderProps(); fitToView(false); requestRender();
  }

  function removeImage(i){
    pushHistory();
    state.images.splice(i,1);
    syncSeams(true);
    state.selected = state.images.length ? {type:'image', index:clamp(i,0,state.images.length-1)} : null;
    renderProps(); fitToView(false); requestRender();
  }

  function toggleDivider(idx){
    if(idx<0) return;
    pushHistory();
    const s = state.seams[idx];
    if(s.divider?.enabled) s.divider = null;
    else ensureDivider(idx);
    state.selected = {type:'divider', index:idx};
    renderProps(); requestRender();
  }
  function ensureDivider(idx){
    if(!state.seams[idx].divider) state.seams[idx].divider = {enabled:true, style:'solid', thickness:2, color:'#111827', background:'#ffffff', marginBefore:8, marginAfter:8};
  }

  function updateModeButtons(){
    app.dataset.mode = state.mode;
    $$('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
    if(!state.mobileSection) state.mobileSection = sectionForMode(state.mode);
    $$('.mobile-primary-mode').forEach(b => b.classList.toggle('active', b.dataset.mobileSection === state.mobileSection));
    $$('[data-mobile-section-panel]').forEach(p => p.classList.toggle('active', p.dataset.mobileSectionPanel === state.mobileSection));
    $$('.mobile-mode').forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
    $$('.mobile-tool-group').forEach(b => b.classList.toggle('active', b.dataset.toolGroup === (state.toolSettings.group || 'select')));
    $('#mobileCutRowsValue') && ($('#mobileCutRowsValue').textContent = String(clamp(state.cutSettings.rows, 1, 12)));
    $('#mobileCutColsValue') && ($('#mobileCutColsValue').textContent = String(clamp(state.cutSettings.cols, 1, 12)));
    $$('.mobile-cut-tool').forEach(b => b.classList.toggle('active', b.dataset.mobileCutMode === (state.mobileCutSubmode || 'split')));
    $('#mobileSplitControls')?.classList.toggle('active', (state.mobileCutSubmode || 'split') === 'split');
    $('#mobileCropControls')?.classList.toggle('active', (state.mobileCutSubmode || 'split') === 'crop');
    $('#cropRatioSelect') && ($('#cropRatioSelect').value = state.cutCropRatio === 'free' ? '1:1' : (state.cutCropRatio || '1:1'));
    $('#customRatioInput') && ($('#customRatioInput').value = state.customCropRatio || '1:3');
    $('#customRatioInput') && ($('#customRatioInput').hidden = (state.cutCropRatio || '1:1') !== 'custom');
    $$('.mobile-ratio-free').forEach(b => b.classList.toggle('active', (state.cutCropRatio || '1:1') === 'free'));

  function sectionForMode(mode){
    if(mode === 'cut') return 'cut';
    if(mode === 'tools') return 'annotate';
    return 'stitch';
  }

  function setMobileSection(section){
    state.mobileSection = section;
    state.mobileStitchMenuOpen = false;
    state.mobileCutPopoverOpen = false;
    if(section === 'cut'){
      if((state.mobileCutSubmode || 'split') === 'crop') setMode('imageCrop', {mobileSection:'cut'});
      else setMode('cut', {mobileSection:'cut'});
    }
    else if(section === 'annotate') setMode('tools');
    else if(!['seam','canvasCrop','imageCrop','divider','subtitle'].includes(state.mode)) setMode('seam');

    renderMobileStitchMenu();
    renderMobileCutPopover();
    requestRender();

      state.orientation = inferAutoOrientation(state.images);

      autoAllSeams();

    renderMobileInfoMenu();
    renderMobileStitchMenu();
    renderMobileCutPopover();

  function setCutGridRowsCols(rows, cols){
    state.cutSettings.rows = clamp(Math.round(rows || 1), 1, 12);
    state.cutSettings.cols = clamp(Math.round(cols || 1), 1, 12);
    if(state.cutSettings.rows > 1 && state.cutSettings.cols > 1) state.cutSettings.mode = 'grid';
    else if(state.cutSettings.rows > 1) state.cutSettings.mode = 'rows';
    else state.cutSettings.mode = 'cols';

    renderProps();
    updateModeButtons();
    requestRender();

  function stepMobileCut(axis, delta){
    const rows = state.cutSettings.rows || 1;
    const cols = state.cutSettings.cols || 1;
    if(axis === 'rows') setCutGridRowsCols(rows + delta, cols);
    else setCutGridRowsCols(rows, cols + delta);

  function setMobileCutSubmode(mode){
    const next = mode === 'crop' ? 'crop' : 'split';
    const same = state.mobileSection === 'cut' && state.mobileCutSubmode === next;
    state.mobileSection = 'cut';

    else setMode('imageCrop', {mobileSection:'cut'});
    updateModeButtons();
    renderMobileCutPopover();
    renderProps();
    requestRender();

  function isLossyExportFormat(format=state.exportFormat){
    return format === 'jpeg' || format === 'webp';
  }

  function qualityLabel(q){
    const pct = Math.round(q * 100);
    if(pct >= 98) return '最大';
    if(pct >= 92) return '极清晰';
    if(pct >= 86) return '清晰';
    if(pct >= 74) return '均衡';
    return '小体积';
  }

  function exportContentProfile(){
    const layout = state.images.length ? computeLayout(false) : {width:1,height:1};
    const totalPixels = state.images.reduce((sum, im) => sum + im.width * im.height, 0);
    const totalBytes = state.images.reduce((sum, im) => sum + (im.fileSize || 0), 0);
    const jpgCount = state.images.filter(im => /\.(jpe?g)$/i.test(im.name || '')).length;
    const pngLikeCount = state.images.filter(im => /\.(png|bmp|gif|svg)$/i.test(im.name || '')).length;
    const longShot = Math.max(layout.height / Math.max(1, layout.width), layout.width / Math.max(1, layout.height)) > 2.2;
    const hasMarkups = state.annotations.length > 0 || state.mode === 'subtitle' || state.mode === 'cut';
    const multiImage = state.images.length > 1;
    const bytesPerMp = totalPixels ? totalBytes / (totalPixels / 1_000_000) : 0;
    const pngPhotoLike = pngLikeCount && bytesPerMp > 700_000 && !longShot && !hasMarkups;
    const photoLike = (jpgCount > pngLikeCount && bytesPerMp > 180_000 && !longShot) || pngPhotoLike;
    const textScore = (pngLikeCount ? 1 : 0) + (longShot ? 1 : 0) + (multiImage ? 1 : 0) + (hasMarkups ? 1 : 0);
    const huge = totalPixels > 24_000_000 || Math.max(layout.width, layout.height) > 10_000;
    return {photoLike, textHeavy:textScore >= 2 || (pngLikeCount && !pngPhotoLike), huge};
  }

  function smartExportQuality(format=state.exportFormat){
    const p = exportContentProfile();
    let q = format === 'webp' ? 0.86 : 0.88;
    if(p.textHeavy) q = format === 'webp' ? 0.88 : 0.92;
    else if(p.photoLike) q = format === 'webp' ? 0.82 : 0.84;
    if(p.huge && !p.textHeavy) q -= 0.04;
    return clamp(q, 0.5, 1);
  }

  function applySmartExportQuality(force=false){
    if(!isLossyExportFormat()) return;
    if(force || state.exportQualityAuto){
      state.exportQuality = smartExportQuality();
      state.exportQualityAuto = true;
    }
  }

  function updateExportQualityUi(){
    const format = state.exportFormat || 'png';
    const lossy = isLossyExportFormat(format);
    const formatRow = $('#exportFormatRow');
    if(formatRow) formatRow.hidden = false;
    const panel = $('#exportQualityPanel');
    const hint = $('#exportLosslessHint');
    if(panel) panel.hidden = !lossy;
    if(hint){
      hint.hidden = lossy;
      hint.textContent = format === 'svg' ? 'SVG 容器导出，不使用质量压缩。' : 'PNG 无损导出，不使用质量压缩。';
    }
    const q = clamp(state.exportQuality || smartExportQuality(format), 0.5, 1);
    const pct = Math.round(q * 100);
    $('#exportRecommend') && ($('#exportRecommend').textContent = `推荐 ${qualityLabel(q)}`);
    $('#exportQualityValue') && ($('#exportQualityValue').textContent = `${pct}%`);
    $$('.export-preset').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.exportQuality) === pct));
  }

  function formatBytes(bytes){
    if(!isFinite(bytes) || bytes <= 0) return '--';
    if(bytes >= 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(bytes >= 10 * 1024 * 1024 ? 1 : 2)} MB`;
    if(bytes >= 1024) return `${Math.round(bytes / 1024)} KB`;
    return `${Math.round(bytes)} B`;
  }

  function sourceBytesForEstimate(){
    if(!state.images.length) return 0;
    if(state.mode === 'cut'){
      const im = state.images[selectedImageIndex()];
      return im?.fileSize || 0;
    }
    return state.images.reduce((sum, im) => sum + (im.fileSize || 0), 0);
  }

  function encodeCanvasBlob(canvasEl, meta, quality){
    return new Promise(resolve => {
      if(!canvasEl.toBlob){ resolve(null); return; }
      canvasEl.toBlob(blob => resolve(blob), meta.mime, quality);
    });
  }

  function makePreviewCanvas(width, height, maxPixels=260000){
    const scale = Math.min(1, Math.sqrt(maxPixels / Math.max(1, width * height)), 980 / Math.max(1, width, height));
    const out = document.createElement('canvas');
    out.width = Math.max(1, Math.round(width * scale));
    out.height = Math.max(1, Math.round(height * scale));
    const c = out.getContext('2d');
    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = 'medium';
    return {canvas:out, ctx:c, scale};
  }

  function renderExportPreviewCanvas(){
    if(!state.images.length) return null;
    if(state.mode === 'cut'){
      const idx = selectedImageIndex();
      const im = state.images[idx];
      if(!im) return null;
      const crop = getEffectiveCrop(idx);
      const sw = Math.max(1, im.width - crop.left - crop.right);
      const sh = Math.max(1, im.height - crop.top - crop.bottom);
      const preview = makePreviewCanvas(sw, sh);
      preview.ctx.fillStyle = '#fff';
      preview.ctx.fillRect(0, 0, preview.canvas.width, preview.canvas.height);
      const source = imageSourceForDraw(im, false);
      const sxScale = source === im.previewImg ? im.previewScaleX || 1 : 1;
      const syScale = source === im.previewImg ? im.previewScaleY || 1 : 1;
      preview.ctx.drawImage(source, crop.left * sxScale, crop.top * syScale, sw * sxScale, sh * syScale, 0, 0, preview.canvas.width, preview.canvas.height);
      return {...preview, fullPixels:sw * sh};
    }
    const layout = computeLayout(false);
    const full = computeLayout(true);
    const preview = makePreviewCanvas(layout.width, layout.height);
    preview.ctx.save();
    preview.ctx.scale(preview.scale, preview.scale);
    preview.ctx.translate(-state.canvasCrop.left, -state.canvasCrop.top);
    drawComposition(preview.ctx, full, false, true);
    preview.ctx.restore();
    return {...preview, fullPixels:layout.width * layout.height};
  }

  function scheduleExportEstimate(){
    clearTimeout(exportEstimateTimer);
    exportEstimateTimer = setTimeout(updateExportEstimate, 80);
  }

  async function updateExportEstimate(){
    const el = $('#exportEstimate');
    if(!el || !state.exportMenuOpen) return;
    const meta = exportMeta();
    if(!isLossyExportFormat(meta.format)){
      el.textContent = meta.format === 'svg' ? 'SVG 不做质量压缩' : 'PNG 无损，体积以最终像素为准';
      return;
    }
    if(!state.images.length){
      el.textContent = '先导入图片';
      return;
    }
    const seq = ++exportEstimateSeq;
    el.textContent = '预计大小计算中';
    await new Promise(resolve => setTimeout(resolve, 0));
    const preview = renderExportPreviewCanvas();
    if(!preview || seq !== exportEstimateSeq) return;
    const q = clamp(state.exportQuality || smartExportQuality(meta.format), 0.5, 1);
    const blob = await encodeCanvasBlob(preview.canvas, meta, q);
    if(!blob || seq !== exportEstimateSeq){
      el.textContent = '当前浏览器无法估算';
      return;
    }
    const samplePixels = Math.max(1, preview.canvas.width * preview.canvas.height);
    const pixelScale = Math.max(1, preview.fullPixels / samplePixels);
    const estimatedBytes = Math.round(blob.size * pixelScale * 0.92);
    const sourceBytes = sourceBytesForEstimate();
    const saved = sourceBytes > 0 ? Math.round((1 - estimatedBytes / sourceBytes) * 100) : null;
    let suffix = '';
    if(saved != null){
      suffix = saved < -200 ? ' / 比原文件大' : ` / ${saved >= 0 ? '-' : '+'}${Math.abs(saved)}%`;
    }
    el.textContent = `预计 ${formatBytes(estimatedBytes)}${suffix}`;
  }

  function toggleOrientation(){
    setOrientation(state.orientation === 'vertical' ? 'horizontal' : 'vertical');

  function setMode(m, opts={}){
    if(!canvasCropCommitBusy && state.mode === 'canvasCrop' && m !== 'canvasCrop' && hasCanvasCrop()){
      commitCanvasCrop(m, opts);
      return;
    }
    if(state.mode !== m){
      state.mobileFileOpen = false;
      state.exportMenuOpen = false;
      state.mobileStitchMenuOpen = false;
      if((opts.mobileSection || sectionForMode(m)) !== 'cut') state.mobileCutPopoverOpen = false;
      state.mobileToolPopoverOpen = false;
      hideToolPopover();
    }
    state.mode = m;
    state.mobileSection = opts.mobileSection || sectionForMode(m);
    state.activeHandle = null;
    state.preview = false;
    if(m === 'canvasCrop') state.selected = {type:'canvasCrop'};
    if(m === 'seam' && state.seams.length) state.selected = state.selected?.type === 'seam' ? state.selected : {type:'seam', index:0};
    if(m === 'imageCrop' && state.images.length) state.selected = state.selected?.type === 'image' ? state.selected : {type:'image', index:0};
    if((m === 'subtitle' || m === 'cut') && state.images.length) selectImageForRegionMode();
    if(m === 'cut') ensureCutLines(false);
    if(m === 'divider'){
      state.splitDraftManual = false;
      ensureSplitDraft();
      syncSplitDraftToViewportCenter();
      state.selected = null;
    }
    if(m === 'tools'){
      state.toolSettings.group = state.toolSettings.group || 'select';
      if(isMobileLayout()) state.mobileToolPopoverOpen = false;
      else state.mobileToolPopoverOpen = true;
      applyActiveTool();
    } else {
      state.mobileToolPopoverOpen = false;
      closeInlineTextEditor(true);
    }
    updateModeButtons(); updateToolbarButtons(); renderProps(); requestRender();
  }

  function exportMeta(){
    const format = state.exportFormat || $('#exportFormatSelect')?.value || 'png';
    if(format === 'jpeg') return {format, mime:'image/jpeg', ext:'jpg', label:'JPEG'};
    if(format === 'webp') return {format, mime:'image/webp', ext:'webp', label:'WEBP'};
    if(format === 'svg') return {format, mime:'image/svg+xml', ext:'svg', label:'SVG'};
    return {format:'png', mime:'image/png', ext:'png', label:'PNG'};
  }

  function canvasToSvgBlob(canvasEl){
    const href = canvasEl.toDataURL('image/png');
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasEl.width}" height="${canvasEl.height}" viewBox="0 0 ${canvasEl.width} ${canvasEl.height}"><image href="${href}" width="${canvasEl.width}" height="${canvasEl.height}"/></svg>`;
    return new Blob([svg], {type:'image/svg+xml'});
  }

  function downloadBlob(blob, filename, delay=0){
    setTimeout(() => {
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.download = filename;
      a.href = url;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1200);
    }, delay);
  }

  function downloadCanvasImage(canvasEl, baseName, delay=0){
    const meta = exportMeta();
    const cleanBase = String(baseName || 'longshot').replace(/\.(png|jpe?g|webp|svg)$/i, '');
    if(meta.format === 'svg'){
      downloadBlob(canvasToSvgBlob(canvasEl), `${cleanBase}.${meta.ext}`, delay);
      return;
    }
    setTimeout(() => {
      const a = document.createElement('a');
      a.download = `${cleanBase}.${meta.ext}`;
      const q = ['jpeg','webp'].includes(meta.format) ? clamp(state.exportQuality || 0.92, 0.5, 1) : undefined;
      a.href = canvasEl.toDataURL(meta.mime, q);
      a.click();
    }, delay);
  }

  async function exportImage(){
    if(!state.images.length){ toast('请先导入图片'); return; }
    const layout = computeLayout(false);
    const maxSide = 32760;
    if(layout.width > maxSide || layout.height > maxSide){
      toast('输出尺寸过大，建议先裁剪或分批导出');
      return;
    }
    const out = document.createElement('canvas');
    out.width = Math.max(1, Math.round(layout.width));
    out.height = Math.max(1, Math.round(layout.height));
    const oc = out.getContext('2d');
    oc.fillStyle = '#fff'; oc.fillRect(0,0,out.width,out.height);
    const full = computeLayout(true);
    oc.save();
    oc.translate(-state.canvasCrop.left, -state.canvasCrop.top);
    drawComposition(oc, full, true, true);
    oc.restore();
    downloadCanvasImage(out, `longshot_${new Date().toISOString().replace(/[:.]/g,'-')}`);
    toast(`${exportMeta().label} 已导出`);
  }

  async function exportPng(){
    await exportImage();
  }

  function imageBaseName(name){
    return String(name || 'image').replace(/\.[^.]+$/, '').replace(/[\\/:*?"<>|]+/g, '_') || 'image';
  }

  function subtitleSourceRect(im){
    const h = clamp(Math.round(im.height * state.subtitleRegion.heightRatio), 1, im.height);
    const y = clamp(Math.round(im.height * state.subtitleRegion.yRatio), 0, Math.max(0, im.height - h));
    return {x:0, y, w:im.width, h};
  }

  async function canvasToImageRecord(canvasEl, name){
    const dataUrl = canvasEl.toDataURL('image/png');
    const img = await loadImage(dataUrl);
    const record = makeImageRecord({name, dataUrl, fileSize: dataUrl.length, img});
    if(record.useProxy) schedulePreviewProxy(record);
    return record;
  }

  function normalizedCanvasCrop(full){
    const cc = state.canvasCrop || {top:0,right:0,bottom:0,left:0};
    const fullWidth = Math.max(1, Math.round(full?.fullWidth || full?.width || 1));
    const fullHeight = Math.max(1, Math.round(full?.fullHeight || full?.height || 1));
    const left = clamp(Math.round(cc.left || 0), 0, fullWidth - 1);
    const top = clamp(Math.round(cc.top || 0), 0, fullHeight - 1);
    const right = clamp(Math.round(cc.right || 0), 0, fullWidth - left - 1);
    const bottom = clamp(Math.round(cc.bottom || 0), 0, fullHeight - top - 1);
    return {left, top, right, bottom};
  }

  function hasCanvasCrop(){
    const c = state.canvasCrop || {};
    return ['top','right','bottom','left'].some(k => Math.round(+c[k] || 0) > 0);
  }

  function sourceCropFromLayoutIntersection(im, item, ix1, iy1, ix2, iy2){
    const scale = Math.max(0.0001, item.scale || 1);
    const left = clamp(Math.round(item.sx + (ix1 - item.dx) / scale), 0, im.width - 1);
    const top = clamp(Math.round(item.sy + (iy1 - item.dy) / scale), 0, im.height - 1);
    const rightEdge = clamp(Math.round(item.sx + (ix2 - item.dx) / scale), left + 1, im.width);
    const bottomEdge = clamp(Math.round(item.sy + (iy2 - item.dy) / scale), top + 1, im.height);
    return {
      top,
      right: Math.max(0, im.width - rightEdge),
      bottom: Math.max(0, im.height - bottomEdge),
      left
    };
  }

  function seamCropContribution(index){
    const c = {top:0,right:0,bottom:0,left:0};
    if(state.orientation === 'vertical'){
      if(index > 0) c.top = state.seams[index - 1]?.afterCrop || 0;
      if(index < state.images.length - 1) c.bottom = state.seams[index]?.beforeCrop || 0;
    } else {
      if(index > 0) c.left = state.seams[index - 1]?.afterCrop || 0;
      if(index < state.images.length - 1) c.right = state.seams[index]?.beforeCrop || 0;
    }
    return c;
  }

  function baseCropFromEffectiveCrop(im, index, effective){
    const seam = seamCropContribution(index);
    const c = {
      top: Math.max(0, Math.round((effective.top || 0) - seam.top)),
      right: Math.max(0, Math.round((effective.right || 0) - seam.right)),
      bottom: Math.max(0, Math.round((effective.bottom || 0) - seam.bottom)),
      left: Math.max(0, Math.round((effective.left || 0) - seam.left))
    };
    c.top = clamp(c.top, 0, im.height - 1);
    c.bottom = clamp(c.bottom, 0, im.height - c.top - 1);
    c.left = clamp(c.left, 0, im.width - 1);
    c.right = clamp(c.right, 0, im.width - c.left - 1);
    return c;
  }

  function applyCanvasCropToImages(full, crop){
    const keep = {
      x1: crop.left,
      y1: crop.top,
      x2: Math.max(crop.left + 1, full.fullWidth - crop.right),
      y2: Math.max(crop.top + 1, full.fullHeight - crop.bottom)
    };
    const nextImages = [];
    const oldSelectedId = state.selected?.type === 'image' ? state.images[state.selected.index]?.id : null;

    for(const item of full.items){
      const im = state.images[item.index];
      if(!im) continue;
      const ix1 = Math.max(item.dx, keep.x1);
      const iy1 = Math.max(item.dy, keep.y1);
      const ix2 = Math.min(item.dx + item.dw, keep.x2);
      const iy2 = Math.min(item.dy + item.dh, keep.y2);
      if(ix2 - ix1 < 0.5 || iy2 - iy1 < 0.5) continue;
      const effectiveCrop = sourceCropFromLayoutIntersection(im, item, ix1, iy1, ix2, iy2);
      im.crop = baseCropFromEffectiveCrop(im, item.index, effectiveCrop);
      nextImages.push(im);
    }

    if(!nextImages.length){
      toast('裁剪范围过小');
      return false;
    }

    state.images = nextImages;
    syncSeams(true);
    state.annotations.forEach(a => {
      a.x = Math.round((a.x || 0) - crop.left);
      a.y = Math.round((a.y || 0) - crop.top);
    });
    state.canvasCrop = {top:0,right:0,bottom:0,left:0};
    state.splitDraft = null;
    state.splitDraftManual = false;
    state.cutLines = {imageId:null, rows:state.cutSettings.rows, cols:state.cutSettings.cols, x:[], y:[]};
    const selectedIndex = oldSelectedId ? state.images.findIndex(im => im.id === oldSelectedId) : -1;
    state.selected = state.images.length ? {type:'image', index:selectedIndex >= 0 ? selectedIndex : 0} : null;
    return true;
  }

  async function commitCanvasCrop(nextMode=null, nextOpts={}){
    if(canvasCropCommitBusy) return false;
    const full = computeLayout(true);
    const crop = normalizedCanvasCrop(full);
    const needsCommit = crop.top || crop.right || crop.bottom || crop.left;
    state.activeHandle = null;
    if(!needsCommit){
      if(nextMode && nextMode !== state.mode) setMode(nextMode, nextOpts);
      else { renderProps(); requestRender(); }
      return false;
    }

    canvasCropCommitBusy = true;
    let applied = false;
    try{
      applied = applyCanvasCropToImages(full, crop);
      if(applied){
        state.mode = 'canvasCrop';
        state.exportQualityAuto = true;
      }
    } finally {
      canvasCropCommitBusy = false;
    }

    if(!applied){
      renderProps(); requestRender();
      return false;
    }
    if(nextMode && nextMode !== 'canvasCrop') setMode(nextMode, nextOpts);
    else { updateModeButtons(); renderProps(); requestRender(); }
    return true;
  }

  async function generateSubtitleStitch(){
    if(!state.images.length){ toast('请先导入图片'); return; }
    pushHistory();
    const rects = state.images.map(subtitleSourceRect);
    const targetW = Math.max(1, Math.max(...rects.map(r => r.w)));
    const heights = rects.map(r => Math.max(1, Math.round(r.h * targetW / Math.max(1, r.w))));
    const totalH = heights.reduce((sum, h) => sum + h, 0);
    const out = document.createElement('canvas');
    out.width = targetW;
    out.height = Math.max(1, totalH);
    const oc = out.getContext('2d');
    oc.fillStyle = '#fff'; oc.fillRect(0,0,out.width,out.height);
    let y = 0;
    state.images.forEach((im, i) => {
      const r = rects[i];
      oc.drawImage(im.img, r.x, r.y, r.w, r.h, 0, y, targetW, heights[i]);
      y += heights[i];
    });
    const record = await canvasToImageRecord(out, 'subtitles.png');
    state.images = [record];
    state.seams = [];
    state.annotations = [];
    state.canvasCrop = {top:0,right:0,bottom:0,left:0};
    state.selected = {type:'image', index:0};
    state.mode = 'canvasCrop';
    state.exportQualityAuto = true;
    updateModeButtons();
    renderProps();
    fitToView(false);
    requestRender();
    toast('字幕已生成');
  }

  function downloadCanvasPng(canvasEl, filename, delay=0){
    downloadCanvasImage(canvasEl, filename, delay);
  }

  function cropRatioOptions(selected){
    const value = selected || '1:1';
    const opts = [
      ['1:1','1:1'],
      ['2:3','竖 2:3'],
      ['3:4','竖 3:4'],
      ['5:7','竖 5:7'],
      ['9:16','竖 9:16'],
      ['3:2','横 3:2'],
      ['4:3','横 4:3'],
      ['7:5','横 7:5'],
      ['16:9','横 16:9'],
      ['custom','自定义']
    ];
    return opts.map(([v,label]) => `<option value="${v}" ${value===v?'selected':''}>${label}</option>`).join('');
  }

  function parseCropRatio(value){
    const raw = String(value || '').trim();
    if(!raw || raw === 'free') return null;
    const m = raw.match(/^(\d+(?:\.\d+)?)\s*[:：/xX]\s*(\d+(?:\.\d+)?)$/);
    if(!m) return null;
    const w = Number(m[1]);
    const h = Number(m[2]);
    if(!isFinite(w) || !isFinite(h) || w <= 0 || h <= 0) return null;
    return w / h;
  }

  function applyCropRatio(){
    if(!state.images.length){ toast('请先导入图片'); return; }
    const ratioKey = state.cutCropRatio || '1:1';
    state.mobileCutSubmode = 'crop';
    state.mobileCutPopoverOpen = false;
    if(ratioKey === 'free'){
      setMode('imageCrop', {mobileSection:'cut'});
      toast('自由裁剪');
      return;
    }
    const ratio = parseCropRatio(ratioKey === 'custom' ? state.customCropRatio : ratioKey);
    if(!ratio){ toast('请输入比例，如 1:3'); return; }
    const idx = selectedImageIndex();
    const im = state.images[idx];
    const base = {...im.crop};
    const availW = Math.max(1, im.width - base.left - base.right);
    const availH = Math.max(1, im.height - base.top - base.bottom);
    let targetW = availW;
    let targetH = Math.round(targetW / ratio);
    if(targetH > availH){
      targetH = availH;
      targetW = Math.round(targetH * ratio);
    }
    const addX = Math.max(0, availW - targetW);
    const addY = Math.max(0, availH - targetH);
    pushHistory();
    im.crop = {
      left: base.left + Math.floor(addX / 2),
      right: base.right + Math.ceil(addX / 2),
      top: base.top + Math.floor(addY / 2),
      bottom: base.bottom + Math.ceil(addY / 2)
    };
    setMode('imageCrop', {mobileSection:'cut'});
    state.selected = {type:'image', index:idx};
    renderProps();
    requestRender();
  }

  function cutGrid(){
    const s = state.cutSettings;
    if(s.mode === 'rows') return {rows: clamp(s.rows, 1, 12), cols: 1};
    if(s.mode === 'cols') return {rows: 1, cols: clamp(s.cols, 1, 12)};
    return {rows: clamp(s.rows, 1, 12), cols: clamp(s.cols, 1, 12)};
  }

  function evenCutRatios(count){
    const n = clamp(Math.round(count || 1), 1, 12);
    return Array.from({length: Math.max(0, n - 1)}, (_, i) => (i + 1) / n);
  }

  function ensureCutLines(reset=false){
    const idx = selectedImageIndex();
    const im = state.images[idx];
    const {rows, cols} = cutGrid();
    if(!im) return {imageId:null, rows, cols, x:[], y:[]};
    const needsReset = reset || !state.cutLines || state.cutLines.imageId !== im.id || state.cutLines.rows !== rows || state.cutLines.cols !== cols;
    if(needsReset){
      state.cutLines = {imageId: im.id, rows, cols, x: evenCutRatios(cols), y: evenCutRatios(rows)};
    }
    state.cutLines.x = (state.cutLines.x || []).slice(0, Math.max(0, cols - 1)).sort((a,b)=>a-b);
    state.cutLines.y = (state.cutLines.y || []).slice(0, Math.max(0, rows - 1)).sort((a,b)=>a-b);
    while(state.cutLines.x.length < Math.max(0, cols - 1)) state.cutLines.x.push((state.cutLines.x.length + 1) / cols);
    while(state.cutLines.y.length < Math.max(0, rows - 1)) state.cutLines.y.push((state.cutLines.y.length + 1) / rows);
    return state.cutLines;
  }

  function resetCutLines(){
    ensureCutLines(true);
  }

  function completeCutEditing(){
    if(!state.images.length) return;
    state.mobileCutSubmode = 'split';
    state.mobileCutPopoverOpen = false;
    ensureCutLines(false);
    state.mode = 'cut';
    state.mobileSection = 'cut';
    state.selected = {type:'image', index:selectedImageIndex()};
    state.activeHandle = null;
    updateModeButtons();
    renderProps();
    requestRender();
  }

  function exportCutImages(){
    if(!state.images.length){ toast('请先导入图片'); return; }
    const idx = selectedImageIndex();
    const im = state.images[idx];
    const c = getEffectiveCrop(idx);
    const sw = Math.max(1, im.width - c.left - c.right);
    const sh = Math.max(1, im.height - c.top - c.bottom);
    const lines = ensureCutLines(false);
    const xCuts = [0, ...lines.x, 1].sort((a,b)=>a-b);
    const yCuts = [0, ...lines.y, 1].sort((a,b)=>a-b);
    const base = imageBaseName(im.name);
    let n = 1;
    for(let row=0; row<yCuts.length-1; row++){
      for(let col=0; col<xCuts.length-1; col++){
        const sx = c.left + Math.round(xCuts[col] * sw);
        const sy = c.top + Math.round(yCuts[row] * sh);
        const sx2 = c.left + Math.round(xCuts[col + 1] * sw);
        const sy2 = c.top + Math.round(yCuts[row + 1] * sh);
        const out = document.createElement('canvas');
        out.width = Math.max(1, sx2 - sx);
        out.height = Math.max(1, sy2 - sy);
        const oc = out.getContext('2d');
        oc.fillStyle = '#fff'; oc.fillRect(0,0,out.width,out.height);
        oc.drawImage(im.img, sx, sy, out.width, out.height, 0, 0, out.width, out.height);
        const rowLabel = String(row + 1).padStart(2,'0');
        const colLabel = String(col + 1).padStart(2,'0');
        downloadCanvasImage(out, `${base}_${rowLabel}_${colLabel}`, n * 140);
        n++;
      }
    }
    toast(`已导出 ${n-1} 张 ${exportMeta().label}`);
  }

  function exportCroppedImage(){
    if(!state.images.length){ toast('请先导入图片'); return; }
    const idx = selectedImageIndex();
    const im = state.images[idx];
    const c = getEffectiveCrop(idx);
    const sw = Math.max(1, im.width - c.left - c.right);
    const sh = Math.max(1, im.height - c.top - c.bottom);
    const out = document.createElement('canvas');
    out.width = sw;
    out.height = sh;
    const oc = out.getContext('2d');
    oc.fillStyle = '#fff'; oc.fillRect(0,0,out.width,out.height);
    oc.drawImage(im.img, c.left, c.top, sw, sh, 0, 0, sw, sh);
    downloadCanvasImage(out, `${imageBaseName(im.name)}_crop`);
    toast(`${exportMeta().label} 已导出`);
  }

  function exportCurrent(){
    if(state.mode === 'cut') exportCutImages();
    else if(state.mobileSection === 'cut' && state.mobileCutSubmode === 'crop') exportCroppedImage();
    else exportImage();
  }

  function openExportSettings(){
    state.mobileFileOpen = false;
    state.mobileInfoOpen = false;
    state.exportMenuOpen = !state.exportMenuOpen;
    if(state.exportMenuOpen) applySmartExportQuality(false);
    updateToolbarButtons();
  }

  function directExportCurrent(){
    state.exportMenuOpen = false;
    renderExportMenu();
    exportCurrent();
  }

  function saveProject(){
    if(!state.images.length){ toast('没有可保存的工程'); return; }
    const blob = new Blob([snapshot()], {type:'application/json'});
    const a = document.createElement('a');
    a.download = `longshot_project_${new Date().toISOString().slice(0,10)}.json`;
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }

  async function openProject(file){
    const txt = await file.text();
    pushHistory();
    await restoreFromSnapshot(txt);
    toast('工程已打开');
  }

  function autoCurrentSeam(){
    const idx = selectedSeamIndex();
    if(idx < 0) return;
    pushHistory();
    const best = findOverlap(idx);
    const s = state.seams[idx];
    if(best){
      // Use detected overlap by cropping the top/left of the second image.
      if(state.orientation === 'vertical') s.afterCrop = best.overlap;
      else s.afterCrop = best.overlap;
      toast(`已尝试自动识别重叠：${best.overlap}px`);
    } else toast('没有找到明显重叠，保持原样');
    renderProps(); requestRender();
  }

  function findOverlap(idx){
    // lightweight pixel sampling: compare bottom/right strip of before image and top/left strip of after image
    const a = state.images[idx], b = state.images[idx+1];
    if(!a || !b) return null;
    const vertical = state.orientation === 'vertical';
    const maxOverlap = Math.min(vertical ? a.height : a.width, vertical ? b.height : b.width, 600);
    const minOverlap = 40;
    const step = 8;
    const sample = 64;
    const ca = document.createElement('canvas'), cb = document.createElement('canvas');
    const ac = ca.getContext('2d', {willReadFrequently:true}), bc = cb.getContext('2d', {willReadFrequently:true});
    if(vertical){ ca.width = cb.width = sample; ca.height = cb.height = maxOverlap; }
    else { ca.width = cb.width = maxOverlap; ca.height = cb.height = sample; }
    try{
      if(vertical){
        ac.drawImage(a.img, 0, a.height-maxOverlap, a.width, maxOverlap, 0, 0, sample, maxOverlap);
        bc.drawImage(b.img, 0, 0, b.width, maxOverlap, 0, 0, sample, maxOverlap);
      } else {
        ac.drawImage(a.img, a.width-maxOverlap, 0, maxOverlap, a.height, 0, 0, maxOverlap, sample);
        bc.drawImage(b.img, 0, 0, maxOverlap, b.height, 0, 0, maxOverlap, sample);
      }
      const ia = ac.getImageData(0,0,ca.width,ca.height).data;
      const ib = bc.getImageData(0,0,cb.width,cb.height).data;
      let best = {score: Infinity, overlap: 0};
      for(let ov=minOverlap; ov<=maxOverlap; ov+=step){
        let score=0, count=0;
        if(vertical){
          const startA = maxOverlap - ov;
          for(let y=0;y<ov;y+=4){ for(let x=0;x<sample;x+=4){
            const pa = ((startA+y)*sample+x)*4, pb=(y*sample+x)*4;
            score += Math.abs(ia[pa]-ib[pb]) + Math.abs(ia[pa+1]-ib[pb+1]) + Math.abs(ia[pa+2]-ib[pb+2]); count++;
          }}
        } else {
          const startA = maxOverlap - ov;
          for(let x=0;x<ov;x+=4){ for(let y=0;y<sample;y+=4){
            const pa = (y*maxOverlap+startA+x)*4, pb=(y*maxOverlap+x)*4;
            score += Math.abs(ia[pa]-ib[pb]) + Math.abs(ia[pa+1]-ib[pb+1]) + Math.abs(ia[pa+2]-ib[pb+2]); count++;
          }}
        }
        score /= Math.max(1,count);
        if(score < best.score) best = {score, overlap: ov};
      }
      return best.score < 38 ? best : null;
    }catch(e){ return null; }
  }

  function autoWhiteImage(idx){
    const im = state.images[idx]; if(!im) return;
    pushHistory();
    const c = detectWhiteBorder(im.img);
    im.crop = c;
    renderProps(); requestRender(); toast('已尝试去除当前图片白边');
  }

  function autoWhiteCanvas(){
    if(!state.images.length) return;
    pushHistory();
    const layout = computeLayout(true);
    const out = document.createElement('canvas'); out.width = layout.fullWidth; out.height = layout.fullHeight;
    const oc = out.getContext('2d'); drawComposition(oc, layout, true, true);
    state.canvasCrop = detectWhiteBorder(out);
    renderProps(); requestRender(); toast('已尝试去除整体白边');
  }

  function detectWhiteBorder(imgOrCanvas){
    const maxSample = 1200;
    const scale = Math.min(1, maxSample / Math.max(imgOrCanvas.width || imgOrCanvas.naturalWidth, imgOrCanvas.height || imgOrCanvas.naturalHeight));
    const w = Math.max(1, Math.round((imgOrCanvas.width || imgOrCanvas.naturalWidth) * scale));
    const h = Math.max(1, Math.round((imgOrCanvas.height || imgOrCanvas.naturalHeight) * scale));
    const c = document.createElement('canvas'); c.width=w; c.height=h;
    const g = c.getContext('2d', {willReadFrequently:true});
    g.drawImage(imgOrCanvas, 0,0,w,h);
    const data = g.getImageData(0,0,w,h).data;
    const isWhite = (x,y) => { const p=(y*w+x)*4; return data[p]>245 && data[p+1]>245 && data[p+2]>245; };
    const rowWhite = y => { let cnt=0; for(let x=0;x<w;x+=4) if(isWhite(x,y)) cnt++; return cnt >= Math.ceil(w/4)*0.96; };
    const colWhite = x => { let cnt=0; for(let y=0;y<h;y+=4) if(isWhite(x,y)) cnt++; return cnt >= Math.ceil(h/4)*0.96; };
    let top=0,bottom=0,left=0,right=0;
    while(top<h-1 && rowWhite(top)) top++;
    while(bottom<h-top-1 && rowWhite(h-1-bottom)) bottom++;
    while(left<w-1 && colWhite(left)) left++;
    while(right<w-left-1 && colWhite(w-1-right)) right++;
    return {top:Math.round(top/scale), bottom:Math.round(bottom/scale), left:Math.round(left/scale), right:Math.round(right/scale)};
  }

  function setOrientation(o){
    if(state.orientation === o) return;
    pushHistory();
    state.orientation = o;
    state.canvasCrop = {top:0,right:0,bottom:0,left:0};
    state.seams.forEach(s => { s.beforeCrop=0; s.afterCrop=0; });
    updateToolbarButtons(); renderProps(); fitToView(false); requestRender();
  }

  function toggleAutoStitch(){
    state.autoStitchEnabled = !state.autoStitchEnabled;
    if(state.autoStitchEnabled && state.images.length > 1){
      pushHistory();
      state.orientation = inferAutoOrientation(state.images);
      syncSeams(true);
      autoAllSeams();
      fitToView(false);
    }
    updateToolbarButtons(); renderProps(); requestRender();
  }

  function clearAll(){
    if(!state.images.length) return;
    if(!confirm('确定清空当前图片和编辑参数吗？')) return;
    pushHistory();
    closeInlineTextEditor(false);
    state.images=[]; state.seams=[]; state.annotations=[]; state.selected=null; state.canvasCrop={top:0,right:0,bottom:0,left:0};
    state.zoom = 1; state.pan = {x:0,y:0}; state.mobileToolPopoverOpen = false; state.exportQualityAuto = true;
    renderProps(); renderToolDock(); requestRender();
  }

  function handleKey(e){
    if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
    if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){ e.preventDefault(); undo(); }
    else if((e.ctrlKey||e.metaKey) && (e.key.toLowerCase()==='y' || (e.shiftKey && e.key.toLowerCase()==='z'))){ e.preventDefault(); redo(); }
    else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='s'){ e.preventDefault(); exportPng(); }
    else if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Delete','Backspace'].includes(e.key)){
      if(!state.images.length) return;
      e.preventDefault();
      if(e.key === 'Delete' || e.key === 'Backspace'){
        if(state.selected?.type === 'seam'){ pushHistory(); const s=state.seams[state.selected.index]; if(s){s.beforeCrop=0;s.afterCrop=0;} }
        if(state.selected?.type === 'divider'){ toggleDivider(state.selected.index); return; }
        // Keyboard Backspace/Delete must not remove annotations; use the explicit delete button instead.
        if(state.selected?.type === 'annotation'){ return; }
        renderProps(); requestRender(); return;
      }
      const amount = e.shiftKey ? 10 : (e.ctrlKey || e.metaKey ? 50 : 1);
      const sign = (e.key === 'ArrowDown' || e.key === 'ArrowRight') ? 1 : -1;
      nudge(sign * amount, e.key);
    }
  }

  function nudge(delta, key){
    const verticalKey = key === 'ArrowUp' || key === 'ArrowDown';
    if(state.mode === 'seam' && state.selected?.type === 'seam'){
      const s = state.seams[state.selected.index]; if(!s) return;
      
      pushHistory();
      if((state.orientation === 'vertical' && verticalKey) || (state.orientation === 'horizontal' && !verticalKey)){
        if(key==='ArrowUp' || key==='ArrowLeft') s.beforeCrop = Math.max(0, s.beforeCrop + Math.abs(delta));
        if(key==='ArrowDown' || key==='ArrowRight') s.afterCrop = Math.max(0, s.afterCrop + Math.abs(delta));
      }
    } else if(state.mode === 'canvasCrop'){
      pushHistory();
      if(key==='ArrowUp') state.canvasCrop.top = Math.max(0,state.canvasCrop.top+amountSign(delta));
      if(key==='ArrowDown') state.canvasCrop.bottom = Math.max(0,state.canvasCrop.bottom+Math.abs(delta));
      if(key==='ArrowLeft') state.canvasCrop.left = Math.max(0,state.canvasCrop.left+amountSign(delta));
      if(key==='ArrowRight') state.canvasCrop.right = Math.max(0,state.canvasCrop.right+Math.abs(delta));
    } else if(state.mode === 'imageCrop' && state.selected?.type === 'image'){
      pushHistory();
      const c = state.images[state.selected.index].crop;
      const amt = Math.abs(delta);
      if(key==='ArrowUp') c.top = Math.max(0,c.top+amt);
      if(key==='ArrowDown') c.bottom = Math.max(0,c.bottom+amt);
      if(key==='ArrowLeft') c.left = Math.max(0,c.left+amt);
      if(key==='ArrowRight') c.right = Math.max(0,c.right+amt);
    } else if(state.mode === 'tools' && state.selected?.type === 'annotation'){
      pushHistory();
      const a = state.annotations[state.selected.index];
      if(key==='ArrowUp') a.y = Math.max(0,(a.y||0)-Math.abs(delta));
      if(key==='ArrowDown') a.y = Math.max(0,(a.y||0)+Math.abs(delta));
      if(key==='ArrowLeft') a.x = Math.max(0,(a.x||0)-Math.abs(delta));
      if(key==='ArrowRight') a.x = Math.max(0,(a.x||0)+Math.abs(delta));
    }
    renderProps(); requestRender();
  }
  function amountSign(delta){ return Math.abs(delta); }


  function beginMiniMapNav(e){
    if(!state.images.length) return;
    e.preventDefault(); e.stopPropagation();
    const w = miniMapPointToWorld(e);
    setViewportCenter(w.x, w.y);
    navDrag = {type:'miniMap'};
  }
  function beginVScroll(e){
    if(!state.images.length) return;
    e.preventDefault(); e.stopPropagation();
    vScroll.classList.add('dragging');
    const r = vScroll.getBoundingClientRect();
    const th = vThumb.getBoundingClientRect();
    const offset = e.target === vThumb ? e.clientY - th.top : th.height / 2;
    navDrag = {type:'vScroll', offset};
    const ratio = (e.clientY - r.top - offset) / Math.max(1, r.height - th.height);
    setVerticalScrollRatio(ratio);
  }
  function beginHScroll(e){
    if(!state.images.length) return;
    e.preventDefault(); e.stopPropagation();
    hScroll.classList.add('dragging');
    const r = hScroll.getBoundingClientRect();
    const tw = hThumb.getBoundingClientRect();
    const offset = e.target === hThumb ? e.clientX - tw.left : tw.width / 2;
    navDrag = {type:'hScroll', offset};
    const ratio = (e.clientX - r.left - offset) / Math.max(1, r.width - tw.width);
    setHorizontalScrollRatio(ratio);
  }
  function onNavPointerMove(e){
    if(!navDrag) return;
    e.preventDefault();
    if(navDrag.type === 'miniMap'){
      const w = miniMapPointToWorld(e);
      setViewportCenter(w.x, w.y);
    } else if(navDrag.type === 'vScroll'){
      const r = vScroll.getBoundingClientRect();
      const th = vThumb.getBoundingClientRect();
      const ratio = (e.clientY - r.top - navDrag.offset) / Math.max(1, r.height - th.height);
      setVerticalScrollRatio(ratio);
    } else if(navDrag.type === 'hScroll'){
      const r = hScroll.getBoundingClientRect();
      const tw = hThumb.getBoundingClientRect();
      const ratio = (e.clientX - r.left - navDrag.offset) / Math.max(1, r.width - tw.width);
      setHorizontalScrollRatio(ratio);
    }
  }
  function endNavDrag(){
    if(!navDrag) return;
    navDrag = null;
    vScroll.classList.remove('dragging');
    hScroll.classList.remove('dragging');
    requestRender();
  }


  function hasProjectContent(){
    return !!(state.images.length || state.annotations.length || state.seams.length || Object.values(state.canvasCrop || {}).some(v => +v));
  }

  function confirmBeforeUnload(e){
    if(!hasProjectContent()) return;
    e.preventDefault();
    e.returnValue = '';
  }


  // Events
  $('#fileInput').addEventListener('change', e => { addFiles(e.target.files); e.target.value=''; });
  $('#projectInput').addEventListener('change', e => { if(e.target.files[0]) openProject(e.target.files[0]); e.target.value=''; });
  $('#pasteBtn').addEventListener('click', addClipboardImages);
  $('#saveProjectBtn').addEventListener('click', saveProject);
  $('#exportBtn').addEventListener('click', e => { e.stopPropagation(); openExportSettings(); });
  $('#exportFormatSelect')?.addEventListener('change', e => {
    state.exportFormat = e.target.value || 'png';
    state.exportQualityAuto = true;
    applySmartExportQuality(true);
    updateToolbarButtons();
    scheduleExportEstimate();
  });
  $('#exportQuality')?.addEventListener('input', e => {
    state.exportQuality = clamp(Number(e.target.value || 92) / 100, 0.5, 1);
    state.exportQualityAuto = false;
    updateToolbarButtons();
    scheduleExportEstimate();
  });
  $$('.export-preset').forEach(btn => btn.addEventListener('click', () => {
    state.exportQuality = clamp(Number(btn.dataset.exportQuality || 88) / 100, 0.5, 1);
    state.exportQualityAuto = false;
    updateToolbarButtons();
    scheduleExportEstimate();
  }));
  $('#exportDirectBtn')?.addEventListener('click', directExportCurrent);
  $('#fitBtn').addEventListener('click', () => fitToView());
  $('#undoBtn').addEventListener('click', undo);
  $('#redoBtn').addEventListener('click', redo);
  $('#clearBtn').addEventListener('click', clearAll);
  $('#verticalBtn').addEventListener('click', () => setOrientation('vertical'));
  $('#horizontalBtn').addEventListener('click', () => setOrientation('horizontal'));
  $('#mobileClearBtn')?.addEventListener('click', clearAll);
  $('#mobileFileBtn')?.addEventListener('click', e => { e.stopPropagation(); state.exportMenuOpen = false; state.mobileInfoOpen = false; state.mobileFileOpen = !state.mobileFileOpen; updateToolbarButtons(); });
  $('#mobileInfoBtn')?.addEventListener('click', e => { e.stopPropagation(); state.mobileFileOpen = false; state.exportMenuOpen = false; state.mobileInfoOpen = !state.mobileInfoOpen; updateToolbarButtons(); });
  $('#mobileAutoBtn')?.addEventListener('click', toggleAutoStitch);
  $('#mobileDirectionBtn')?.addEventListener('click', toggleOrientation);
  $('#mobileUndoBtn')?.addEventListener('click', undo);
  $('#mobileRedoBtn')?.addEventListener('click', redo);
  $('#autoStitchBtn')?.addEventListener('click', toggleAutoStitch);
  mobileFileMenu?.querySelectorAll('[data-mobile-file]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const action = btn.dataset.mobileFile;
    state.mobileFileOpen = false;
    if(action === 'openImage') $('#fileInput').click();
    if(action === 'saveProject') saveProject();
    if(action === 'openProject') $('#projectInput').click();
    if(action === 'about') showAbout();
    renderMobileFileMenu();
  }));
  $$('.mode-btn').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
  $$('.mobile-primary-mode').forEach(b => b.addEventListener('click', () => setMobileSection(b.dataset.mobileSection)));
  $$('.mobile-mode').forEach(b => b.addEventListener('click', () => {
    if(b.dataset.stitchMain === 'line'){
      if(state.mode === 'seam' && state.mobileSection === 'stitch') openStitchLineMenu();
      else setMode('seam');
      return;
    }
    setMode(b.dataset.mode);
  }));
  mobileStitchMenu?.querySelectorAll('[data-stitch-action]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    runStitchAction(btn.dataset.stitchAction);
  }));
  $$('[data-mobile-cut-step]').forEach(btn => btn.addEventListener('click', () => {
    const [axis, delta] = btn.dataset.mobileCutStep.split(':');
    stepMobileCut(axis, Math.round(+delta || 0));
  }));
  $$('[data-mobile-cut-mode]').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); setMobileCutSubmode(btn.dataset.mobileCutMode); }));
  $('[data-mobile-split="ok"]')?.addEventListener('click', () => completeCutEditing());
  $('[data-mobile-crop="ok"]')?.addEventListener('click', () => applyCropRatio());
  $('[data-mobile-crop-ratio="free"]')?.addEventListener('click', () => {
    state.cutCropRatio = 'free';
    updateModeButtons();
  });
  $('#cropRatioSelect')?.addEventListener('change', e => {
    state.cutCropRatio = e.target.value || '1:1';
    updateModeButtons();
  });
  $('#customRatioInput')?.addEventListener('input', e => { state.customCropRatio = e.target.value; });
  $$('.mobile-tool-group[data-tool-group]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    setToolGroup(btn.dataset.toolGroup);
  }));
  window.addEventListener('resize', () => renderToolDock());
  miniMap.addEventListener('pointerdown', beginMiniMapNav);
  vScroll.addEventListener('pointerdown', beginVScroll);
  hScroll.addEventListener('pointerdown', beginHScroll);
  document.addEventListener('pointermove', onNavPointerMove);
  document.addEventListener('pointerup', endNavDrag);
  document.addEventListener('pointercancel', endNavDrag);
  document.addEventListener('pointerdown', e => {
    if(mobileFileMenu?.contains(e.target) || $('#mobileFileBtn')?.contains(e.target) || mobileInfoMenu?.contains(e.target) || $('#mobileInfoBtn')?.contains(e.target) || exportMenu?.contains(e.target) || $('#exportBtn')?.contains(e.target) || mobileStitchMenu?.contains(e.target) || mobileCutPopover?.contains(e.target) || $('#mobileContextBar')?.contains(e.target)) return;
    if(state.mobileFileOpen || state.mobileInfoOpen || state.exportMenuOpen || state.mobileStitchMenuOpen || state.mobileCutPopoverOpen) closeTopMenus();
  });

  document.addEventListener('paste', async e => {
    const files = [];
    for(const item of e.clipboardData?.items || []){
      if(item.type.startsWith('image/')) files.push(item.getAsFile());
    }
    if(files.length) await addFiles(files);
  });
  function handleDroppedFiles(files){
    const list = Array.from(files || []);
    const project = list.find(f => /\.json$/i.test(f.name || '') || f.type === 'application/json');
    if(project && list.length === 1) openProject(project);
    else addFiles(list.filter(f => f.type.startsWith('image/') || /\.(png|jpe?g|webp|gif|bmp)$/i.test(f.name || '')));
  }
  stage.addEventListener('dragover', e => { e.preventDefault(); });
  stage.addEventListener('drop', e => { e.preventDefault(); handleDroppedFiles(e.dataTransfer.files); });
  dropHint.addEventListener('pointerdown', e => e.stopPropagation());
  dropHint.addEventListener('click', e => {
    e.stopPropagation();
    dropHint.focus({preventScroll:true});
    if(e.target?.id === 'openImageEmpty') $('#fileInput').click();
    if(e.target?.id === 'openProjectEmpty') $('#projectInput').click();
    if(e.target?.id === 'pasteEmpty') addClipboardImages();
  });
  stage.addEventListener('pointerdown', onPointerDown);
  stage.addEventListener('pointermove', onPointerMove);
  stage.addEventListener('pointerup', onPointerUp);
  stage.addEventListener('pointercancel', onPointerUp);
  stage.addEventListener('wheel', onWheel, {passive:false});
  stage.addEventListener('dblclick', e => {
    const p = getPointer(e); const w = screenToWorld(p.x,p.y); const h = hitTest(w.x,w.y);
    if(h?.type === 'annotation'){
      state.selected = {type:'annotation', index:h.index};
      if(state.annotations[h.index]?.type === 'text') openInlineTextEditor(h.index, true);
      renderProps(); requestRender();
      return;
    }
    if(h?.type?.startsWith('seam')){ state.selected={type:'seam',index:h.index}; autoCurrentSeam(); }
  });
  document.addEventListener('keydown', handleKey);
  window.addEventListener('resize', () => requestRender());
  window.addEventListener('beforeunload', confirmBeforeUnload);
  resizeObserver = new ResizeObserver(() => requestRender());
  resizeObserver.observe(stageWrap);

  renderProps();
  updateUndoRedo();
  requestRender();
})();
</script>
